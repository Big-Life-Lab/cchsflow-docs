# ICES CCHS Data Dictionary - Release Manifest
# Version 1.0.0
#
# Canonical scrape of CCHS variable availability from ICES Data Dictionary
# Source: https://datadictionary.ices.on.ca/Applications/DataDictionary/Library.aspx?Library=CCHS

release:
  version: "1.0.0"
  date: "2026-01-22"
  description: >-
    Complete scrape of CCHS variable metadata from ICES Data Dictionary.
    Contains 14,005 variables across 231 datasets with full availability mapping,
    value formats, and code labels.

scrape_metadata:
  source: "ICES Data Dictionary"
  source_url: "https://datadictionary.ices.on.ca/Applications/DataDictionary/Library.aspx?Library=CCHS"
  ices_library: "CCHS"
  scrape_start: "2026-01-21 20:45:56"
  scrape_end: "2026-01-22 04:51:44"
  duration_hours: 8.1
  rate_limit_seconds: 1.0

statistics:
  variables: 14005
  datasets: 231
  availability_records: 118668
  value_formats: 1522
  format_codes: 11065

  # Coverage
  variables_in_source_list: 14006
  variables_scraped: 14005
  variables_failed: 1
  failed_variables:
    - DEPB_DBO  # Stub entry in ICES - no data on website

database_schema:
  tables:
    - name: variables
      description: "Variable metadata (name, label, type, format, raw values)"
      primary_key: variable_name
      row_count: 14005

    - name: datasets
      description: "Dataset identifiers with variable counts"
      primary_key: dataset_id
      row_count: 231

    - name: variable_availability
      description: "Many-to-many mapping of variables to datasets"
      primary_key: [variable_name, dataset_id]
      row_count: 118668

    - name: value_formats
      description: "Code/label pairs for categorical variables"
      primary_key: [format_name, code]
      row_count: 11065

    - name: catalog_metadata
      description: "Key-value metadata about the scrape"
      primary_key: key

files:
  - filename: ices_cchs_dictionary.duckdb
    format: DuckDB
    size_mb: 33
    description: "Complete database with all tables"
    checksum_sha256: null  # To be computed

  - filename: ices_cchs_availability_matrix.csv
    format: CSV
    size_mb: 18
    description: "Wide-format availability matrix (variables x datasets)"
    rows: 14003
    columns: 232  # variable_name + 231 datasets

dataset_coverage:
  # Top 10 datasets by variable count
  largest_datasets:
    - dataset_id: CCHS2002_ONT_LINK_12_PB
      variable_count: 2095
      notes: "Cycle 1.2 (2002) Mental Health - Ontario linked with postal code"
    - dataset_id: CCHS2002_ONT_LINK_12
      variable_count: 2093
      notes: "Cycle 1.2 (2002) Mental Health - Ontario linked"
    - dataset_id: CCHS2002_ONT_SHARE_12
      variable_count: 2087
      notes: "Cycle 1.2 (2002) Mental Health - Ontario share"
    - dataset_id: CCHS2003_ONT_LINK_21_PB
      variable_count: 1795
      notes: "Cycle 2.1 (2003) - Ontario linked with postal code"
    - dataset_id: CCHS2003_ONT_LINK_21
      variable_count: 1793
      notes: "Cycle 2.1 (2003) - Ontario linked"

  # Dataset naming patterns observed
  naming_patterns:
    - pattern: "CCHS{year}_{region}_{type}"
      example: "CCHS2009_ONT_SHARE"
    - pattern: "CCHS{year}{year}_{region}_{type}"
      example: "CCHS200708_ONT_LINK"
    - pattern: "CCHS{year}_{survey}_{type}"
      example: "CCHS2012_CCHS_PUMF"
    - pattern: "CCHS{year}_MH*"
      example: "CCHS2012_MH"
      notes: "Mental Health focused surveys"

usage:
  r_example: |
    library(duckdb)
    library(DBI)

    con <- dbConnect(duckdb::duckdb(), "ices_cchs_dictionary.duckdb")

    # Search for smoking variables
    smoking <- dbGetQuery(con, "
      SELECT variable_name, label, available_in_count
      FROM variables
      WHERE variable_name LIKE 'SMK%'
      ORDER BY available_in_count DESC
    ")

    # Find variables common to multiple datasets
    common <- dbGetQuery(con, "
      SELECT v.variable_name, v.label, COUNT(*) as n_datasets
      FROM variables v
      JOIN variable_availability va ON v.variable_name = va.variable_name
      WHERE va.dataset_id IN ('CCHS2009_ONT_SHARE', 'CCHS2012_ONT_SHARE')
      GROUP BY v.variable_name, v.label
      HAVING COUNT(*) = 2
    ")

    dbDisconnect(con)

notes:
  - "All data scraped verbatim from ICES website - no interpretation applied"
  - "Variable types stored as raw strings (e.g., 'Num8', 'Char10')"
  - "Dataset IDs stored exactly as shown on ICES 'Available In' field"
  - "Value formats keyed by ICES format code or '_var_{variable_name}' if missing"
  - "DEPB_DBO is listed in ICES variable index but returns empty data"
