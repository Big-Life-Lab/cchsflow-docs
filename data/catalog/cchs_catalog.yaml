catalog_metadata:
  version: v3.0.0
  created_date: '2025-09-29'
  total_files: 1262
  years_covered: 2001-2023
  uid_system_version: '3.0'
  data_sources:
  - OSF.io
  - Local Repository
  last_updated: '2025-10-03'
  namespaces:
    osf_cchs_docs:
      name: CCHS Docs - Documentation Component
      description: OSF project containing CCHS master documentation files
      type: osf
      project_id: 6p3n9
      component_id: jm8bx
      base_url: https://osf.io/jm8bx/files/osfstorage
    local_osf_mirror:
      name: OSF Local Mirror
      description: Local filesystem mirror of OSF CCHS documentation
      type: local
      base_path: cchs-osf-docs/
  field_descriptions:
    cchs_uid: Unique identifier with temporal and document type information
    catalog_id: 6-character alphanumeric unique identifier for referencing
    year: Survey year as string
    temporal_type: 'Temporal scope: single, dual, or multi-year survey'
    doc_type: 'Document type: master or share file'
    category: Full document category name
    language: 'ISO 639-1 language code: EN or FR'
    version: 'Document version: v1, v2, v3, etc.'
    sequence: Integer sequence for multiple versions
    canonical_filename: Standardized filename following Jenny Bryan conventions
  generation_formulas:
    catalog_id: '6-character random alphanumeric: sample(c(0:9, LETTERS), 6, replace=TRUE)'
    cchs_uid: cchs-{year}{temporal_code}-{doc_type_code}-{category_code}-{lang_code}-{ext_code}-{sequence:02d}
    canonical_filename: cchs_{year}{temporal_abbrev}_{category}_{doc_type_abbrev}_{lang_abbrev}_{sequence}_{version}.{ext}
  categorization_version: '2.0'
  enhancement_date: '2025-09-29'
  categorization_features:
    secondary_categories: Multiple content categories per document
    content_tags: Semantic content classification
    derived_variables_detection: Automatic identification of derived variables content
  schema_version: 3.0.0
  migration_note: Added source_namespace and source_filepath fields for v3.0.0 namespace
    system
