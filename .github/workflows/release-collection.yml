name: Release CCHS Collection

on:
  workflow_dispatch:
    inputs:
      collection_name:
        description: 'Collection name (e.g., cchs-core-master-collection)'
        required: true
        type: string
      version:
        description: 'Version (e.g., v1.1.0)'
        required: true
        type: string
      doc_type:
        description: 'Document type filter (master/share/all)'
        required: false
        default: 'master'
        type: choice
        options:
          - master
          - share
          - all
      language:
        description: 'Language filter (EN/FR/all)'
        required: false
        default: 'EN'
        type: choice
        options:
          - EN
          - FR
          - all
      exclude_syntax:
        description: 'Exclude redundant syntax files'
        required: false
        default: true
        type: boolean

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("yaml", "dplyr", "readr", "httr", "jsonlite"))'

      - name: Generate collection
        id: generate
        run: |
          Rscript -e '
          source("R/extract_collection.R")

          # Generate collection
          result <- extract_collection(
            collection_name = "${{ inputs.collection_name }}",
            version = "${{ inputs.version }}",
            doc_type = "${{ inputs.doc_type }}",
            language = "${{ inputs.language }}",
            exclude_syntax = ${{ inputs.exclude_syntax }}
          )

          # Output file paths
          cat(sprintf("zip_file=build/${{ inputs.collection_name }}-${{ inputs.version }}.zip\n"))
          cat(sprintf("manifest_file=data/manifests/${{ inputs.collection_name }}-manifest-${{ inputs.version }}.csv\n"))
          '

      - name: Verify collection files exist
        run: |
          if [ ! -f "build/${{ inputs.collection_name }}-${{ inputs.version }}.zip" ]; then
            echo "Error: Collection ZIP not found"
            exit 1
          fi

          if [ ! -f "data/manifests/${{ inputs.collection_name }}-manifest-${{ inputs.version }}.csv" ]; then
            echo "Error: Manifest CSV not found"
            exit 1
          fi

          echo "✅ Collection files verified"

      - name: Generate checksums
        id: checksums
        run: |
          ZIP_FILE="build/${{ inputs.collection_name }}-${{ inputs.version }}.zip"

          # Generate MD5 and SHA256
          MD5=$(md5sum "$ZIP_FILE" | awk '{print $1}')
          SHA256=$(sha256sum "$ZIP_FILE" | awk '{print $1}')

          # Output for release notes
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

          # Print for verification
          echo "MD5: $MD5"
          echo "SHA256: $SHA256"

      - name: Get file statistics
        id: stats
        run: |
          ZIP_FILE="build/${{ inputs.collection_name }}-${{ inputs.version }}.zip"
          MANIFEST_FILE="data/manifests/${{ inputs.collection_name }}-manifest-${{ inputs.version }}.csv"

          # Get file count from manifest (excluding header)
          FILE_COUNT=$(($(wc -l < "$MANIFEST_FILE") - 1))

          # Get ZIP size in MB
          SIZE_MB=$(du -m "$ZIP_FILE" | cut -f1)

          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT

          echo "Files: $FILE_COUNT"
          echo "Size: ${SIZE_MB} MB"

      - name: Create release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          # CCHS ${{ inputs.collection_name }} ${{ inputs.version }}

          ## 📦 Collection Details

          - **Files**: ${{ steps.stats.outputs.file_count }} files
          - **Languages**: ${{ inputs.language }}
          - **Doc Type**: ${{ inputs.doc_type }}
          - **File Size**: ${{ steps.stats.outputs.size_mb }} MB (compressed)
          - **Exclude Syntax**: ${{ inputs.exclude_syntax }}

          ## 📥 Download & Usage

          ### Download

          1. Download the ZIP file from the Assets section below
          2. Download the manifest CSV for file metadata
          3. Extract the ZIP to your preferred location

          ### Load Manifest in R

          ```r
          library(readr)
          library(dplyr)

          # Load collection manifest
          manifest <- read_csv("${{ inputs.collection_name }}-manifest-${{ inputs.version }}.csv")

          # Find specific files
          questionnaires <- manifest %>% filter(category == "questionnaire")
          ```

          ## 🔐 Checksums

          Verify download integrity:

          ```bash
          # MD5
          ${{ steps.checksums.outputs.md5 }}

          # SHA256
          ${{ steps.checksums.outputs.sha256 }}
          ```

          ## 📚 Documentation

          - **Repository**: [Main README](https://github.com/${{ github.repository }})
          - **CCHS Terminology**: [Glossary](https://github.com/${{ github.repository }}#-cchs-terminology)
          - **Manifest Documentation**: [data/manifests/README.md](https://github.com/${{ github.repository }}/blob/main/data/manifests/README.md)

          ---

          **Generated from**: OSF.io CCHS Documentation Project (6p3n9)
          EOF

          echo "Release notes created"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.collection_name }}-${{ inputs.version }}
          name: ${{ inputs.collection_name }} ${{ inputs.version }}
          body_path: release_notes.md
          files: |
            build/${{ inputs.collection_name }}-${{ inputs.version }}.zip
            data/manifests/${{ inputs.collection_name }}-manifest-${{ inputs.version }}.csv
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ Release Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Collection**: ${{ inputs.collection_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Files**: ${{ steps.stats.outputs.file_count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Size**: ${{ steps.stats.outputs.size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**MD5**: \`${{ steps.checksums.outputs.md5 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA256**: \`${{ steps.checksums.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
