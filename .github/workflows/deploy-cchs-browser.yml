name: Deploy CCHS Variable Browser

on:
  push:
    branches:
      - main
    paths:
      - 'reports/cchs-variable-browser.qmd'
      - 'data/exports/ices_cchs_*.csv'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install renv
        run: Rscript -e "install.packages('renv', repos = 'https://cloud.r-project.org')"

      - name: Restore R packages with renv
        run: Rscript -e "renv::restore(prompt = FALSE)"

      - name: Get renv library path
        id: renv-path
        run: |
          RENV_LIB=$(Rscript -e "cat(renv::paths\$library())")
          echo "path=$RENV_LIB" >> $GITHUB_OUTPUT

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render CCHS Variable Browser
        run: quarto render reports/cchs-variable-browser.qmd --output-dir ../docs/cchs-browser
        env:
          R_LIBS_USER: ${{ steps.renv-path.outputs.path }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/cchs-browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
