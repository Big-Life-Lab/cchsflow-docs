name: Deploy CCHS Variable Browser

on:
  push:
    branches:
      - main
    paths:
      - 'reports/cchs-variable-browser.qmd'
      - 'data/exports/ices_cchs_*.csv'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RENV_CONFIG_AUTOLOADER_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install R packages
        run: Rscript --vanilla -e 'install.packages(c("DT", "dplyr", "htmltools", "knitr", "rmarkdown"), repos = "https://cloud.r-project.org")'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render CCHS Variable Browser
        run: |
          quarto render reports/cchs-variable-browser.qmd
          mkdir -p docs/cchs-browser
          mv reports/cchs-variable-browser.html docs/cchs-browser/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/cchs-browser'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
