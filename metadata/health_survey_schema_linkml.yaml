id: https://github.com/Big-Life-Lab/canadian-health-surveys/schema/v4
name: canadian-health-surveys-schema-v4
title: Canadian Health Surveys Documentation Metadata Schema v4
description: >-
  LinkML schema for Canadian health survey documentation metadata including
  Canadian Community Health Survey (CCHS) and Canadian Health Measures Survey (CHMS).

  Features: enhanced UID system, namespace support, ISO compliance,
  multi-source support (OSF + PUMF), subcategory differentiation, and
  multi-survey support.

  NEW in v4.0.0: Support for CHMS alongside CCHS with survey-specific fields
  BREAKING CHANGE in v3.0.0: UID format now includes optional subcategory code
  for differentiating file variants (main, simplified, sub-sample, etc.)
version: "4.0.0"
license: MIT

prefixes:
  linkml: https://w3id.org/linkml/
  healthsurvey: https://github.com/Big-Life-Lab/canadian-health-surveys/
  cchs: https://github.com/Big-Life-Lab/cchs-documentation/
  chms: https://github.com/Big-Life-Lab/chms-documentation/
  schema: http://schema.org/
  PATO: http://purl.obolibrary.org/obo/PATO_

default_prefix: healthsurvey
default_range: string

imports:
  - linkml:types

#==================================
# Classes
#==================================

classes:

  Namespace:
    description: >-
      Defines a source location namespace for URL reconstruction and provenance tracking.
      Each namespace represents a specific source (OSF project, Google Drive folder, local mirror, etc.)
    attributes:
      name:
        description: Human-readable name for this namespace
        required: true
        examples:
          - "CCHS Docs - Documentation Component"
          - "PUMF Collection"
          - "OSF Local Mirror"
      description:
        description: Optional detailed description of this namespace
        required: false
        examples:
          - "OSF project containing CCHS master documentation files"
          - "Google Drive folder with PUMF files from Statistics Canada"
      type:
        description: Type of source
        required: true
        range: NamespaceTypeEnum
      project_id:
        description: Project identifier (for OSF, Google Drive, etc.)
        required: false
        examples:
          - "6p3n9"
          - "1BWtYYCU6XKbOAiZYvr_znFQK5ORO2AzW"
      component_id:
        description: Component identifier (for OSF components)
        required: false
        examples:
          - "jm8bx"
      base_url:
        description: Base URL for reconstructing full file URLs
        required: false
        examples:
          - "https://osf.io/6p3n9/files/osfstorage/jm8bx"
          - "https://drive.google.com/drive/folders/1BWtYYCU6XKbOAiZYvr_znFQK5ORO2AzW"
      base_path:
        description: Base filesystem path (for local namespaces)
        required: false
        examples:
          - "cchs-osf-docs/"
          - "cchs-pumf-docs/"

  CCHSFile:
    description: >-
      A single health survey documentation file with unique identifier and metadata.
      Supports both CCHS and CHMS surveys with survey-specific fields.
    slots:
      - cchs_uid
      - catalog_id
      - survey
      - year
      - temporal_type
      - chms_cycle
      - chms_component
      - doc_type
      - category
      - subcategory
      - secondary_categories
      - content_tags
      - language
      - version
      - sequence
      - filename
      - canonical_filename
      - source
      - source_namespace
      - source_filepath
      - local_path
      - osf_path
      - pumf_path
      - file_extension
      - file_size
      - checksum
      - created_date
      - last_modified
      - tags
      - extracted

  ExtractedData:
    description: >-
      Metadata about machine-readable data extracted from PDF documentation.
      Used in PDF catalog entries to link to their extracted YAML/QMD outputs.
    attributes:
      cchs_uid:
        description: Unique identifier for the extracted file
        required: true
        examples:
          - "cchs-2015d-p-dd-e-yaml-01"
      path:
        description: Relative path to extracted file from repository root
        required: true
        examples:
          - "cchs-extracted/data-dictionary/2015-2016/cchs_2015d_dd_p_en_1_v1.yaml"
          - "cchs-extracted/user-guide/2015-2016/cchs_2015d_ug_p_en_1_v1.qmd"
      format:
        description: Format of extracted file
        range: ExtractedFormatEnum
        required: true
      extraction_date:
        description: Date when extraction was performed (ISO 8601)
        range: date
        required: true
      extraction_script:
        description: Name of extraction script used
        examples:
          - "extract_data_dictionary.R"
          - "extract_user_guide.R"
          - "extract_derived_variables.R"
      extraction_version:
        description: Version of extraction script used
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        examples:
          - "1.0.0"
          - "1.1.0"
      variables_count:
        description: Number of variables extracted (for data dictionaries, derived variables)
        range: integer
        required: false
      sections_count:
        description: Number of sections extracted (for user guides)
        range: integer
        required: false
      modules_count:
        description: Number of modules extracted (for derived variables)
        range: integer
        required: false

  ExtractedFile:
    description: >-
      A machine-readable file extracted from a source PDF.
      First-class catalog entry with bidirectional link to source.
    is_a: CCHSFile
    attributes:
      derived_from:
        description: cchs_uid of the source PDF this was extracted from
        required: true
        examples:
          - "cchs-2015d-p-dd-en-pdf-01"
      extraction_date:
        description: Date when extraction was performed (ISO 8601)
        range: date
        required: true
      extraction_script:
        description: Name of extraction script used
        required: true
      extraction_version:
        description: Version of extraction script used
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      source_checksum:
        description: SHA-256 checksum of source PDF at extraction time
        pattern: "^[a-f0-9]{64}$"
      variables_count:
        description: Number of variables extracted
        range: integer
      sections_count:
        description: Number of sections extracted
        range: integer
      modules_count:
        description: Number of modules extracted
        range: integer

  CCHSCatalog:
    description: >-
      Complete catalog of CCHS files with metadata and namespace support
    slots:
      - catalog_metadata
      - files

  CatalogMetadata:
    description: >-
      Enhanced metadata about the catalog with namespaces and documentation
    slots:
      - version
      - created_date
      - last_updated
      - total_files
      - years_covered
      - uid_system_version
      - data_sources
      - namespaces
      - field_descriptions
      - generation_formulas

  NamespaceConfig:
    description: >-
      Namespace definitions for different path types
    slots:
      - local
      - osf
      - github

#==================================
# Slots (Properties)
#==================================

slots:

  # Enhanced primary identifiers
  cchs_uid:
    description: >-
      Unique identifier with temporal awareness, optional subcategory, and file extension.

      Format v3.0: cchs-{year}{temporal}-{doc_type}-{category}-[{subcategory}-]{language}-{extension}-{sequence:02d}

      Subcategory is optional but recommended when multiple files of same type exist.
      Common subcategories: main, simp, subs, freq, rev, alt, comp, synt, spec
    pattern: "^cchs-[0-9]{4}[sdm]-[msp]-[a-z0-9-]+(-[a-z]{4})?-(e|f)-(pdf|doc|docx|sas|sps|do|dct|txt|csv|xlsx|mdb|log|xml|webarchive|html|yaml|qmd|md)-[0-9]{2}$"
    examples:
      - cchs-2009d-m-qu-e-pdf-01
      - cchs-2005s-p-dd-main-e-pdf-01
      - cchs-2005s-p-dd-simp-e-pdf-02
      - cchs-2001s-p-questionnaire-rev-e-pdf-01
      - cchs-2015d-p-ddi-metadata-main-e-xml-01
      - cchs-2020s-p-questionnaire-alt-e-webarchive-02
      - cchs-2021s-p-questionnaire-alt-e-html-02
      - cchs-2015d-p-dd-e-yaml-01
      - cchs-2015d-p-ug-e-qmd-01
      - cchs-2015d-p-dv-e-yaml-01

  catalog_id:
    description: 6-character alphanumeric unique identifier for referencing
    pattern: "^[0-9A-Z]{6}$"
    examples:
      - A1B2C3
      - XYZ123
      - M5PAL5

  # Survey identification
  survey:
    description: Survey type (CCHS or CHMS)
    range: SurveyEnum
    required: true

  # Core file components (CCHS-specific)
  year:
    description: Survey year as string (CCHS only)
    pattern: "^[0-9]{4}$"
    examples:
      - "2001"
      - "2009"
      - "2023"

  temporal_type:
    description: Temporal scope of survey (CCHS only)
    range: TemporalTypeEnum

  # Core file components (CHMS-specific)
  chms_cycle:
    description: CHMS cycle (CHMS only)
    range: CHMSCycleEnum

  chms_component:
    description: CHMS component/subsample (CHMS only)
    range: CHMSComponentEnum

  # Shared file components
  doc_type:
    description: "Document type classification (CCHS: master/share/pumf, CHMS: not applicable)"
    range: DocTypeEnum

  category:
    description: Primary document category name
    range: DocumentCategoryEnum

  subcategory:
    description: Optional subcategory code for differentiating file variants
    range: SubcategoryEnum
    required: false

  secondary_categories:
    description: Additional content categories for multi-purpose documents
    multivalued: true
    range: DocumentCategoryEnum

  content_tags:
    description: Semantic content classification tags
    multivalued: true

  language:
    description: ISO 639-1 language code
    range: LanguageCodeEnum

  version:
    description: Document version in v1, v2, v3 format
    pattern: "^v[0-9]+$"
    examples:
      - v1
      - v2
      - v10

  sequence:
    description: Integer sequence for multiple versions
    range: integer
    minimum_value: 1

  # File identification
  filename:
    description: Original filename from source
    required: true

  canonical_filename:
    description: Standardized filename following Jenny Bryan conventions with optional subcategory
    pattern: "^cchs_[0-9]{4}[sdm]_([a-z0-9-]+_){1,2}[msp]_[a-z]+_[0-9]+_v[0-9]+\\.[a-z0-9]+$"
    examples:
      - cchs_2001s_questionnaire_m_en_1_v1.doc
      - cchs_2005s_data-dictionary_main_p_en_1_v1.pdf
      - cchs_2005s_data-dictionary_simp_p_en_2_v1.pdf
      - cchs_2009d_user-guide_m_fr_1_v2.pdf
      - cchs_2015d_bootstrap_p_en_1_v1.pdf
      - cchs_2020s_questionnaire_alt_p_en_2_v1.webarchive
      - cchs_2021s_questionnaire_alt_p_en_2_v1.html

  source:
    description: Data source identifier
    range: DataSourceEnum
    required: true

  source_namespace:
    description: >-
      Reference to namespace in catalog metadata that defines the source location.
      Links to namespaces defined in catalog_metadata for URL reconstruction and provenance tracking.
    required: true
    examples:
      - "osf_cchs_docs"
      - "gdrive_pumf_collection"
      - "local_osf_mirror"

  source_filepath:
    description: >-
      Original filepath (path + filename) from the source location.
      Combined with source_namespace, this allows full URL reconstruction.
      Preserves original file location for provenance and traceability.
    required: true
    examples:
      - "2001/1.1/Master/Docs/CCHS 1.1 household questionnaire_e.doc"
      - "CCHS-PUMF/Bootstrap/Bootstrap_weights.pdf"
      - "2009/12-Month/Master/Layout/hs_fmt.sas"

  local_path:
    description: >-
      DEPRECATED: Use source_filepath with local namespace instead.
      Relative path in local repository (namespace prefix removed).
    required: false
    examples:
      - "2001/1.1/Master/Docs/CCHS 1.1 household questionnaire_e.doc"
      - "2009/12-Month/Master/Layout/hs_fmt.sas"

  osf_path:
    description: >-
      DEPRECATED: Use source_filepath with OSF namespace instead.
      Relative OSF repository path.
    required: false
    examples:
      - "2001/1.1/Master/Docs/CCHS 1.1 household questionnaire_e.doc"

  pumf_path:
    description: >-
      DEPRECATED: Use source_filepath with PUMF namespace instead.
      Relative PUMF repository path (for PUMF files only).
    required: false
    examples:
      - "CCHS-PUMF/Bootstrap/Bootstrap_E.pdf"
      - "CCHS-PUMF/CCHS_DDI/cchs-82M0013-E-2001-c1-1-general-file.xml"

  file_extension:
    description: File extension type
    range: FileExtensionEnum

  # File metadata
  file_size:
    description: File size in bytes
    range: integer
    minimum_value: 0

  checksum:
    description: SHA-256 file checksum for integrity
    pattern: "^[a-f0-9]{64}$"

  created_date:
    description: Catalog entry creation date (ISO 8601)
    range: date

  last_modified:
    description: Last modification date (ISO 8601)
    range: date

  tags:
    description: Additional metadata tags (derivable tags removed)
    multivalued: true

  # Extracted data slot
  extracted:
    description: >-
      Metadata about machine-readable data extracted from this PDF file.
      Links to YAML/JSON/Markdown files in cchs-extracted/ folder.
    range: ExtractedData
    required: false

  # Catalog-level slots
  catalog_metadata:
    range: CatalogMetadata

  files:
    range: CCHSFile
    multivalued: true

  # Catalog metadata slots
  catalog_version:
    description: Catalog version (v1, v2, etc.)
    pattern: "^v[0-9]+$"

  last_updated:
    description: Last catalog update date
    range: date

  total_files:
    description: Total number of files in catalog
    range: integer
    minimum_value: 0

  years_covered:
    description: Range of years covered
    pattern: "^[0-9]{4}-[0-9]{4}$"
    examples:
      - "2001-2023"

  uid_system_version:
    description: Version of UID system used

  data_sources:
    description: Data sources for catalog
    multivalued: true

  # Namespace configuration
  namespaces:
    description: Namespace definitions for path resolution
    range: NamespaceConfig

  local:
    description: Local filesystem namespace
    examples:
      - "cchs-osf-docs/"

  osf:
    description: OSF repository namespace
    examples:
      - "https://osf.io/project-id/"

  github:
    description: GitHub repository namespace
    examples:
      - "https://github.com/user/repo/blob/main/"

  # Documentation
  field_descriptions:
    description: Field descriptions for documentation including enhanced categorization fields
    examples:
      - "secondary_categories: Additional content types found in multi-purpose documents"
      - "content_tags: Semantic classification for improved searchability"

  generation_formulas:
    description: Generation formulas for computed fields

#==================================
# Enumerations
#==================================

enums:

  SurveyEnum:
    description: Canadian health survey classification
    permissible_values:
      CCHS:
        description: Canadian Community Health Survey
      CHMS:
        description: Canadian Health Measures Survey

  TemporalTypeEnum:
    description: Temporal scope classification (CCHS-specific)
    permissible_values:
      single:
        description: Single year survey
      dual:
        description: Two-year cycle survey
      multi:
        description: Multi-year survey

  CHMSCycleEnum:
    description: CHMS cycle classification
    permissible_values:
      cycle1:
        description: CHMS Cycle 1
      cycle2:
        description: CHMS Cycle 2
      cycle3:
        description: CHMS Cycle 3
      cycle4:
        description: CHMS Cycle 4
      cycle5:
        description: CHMS Cycle 5
      cycle6:
        description: CHMS Cycle 6

  CHMSComponentEnum:
    description: CHMS component/subsample classification
    permissible_values:
      gen:
        description: General documentation (user guides)
      hhd:
        description: Household questionnaire
      clc:
        description: Clinic questionnaire
      ams:
        description: Activity Monitor Subsample
      fast:
        description: Fasting subsample
      nel:
        description: Nutrition/Environmental subsample
      med:
        description: Medication data
      inc:
        description: Income-linked data
      hcl:
        description: Health Claims supplement

  DocTypeEnum:
    description: Document type classification
    permissible_values:
      master:
        description: Master files (RDC)
      share:
        description: Share files (synthetic/subset)
      pumf:
        description: Public Use Microdata Files

  SubcategoryEnum:
    description: Optional subcategory codes for differentiating file variants
    permissible_values:
      main:
        description: Main/primary version (typically full format from Statistics Canada)
      simp:
        description: Simplified format (typically user-friendly tabular format)
      subs:
        description: Sub-sample or subset version
      freq:
        description: Frequency distribution version
      rev:
        description: Revised or updated version
      alt:
        description: Alternative format or version
      comp:
        description: Companion or supplementary document
      synt:
        description: Synthetic data version
      spec:
        description: Special topic or focused subset

  DocumentCategoryEnum:
    description: Enhanced document category classification
    permissible_values:
      questionnaire:
        description: Survey instruments and question sets
      user-guide:
        description: Survey methodology and usage guidance
      data-dictionary:
        description: Variable definitions and coding schemes
      record-layout:
        description: Record layout documentation
      derived-variables:
        description: Calculated variables documentation
      content-overview:
        description: Content overview documentation
      optional-content:
        description: Optional content documentation
      interpreting-estimates:
        description: Guidance on interpreting estimates
      household-weights:
        description: Household weighting documentation
      cv-tables:
        description: Coefficient of variation tables
      alpha-index:
        description: Alphabetical index
      topical-index:
        description: Topical index
      income-imputation:
        description: Income imputation documentation
      errata:
        description: Error corrections and updates
      ddi-metadata:
        description: DDI (Data Documentation Initiative) metadata XML files
      bootstrap:
        description: Bootstrap variance estimation documentation
      quality-assurance:
        description: Quality assurance guidelines for survey usage
      study-documentation:
        description: Study methodology documentation (Statistics Canada PUMF format)
      format-file:
        description: SAS format files
      frequency-file:
        description: Frequency files
      label-file-english:
        description: English label files
      label-file-french:
        description: French label files
      print-format-english:
        description: English print format files
      print-format-french:
        description: French print format files
      weights-file:
        description: Weights files
      read-master:
        description: Read master files
      read-share:
        description: Read share files
      syntax-sas:
        description: SAS syntax files
      syntax-spss:
        description: SPSS syntax files
      syntax-stata:
        description: Stata syntax files
      missing-values:
        description: Missing values files
      value-labels-english:
        description: English value labels
      value-labels-french:
        description: French value labels
      variable-labels-english:
        description: English variable labels
      variable-labels-french:
        description: French variable labels
      input-format:
        description: Input format files
      readme:
        description: README files
      other:
        description: Other documentation

  LanguageCodeEnum:
    description: ISO 639-1 language codes
    permissible_values:
      EN:
        description: English
      FR:
        description: French

  NamespaceTypeEnum:
    description: Namespace type classification for source locations
    permissible_values:
      osf:
        description: Open Science Framework (OSF.io) project or component
      gdrive:
        description: Google Drive folder
      local:
        description: Local filesystem mirror
      odesi:
        description: ODESI (Ontario Data Documentation, Extraction Service and Infrastructure)
      statcan:
        description: Statistics Canada repository
      other:
        description: Other source type

  DataSourceEnum:
    description: Data source classification
    permissible_values:
      osf:
        description: OSF.io StatCan RDC documentation
      pumf:
        description: Google Drive PUMF documentation
      other:
        description: Other sources

  ExtractedFormatEnum:
    description: Format of extracted machine-readable data
    permissible_values:
      yaml:
        description: YAML structured data (for data dictionaries, derived variables)
      json:
        description: JSON structured data
      md:
        description: Markdown with YAML frontmatter (for user guides, prose documents)

  FileExtensionEnum:
    description: File extension types
    permissible_values:
      pdf:
        description: PDF document
      doc:
        description: Word document (old format)
      docx:
        description: Word document (new format)
      yaml:
        description: YAML structured data (extracted from PDF)
      qmd:
        description: Quarto markdown (extracted from PDF)
      md:
        description: Markdown document
      sas:
        description: SAS syntax file
      sps:
        description: SPSS syntax file
      do:
        description: Stata do-file
      dct:
        description: Stata dictionary file
      txt:
        description: Text file
      csv:
        description: CSV data file
      xlsx:
        description: Excel file
      mdb:
        description: Microsoft Access database
      log:
        description: Log file
      xml:
        description: XML metadata file (DDI/metadata)
      webarchive:
        description: Web archive file (macOS Safari webarchive format)
      html:
        description: HTML web page
