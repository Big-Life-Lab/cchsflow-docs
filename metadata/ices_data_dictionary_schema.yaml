# CCHS Data Dictionary Schema (ICES Source)
# LinkML schema for CCHS variable metadata from ICES Data Dictionary
#
# This schema defines the structure for storing variable availability
# information scraped from the ICES Data Dictionary website.
# Note: This is Statistics Canada CCHS data, organized on the ICES website.
#
# Source: https://datadictionary.ices.on.ca/Applications/DataDictionary/Library.aspx?Library=CCHS

id: https://github.com/Big-Life-Lab/cchsflow-docs/schemas/cchs-data-dictionary
name: cchs_data_dictionary
title: CCHS Data Dictionary Schema (ICES Source)
description: >-
  Schema for CCHS variable metadata from ICES Data Dictionary, including
  variable definitions, dataset availability, and value code mappings.

version: 1.0.0
license: CC-BY-4.0

prefixes:
  linkml: https://w3id.org/linkml/
  ices: https://datadictionary.ices.on.ca/
  cchs: https://github.com/Big-Life-Lab/cchsflow-docs/

default_prefix: cchs
default_range: string

imports:
  - linkml:types

# =============================================================================
# Classes
# =============================================================================

classes:

  CchsCatalog:
    description: Root container for CCHS data dictionary metadata from ICES
    attributes:
      catalog_metadata:
        range: CatalogMetadata
        required: true
      variables:
        range: CchsVariable
        multivalued: true
        inlined_as_list: true
      datasets:
        range: CchsDataset
        multivalued: true
        inlined_as_list: true
      formats:
        range: ValueFormat
        multivalued: true
        inlined_as_list: true
        description: Unique value formats with their code mappings

  CatalogMetadata:
    description: Metadata about the catalog itself
    attributes:
      version:
        range: string
        required: true
        description: Semantic version of the catalog
      created_date:
        range: date
        required: true
      last_updated:
        range: date
        required: true
      source:
        range: string
        required: true
        description: Data source name
      source_url:
        range: uri
        required: true
      scrape_date:
        range: date
        description: Date the data was scraped from ICES
      total_variables:
        range: integer
      total_datasets:
        range: integer
      total_formats:
        range: integer
      ices_library:
        range: string
        description: ICES library name (e.g., "CCHS")



  CchsDataset:
    description: A CCHS dataset from the ICES data dictionary (raw scraped data)
    comments:
      - Dataset IDs are stored verbatim as they appear on the ICES website
      - No parsing or interpretation of the dataset name is performed during scrape
      - Derived fields (year, cycle, type, region) may be added post-scrape
    attributes:
      dataset_id:
        range: string
        required: true
        identifier: true
        description: >-
          Dataset identifier exactly as it appears in ICES "Available In" field
          (e.g., "CCHS2009_ONT_SHARE", "CCHS201112_CCHS_PUMF")
      variable_count:
        range: integer
        description: Number of variables available in this dataset (computed after scrape)

  ValueFormat:
    description: A value format with its code mappings
    attributes:
      format_name:
        range: string
        required: true
        identifier: true
        description: Format identifier (e.g., "CCHS_YESNOFM")
      codes:
        range: ValueCode
        multivalued: true
        inlined_as_list: true
        description: List of code/label pairs

  ValueCode:
    description: A single value code within a format
    attributes:
      code:
        range: string
        required: true
        description: Numeric or string code value
      label:
        range: string
        required: true
        description: Human-readable label for the code

# =============================================================================
# Enums
# =============================================================================
#
# Note: Enums are intentionally minimal. The scraper stores raw ICES values.
# Post-scrape analysis may identify additional valid values not listed here.

enums:
  # No enums defined for raw scrape data
  # Variable types and dataset naming conventions will be analyzed post-scrape

# =============================================================================
# Slots (reusable attribute definitions)
# =============================================================================

slots:
  variable_name:
    description: Unique variable identifier
    range: string
    required: true
  dataset_id:
    description: Unique dataset identifier
    range: string
    required: true
  format_name:
    description: Format identifier
    range: string
