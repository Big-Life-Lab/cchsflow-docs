  INCDHH:
    name: INCDHH
    label: ~
    based_on: INC_3
    description: This variable groups the total household income from all sources.
      A range category was previously assigned by the application to respondents who
      provided an exact amount in question INC_3. Starting in 2011, the upper category
      changed from $100,000 to $150,000. The territories are excluded in this derived
      variable.
    note: 'Starting with the 2011 data, INC_3 has been imputed and values in INCDHH
      are now based on INC_3 only. Prior to the 2011 data, Category 1 in INCDHH was
      based on INC_3. All other categories were based on range categories (INC_5B,
      INC_5C). Beginning with the 2011 data, the household income variable (INCDHH)
      is imputed. Missing values (due to either respondent refusal or respondent’s
      lack of knowledge of household income) will be imputed using statistical techniques.
      The main variable of interest is INC_3: ‘Total household income - best estimate’
      but all variables that are derived based on household income are affected. The
      income variables along with an imputation flag (INCFIMP4) indicating which values
      were imputed is provided on the data file. The imputation is a two step process.
      First, observations that provide the income range INC_5 have values imputed
      within that range. A nearest neighbour donor approach is used that finds a respondent
      with similar characteristics as the non- respondent and ‘donates’ the income
      value to the non-respondent. For those that do not provide a range, a similar
      process is used but the donor values are not limited to the range. For more
      information on the imputation process, please refer to the document ‘Income
      Imputation for the Canadian Community Health Survey’ available by request at
      hd-ds@statcan.gc.ca'
    specifications:
      - value: '99'
        condition: (INC_3 in (DK,RF,NS)
        description: The household income questions was not answered NS
        notes: ''
      - value: '1'
        condition: INC_3 <= 0
