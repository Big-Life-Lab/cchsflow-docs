    based_on: SDC_41
    description: This derived variable indicates whether the respondent reported being
      an Aboriginal person.
    note: In 2011, the term "First nations" replaced "North American Indian" in the
      question used to collect information on aboriginal identity (SDC_Q4B_1). Also
      the same year, this question was only asked to respondents reporting being born
      in Canada, United States, Germany or Greenland. Others reporting being born
      elsewhere were not asked the question on aboriginal identity. Prior to June
      2005 (middle of Cycle 3.1), respondents were able to report aboriginal background
      in combination with other cultural or racial backgrounds. All Aboriginal respondents
      were assigned a value of 1 for that variable regardless of whether they reported
      aboriginal background singly or in combination with non-aboriginal background.
      Since June 2005, respondents identifying themselves as Aboriginal are not asked
      SDC_Q43A to SDC_Q43M, which collect information on other backgrounds. This change
      was introduced in order to align with the procedures used in the 2006 Census.
