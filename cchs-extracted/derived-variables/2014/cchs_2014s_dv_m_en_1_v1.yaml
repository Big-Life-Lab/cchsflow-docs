      - ADM_PRX
      - SCP_01
      - SCP_02
      - SCP_03
      - SCP_04
    description: 'The stages of change model defines five stages of change in the
      process of physical activity. 1. Precontemplation: Respondent reports being
      a bit or not at all physically active and has no intention to increase physical
      activity in the next six months. 2. Contemplation: Respondent reports being
      a bit or not at all physically active and intends to increase physical activity
      level in the next six months. 3. Preparation: Respondent reports being a bit
      or not at all physically active and intends to increase physical activity level
      in the next 30 days. 4. Action: Respondent reports being very or moderately
      physically active and increased physical activity in the past six months. 5.
      Maintenance: Respondent reports being very or moderately physically active and
      did not increase physical activity in past six months. Source: Transtheoretical
      model, Cancer Prevention Research Center www.uri.edu/research/cprc/measures/Exercise02.htm.
      Specifications'
