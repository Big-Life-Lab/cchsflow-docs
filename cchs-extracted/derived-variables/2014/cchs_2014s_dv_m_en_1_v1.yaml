  HWTDBMI:
    name: HWTDBMI
    label: ~
    based_on:
      - HWTDHTM
      - HWTDWTK
    description: The Body Mass Index (BMI) for this variable is based on self-reported
      height and weight. BMI is a comparison of "weight" relative to the "height"
      of respondents. BMI is calculated by dividing weight in kilograms by height
      in metres squared. BMI = WEIGHT (KG) / HEIGHT (METRES) SQUARED
    note: 'BMI is not calculated for pregnant women. Although calculation of BMI is
      not recommended for lactating women, the index provided here is calculated for
      women who report that they are breastfeeding (MEX_05 = 1) to permit comparability
      with previous cycles of CCHS and NPHS. For Cycle 1.1 of CCHS, BMI was calculated
      only for respondents aged 20-64. Beginning with Cycle 2.1, BMI is calculated
      for June 2015 72 respondents aged 18 and over. With the introduction of a new
      classification system for people under 18 in Cycle 3.1, BMI is now calculated
      for people less than 18. This BMI classification is created using "self-reported
      height" and "self-reported weight" variables. A systematic review of the literature
      concluded that the use of self-reported data among adults underestimates weight
      and overestimates height, resulting in lower estimates of obesity than those
      obtained from measured data (Connor Gorber et al. 2007). Obesity estimates based
      on the CCHS are subject to these biases (Shields et al. 2008b). Using data from
      the 2005 correction equations have been developed (Connor Gorber et al. 2008).
      These correction equations have been successfully applied to both 2005 and 2008
      self-reported CCHS data to produce more accurate estimates of obesity (Connor
      Gorber et al. 2008; Shields et al. 2011). Differences between corrected estimates
      of obesity from the CCHS and measured estimates from the Canadian Health Measures
      Survey will be monitored over time to determine if the bias in self-reported
      values is changing and if new correction equations need to be developed. Another
      problem associated with the use of self-reported data is that it distorts our
      understanding of the relationship between obesity and obesity-related diseases.
      The misclassification that occurs when BMI categories are based on self-reported
      data results in elevated associations between obesity and obesity-related diseases
      such as hypertension and diabetes (Shields et al. 2008a). Associations between
      BMI categories and these health conditions are more accurate when based on corrected
      Here are the equations. They should be applied to the population age 18 or older.
      if sex=1 then bmi_c=-1.07575 + 1.07592*bmi_sr; if sex=2 then bmi_c=-0.12374
      + 1.05129*bmi_sr; References 1. Connor Gorber S, Shields M, Tremblay MS, McDowell
      I. The feasibility of establishing correction factors to adjust self- reported
      estimates of obesity. Health Reports (Statistics Canada, Catalogue 82-003) 2008;
      19(3): 71-82. 2. Connor Gorber S, Tremblay M, Moher D, Gorber B. A comparison
      of direct vs. self-report measures for assessing height, weight and body mass
      index: a systematic review. Obesity Reviews 2007; 8(4): 307-26. 3. Shields M,
      Connor Gorber S, Tremblay MS. Effects of measurement on obesity and morbidity.
      Health Reports (Statistics Canada, Catalogue 82-003) 2008a; 19(2): 77-84. 4.
      Shields M, Connor Gorber S, Tremblay MS. Estimates of obesity based on self-report
      versus direct measures. Health Reports (Statistics Canada, Catalogue 82-003)
