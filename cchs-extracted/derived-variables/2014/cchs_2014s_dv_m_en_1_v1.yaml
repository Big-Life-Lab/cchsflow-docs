    note: 'Starting with the 2011 data, this variable is an update of SDCGCB. The
      country code is based on the Standard Classification of Countries and Areas
      of Interest (SCCAI) of 2010. The SCCAI is Statistics Canada''s official classification
      of countries and areas of interest for use in classifying statistical data.
