  GEODPC:
    name: GEODPC
    label: ~
    based_on: Respondent address information
    description: The Canadian postal code offers a unique reference system which provides
      a means of identifying a mail delivery location. It is composed of six alpha-numeric
      characters, in the form of "ANA NAN", where "A" represents a letter of the alphabet
      and "N" a number. The first character of a postal code (allocated in alphabetic
      sequence from east to west across Canada) represents a province or territory
      or a major sector entirely within a province. GEODPC is derived from the respondents
      available address information.
