  INCDRPR:
    name: INCDRPR
    module: YSM
    based_on:
      - INCDADR
      - GEO_PRV
    description: This derived variable is a distribution of residents of each province
      in deciles (ten categories including approximately the same percentage of residents
      for each province) based on their value for INCDADR, ie. the adjusted ratio
      of their total household income to the low income cut-off corresponding to their
      household and community size. It provides, for each respondent, a relative measure
