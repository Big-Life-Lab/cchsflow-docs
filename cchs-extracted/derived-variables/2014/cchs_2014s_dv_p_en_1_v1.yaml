    note: 'This variable is only defined for households with individuals who are either
      aged 15 or less (DHHDYKD=1), or aged 16 or 17 (DHHDOKD=1) and who are the child,
      grandchild, child-in-law, niece or nephew of another household member. This
      variable does not necessarily reflect the experience of all child members in
