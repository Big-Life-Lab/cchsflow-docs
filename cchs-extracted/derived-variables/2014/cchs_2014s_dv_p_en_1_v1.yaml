  CPGDTYP:
    name: CPGDTYP
    module: YSM
    based_on:
      - CPGDSEV
      - CPGFGAM
    description: This variable categorizes respondents based on the severity of their
      problems associated with gambling.
    note: A modification from the CPGI is that if respondents volunteered in CPG_02
      that "I am not a gambler", they were not asked the severity questions despite
      having reported gambling activity in the past 12 months. These respondents are
      assigned a code of 95. In addition, respondents who reported participating in
      each gambling activity from CPG_01 to CPG_01M at most 1 to 5 times each during
      the past year were not asked questions on problem gambling. Finally, gambling
      activities were regrouped in the questionnaire into fewer categories than used
      in the original CPGI. Modifications made to the original instrument were approved
      by Dr. Wynne.
    specifications:
      - value: '96'
        condition: DOCPG = 2
        description: Module not selected
        notes: NA
      - value: '99'
        condition: ADM_PRX = 1
        description: Module not asked (proxy interview)
        notes: NS
      - value: '99'
        condition: CPGDSEV = NS
        description: At least one required question was not answered
        notes: NS
      - value: '95'
        condition: CPGDSEV = 95
        description: Does not consider himself a gambler - severity
        notes: ''
      - value: '1'
        condition: CPGFGAM = 2
        description: Non-gambler
        notes: ''
      - value: '2'
        condition: CPGDSEV = 0
        description: Non-problem gambler
        notes: ''
      - value: '3'
        condition: (CPGDSEV = 1, 2)
        description: Low risk gambler
        notes: ''
      - value: '4'
        condition: (CPGDSEV = 3, 4, 5, 6, 7)
        description: Moderate risk gambler
        notes: ''
      - value: '5'
        condition: CPGDSEV >= 8
        description: Problem gambler
        notes: ''
