  ALDDPP:
    name: ALDDPP
    module: YSM
    based_on: ALDDSF
    description: This variable calculates, from the alcohol dependence scale score
      obtained, the probability (expressed as a proportion) that the respondends would
      have been diagnosed with an alcohol dependence, if they had completed the Long-Form
      Composite International Diagnostic Interview (CIDI) at the time of the interview.
    note: The probability of caseness to respondents was assigned based on their short-form
      scores. The short-form measure of Alcohol Dependence was developed to reproduce
      a measure that operationalized both Criterion A and Criterion B of the DSM-
      lll-R diagnosis for Psychoactive Substance Use Disorder. A probability of caseness
      of 0 was assigned to respondents who denied the stem questions. The optimal
      dichotomous classification rule is to define all respondents with a short-form
      score of 3 or more as probable cases and all those with scores of 0 through
      2 as probable non-cases. cross-classified against Alcohol Dependence caseness
      designations based on the CIDI diagnostic computer program.
    specifications:
      - value: '9.96'
        condition: ALDDSF = 96
        description: Module not selected
        notes: NA
