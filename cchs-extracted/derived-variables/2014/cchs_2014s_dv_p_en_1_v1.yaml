        condition: ALDDSF = 0
        description: Probability of caseness to respondents
        notes: ''
      - value: '0.05'
        condition: ALDDSF = 1
        description: Probability of caseness to respondents
        notes: ''
      - value: '0.40'
        condition: ALDDSF = 2
        description: Probability of caseness to respondents
        notes: ''
      - value: '0.85'
        condition: ALDDSF = 3
        description: Probability of caseness to respondents
        notes: ''
      - value: '1.00'
        condition: (3 < ALDDSF < 96)
        description: Probability of caseness to respondents
        notes: ''
