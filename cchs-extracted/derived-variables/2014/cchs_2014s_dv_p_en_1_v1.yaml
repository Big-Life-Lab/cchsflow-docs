    module: YSM
    based_on:
      - INCDADR
      - GEODHR4
    description: This derived variable is a distribution of residents of each health
      region in deciles (ten categories including approximately the same percentage
      of residents for each province) based on their value for INCDADR, ie. the adjusted
      ratio of their total household income to the low income cut-off corresponding
      to their household and community size. It provides, for each respondent, a relative
      measure of their household income to the household incomes of all other respondents
      in the same health region. The Territories are excluded from this derived variable.
    note: Deciles are generated using weighted data. Adjusted ratios are presented
      in increasing order, from smallest to largest, for each of the 117 health regions
      irrespective of household and community size. Derived variables are calculated
      only for valid responses (not stated, refusal, etc. are excluded). Boundaries
      are determined in order to derive deciles from the total weighted number of
      cases for which derived variables are calculated. The INCDRRS values are based
      on a distribution of adjusted ratios for the residents of each of the 122 health
      regions. This variable should therefore be used in conjunction with the variable
      for the health region province of residence (GEODHR4).
