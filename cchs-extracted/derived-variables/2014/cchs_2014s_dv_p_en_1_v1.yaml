      - FSC_060
      - FSC_070
      - FSC_080
      - FSC_081
      - FSC_090
      - FSC_100
      - FSC_110
    description: 'This variable is based on a set of 18 questions and describes the
      food security situation of the household in the previous 12 months. It captures
      three kinds of situations: 1- Food secure: No, or one, indication of difficulty
      with income-related food access. 2- Moderately food insecure: Indication of
      compromise in quality and/or quantity of food consumed. 3- Severely food insecure:
      Indication of reduced food intake and disrupted eating patterns. This variable
      is adopted from the Health Canada model of food security status.'
    note: 'When using the person weight (WTS_M), this variable reflects the number
      of people living the household with food insecurity. When using the household
      weight (WTS_MHH), this variable reflects the number of households with food
      insecurity. Households with children are defined as households with individuals
      who are either aged 15 or less (DHHDYKD=1), or aged 16 or 17 (DHHDOKD=1) and
      who are the child, grandchild, child-in-law, niece or nephew of another household
      member. In order to determine household food security status, responses to each
      question are first coded as either "affirmative" or "negative". Some of this
      coding is obvious because the only response options are "yes" or "no". For questions
      with less obvious response categories, the procedure for coding is as follows:
      response categories such as "Often true", "Sometimes true", "Almost every month",
      "Some months but not every month" are coded as "affirmative" (i.e. coded equal
      to 1). Response categories such as "Never true", "Only 1 or 2 months" are coded
      as "negative" (i.e. coded equal to 0). Internet site: http://www.hc-sc.gc.ca/fn-an/surveill/nutrition/commun/insecurit/status-situation-eng.php'
