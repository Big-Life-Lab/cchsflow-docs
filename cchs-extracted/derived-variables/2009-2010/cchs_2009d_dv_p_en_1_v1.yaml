      - CPG_10
      - CPG_13
      - CPGFGAM
    description: This variable indicates the level of gambling problems of respondents
      using a 9 item scale.
    note: A modification from the CPGI is that if respondents volunteered in CPGB_02
      that "I am not a gambler", they were not asked the severity questions despite
      having reported gambling activity in the past 12 months. These respondents are
      assigned a code of 95 for this variable. In addition, respondents who reported
      participating in each gambling activity from CPGB_01B to CPGB_01M at most 1
      to 5 times each during the past year were not asked questions on problem gambling.
      Finally, gambling activities were regrouped in the questionnaire into fewer
      categories than used in the original CPGI. Modifications made to the original
      instrument were approved by Dr. Wynne. Non-gamblers have been excluded from
      the population. Higher scores indicate more problems associated with gambling.
