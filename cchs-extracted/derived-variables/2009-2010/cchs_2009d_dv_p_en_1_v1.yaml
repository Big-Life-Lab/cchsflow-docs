    name: PACDPAI
    module: SSA
    based_on: PACDEE
    description: This variable categorizes respondents as being "active", "moderately
      active", or "inactive" in their leisure time based on the total daily Energy
      Expenditure values (kcal/kg/day) calculated for PACDEE.
    note: 'The Physical Activity Index follows the same criteria used to categorize
      individuals in the Ontario Health Survey (OHS) and in the Campbell‟s Survey
      on Well Being. Internet site: Campbell Survey on Well-Being in Canada: http://www.cflri.ca//pdf/e/88wkp.pdf'
    specifications:
      - value: '9'
        condition: ADM_PRX = 1
        description: Module not asked - proxy interview
        notes: NS
