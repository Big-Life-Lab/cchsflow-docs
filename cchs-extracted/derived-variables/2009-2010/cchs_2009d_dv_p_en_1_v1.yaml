        condition: (3 <= PACDEE < NA)
        description: Active
        notes: ''
      - value: '2'
        condition: (1.5 <= PACDEE < 3.0)
        description: Moderately active
        notes: ''
      - value: '3'
        condition: (0 <= PACDEE < 1.5)
        description: Inactive
        notes: ''
  PACDLTI:
    name: PACDLTI
    module: SSA
    based_on: PACDTLE
    description: This variable categorizes respondents as being "active", "moderately
      active", or "inactive" in their transportation and leisure time based on the
      total daily Energy Expenditure values (kcal/kg/day) calculated for PACDTLE.
    note: Transportation and Leisure Time Physical Activity Index follows the same
      criteria used in PACDPAI (Leisure Time Physical Activity Index). Tansportation
      physical activity is not collected exclusively in CCHS. For this reason, collected
      information cannot be presented separately from the leisure time physical activities.
