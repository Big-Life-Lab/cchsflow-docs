  PAADVVOL:
    name: PAADVVOL
    module: UPE
    based_on:
      - DHH_AGE
      - PAADVMVA
      - PAADVVIG
    description: This derived variable represents the volume of physical activity
      performed in the last seven days. It is measured in METs*minutes/week. A MET
      is a conceptual value that represents energy expended during physical activity.
      The volume of activity is calculated by multiplying the amount of minutes of
      activity (by level of intensity) by the MET value associated with that intensity.
    note: 'Physical activity at the moderate level is assumed to be 3 METs, while
      vigorous activity is 6 METs. A MET (metabolic equivalent) is the energy cost
      of activity expressed as kilocalories expended per kilogram of body weight per
      hour of activity. Source: B.Nolin (2014). "ESCC 2015, VD globales, Adultes,
      Propositions", Institut national de santé publique du Québec.'
    specifications:
      - value: '99996'
        condition: DOPAA = 2
        description: Module not selected
        notes: NA
      - value: '99996'
        condition: DHH_AGE < 18
        description: Population exclusions
        notes: NA
      - value: '99999'
        condition: PAADVMVA = (DK, RF, NS) or
        description: At least one required question was not answered
        notes: NS
      - value: PAADVVIG = (DK, RF, NS)
        condition: (don’t know, refusal, not stated)
        description: ''
        notes: ''
      - value: '0'
        condition: PAADVMVA = 0
        description: Total weekly volume of activity was 0
        notes: No minutes of any
      - value: (PAADVMVA -
        condition: (0 < PAADVMVA <= 10080) and
        description: Total weekly volume of activity
        notes: ''
      - value: PAADVVIG)*3
        condition: (0 <= PAADVVIG <= 10080)
        description: ''
        notes: ''
