  HWTDGHTM:
    name: HWTDGHTM
    module: UPE
    based_on:
      - HWT_005
      - HWT_020
      - HWT_025
      - HWT_030
      - HWT_035
      - MAC_025
    description: This variable indicates the height of the respondent in metres, either
      as reported or converted from feet and inches (see note). If a respondent reported
      a height below or above a threshold deemed to be a disclosure risk, the value
      for HWTDGHTM is taken to be that threshold. The thresholds used vary by age
      group and sex. For example, if a 44 year old male reports a height below 1.6
      metres, the value for HWTDGHTM is set to 1.6.
    note: 'For example, an individual who reported being 5 feet and 8 inches will
      have a height of 1.727 metres. The 1.727 is the midpoint of the range (1.715-1.739)
      around the height 5 feet and 8 inches. The range values were calculated as follows
      for an individual who is 5''8": LOWER LIMIT: Take the exact value in metres
      for a person who is 5''7" and average it with the value for 5''8". UPPER LIMIT:
      Take the exact value in metres for a person who is 5''9" and average it with
      the value for 5’8" then subtract 0.001 from it.'
    specifications:
      - value: '9.996'
        condition: MAC_025 = 1
        description: Population exclusion - Pregnant women
        notes: NA
      - value: '9.999'
        condition: ADM_PRX = 1
        description: Module not asked - proxy interview
        notes: NS
      - value: '9.999'
        condition: HWT_005 = (DK, RF, NS) or
        description: At least one required question was not answered
        notes: NS
