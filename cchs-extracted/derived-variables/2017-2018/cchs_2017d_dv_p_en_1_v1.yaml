  HWTDGCOR:
    name: HWTDGCOR
    module: UPE
    based_on:
      - DHH_AGE
      - DHH_SEX
      - ADM_PRX
      - HWTDGBMI
      - MAC_025
    description: This variable indicates the respondent's adjusted body mass index
      by applying a correction equation.
    note: A systematic review of the literature concluded that the use of self-reported
      data among adults underestimates weight and overestimates height, resulting
      in lower estimates of obesity than those obtained from measured data (Connor
      Gorber et al. 2007). Obesity estimates based on the CCHS are subject to these
      biases (Shields et al. 2008b). Using data from the 2005 correction equations
      have been developed (Connor Gorber et al. 2008). These correction equations
      have been successfully applied to both 2005 and 2008 self-reported CCHS data
      to produce more accurate estimates of obesity (Connor Gorber et al. 2008; Shields
      et al. 2011). Differences between corrected estimates of obesity from the CCHS
      and measured estimates from the Canadian Health Measures Survey will be monitored
      over time to determine if the bias in self-reported values is changing and if
      new correction equations need to be developed.
    specifications:
      - value: '999.96'
        condition: DHH_AGE < 18 or
        description: Population exclusions
