  HWTDGISW:
    name: HWTDGISW
    module: UPE
    based_on:
      - DHH_AGE
      - HWTDGBMI
      - MAC_025
    description: 'This variable assigns adult respondents aged 18 and over (except
      pregnant women) to one of the following categories, according to their Body
      Mass Index (BMI): underweight; acceptable weight; overweight; and obese class
      I, II, or III. The BMI categories are adopted from a body weight classification
      system recommended by Health Canada and the World Health 06/2020 67 Organization
      (WHO) which has been widely used internationally.'
    note: 'According to Health Canada, this BMI classification system can be used
      as a screening tool to identify weight-related health risks at the population
      and individual levels. At the population level, the BMI classification system
      can be used to compare body weight patterns and related health risks within
      and between populations and to establish population trends in body weight patterns.
      The classification should be used with caution at the individual level because
      the health risk associated with each BMI category varies considerably between
      individuals. Particular caution should be used when classifying: youth who have
      not attained growth maturity, adults who are naturally very lean, very muscular
      adults, some ethnic and racial groups, and adults over 65 years of age.'
    specifications:
      - value: '6'
        condition: DHH_AGE < 18 or
        description: Population exclusions
        notes: NA
      - value: '9'
        condition: HWTDGBMI = NS or
        description: At least one required question was not answered
        notes: NS
      - value: MAC_025 = (DK, RF, NS)
        condition: (don’t know, refusal, not stated)
        description: ''
        notes: ''
      - value: '1'
        condition: HWTDGBMI < 18.50
        description: Underweight
        notes: ''
      - value: '2'
        condition: (18.50 <= HWTDGBMI <= 24.99)
        description: Normal weight
        notes: ''
      - value: '3'
        condition: (25.00 <= HWTDGBMI <= 29.99)
        description: Overweight
        notes: ''
      - value: '4'
        condition: HWTDGBMI >= 30.00
        description: Obese - Class I, II, III
        notes: ''
  HWTDVWHO:
    name: HWTDVWHO
    module: UPE
    based_on:
