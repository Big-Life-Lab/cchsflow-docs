  PAADVACV:
    name: PAADVACV
    module: UPE
    based_on:
      - DHH_AGE
      - PAADVMVA
    description: This derived variable indicates whether a respondent is physically
      active according to the Canadian Physical Activity Guidelines (CPAG).
    note: Physically active is defined by the Canadian Physical Activity Guidelines
      as having at least 150 minutes of moderate- to vigorous-intensity aerobic physical
      activity per week, in bouts of 10 minutes or more.
    specifications:
      - value: '6'
        condition: DOPAA = 2
        description: Module not selected
        notes: NA
      - value: '6'
        condition: DHH_AGE < 18
        description: Population exclusions
        notes: NA
      - value: '9'
        condition: PAADVMVA = NS
        description: At least one required question was not answered
        notes: NS
      - value: '1'
        condition: PAADVMVA => 150
        description: Physically active at or above recommended level
        notes: ''
      - value: '2'
        condition: 1 <= PAADVMVA <=149
        description: Physically active below recommended level from
        notes: ''
      - value: '3'
        condition: PAADVMVA = 0
        description: No physical activity minutes reported
        notes: ''
  PAADVAC2:
    name: PAADVAC2
    module: UPE
    based_on:
      - DHH_AGE
      - PAADVMVA
    description: This derived variable represents an alternate classification of physical
      activity for adults, based on the number of minutes of moderate to vigorous
      activity done in a week. This variable is similar to PAADVACV, but it breaks
      down those who were not above the threshold of 150 minutes per week into subcategories
      of their activity level. 06/2020
    note: 'Some might prefer this derived variable (4 levels), instead of PAADVACV
      (3 levels), to do more detailed analysis. Please note that the four levels in
      this variable are not the same as the levels in PAADVWHO, so results will not
      be comparable. * Other physical activities: physical activities done while at
      work, in or around home or while volunteering. The respondent provides an estimate
      for all three components in the same answer.'
    specifications:
      - value: '6'
        condition: DOPAA = 2
        description: Module not selected
        notes: NA
      - value: '6'
        condition: DHH_AGE < 18
        description: Population exclusions
        notes: NA
      - value: '9'
        condition: PAADVMVA = (DK, RF, NS)
        description: At least one required question was not answered
        notes: NS
      - value: '1'
        condition: PAADVMVA => 150
        description: Level 1 (Duration equal or greater than that
        notes: ''
      - value: '2'
        condition: 75 <= PAADVMVA < 150
        description: Level 2 (Duration ≥ 50% and < 100% of that
        notes: ''
      - value: '3'
        condition: 0 < PAADVMVA < 75
        description: Level 3 (Duration > 0% and < 50% of that
        notes: ''
      - value: '4'
        condition: PAADVMVA = 0
        description: Level 4 (Recreational and other* physical activities
        notes: ''
  PAADVVIG:
