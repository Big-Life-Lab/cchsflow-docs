      - FSC_035
      - FSC_075
      - FSC_080
      - FSC_085
      - FSC_090
      - FSC_095
      - FSCTCSUM
      - DHHDVYKD
    description: 'This variable is based on a set of 8 child-referenced questions
      and describes the food security situation of the child (less than 18 years old)
      members of the household in the previous 12 months. It captures three kinds
      of situations: 06/2020 46 1 - Food secure: No, or one, indication of difficulty
      with income-related food access. 2 - Moderately food insecure: indication of
      compromise in quality and/or quantity of food consumed (2 to 4 affirmative responses).
      3 - Severely food insecure: indication of reduced food intake and disrupted
      eating patterns (>= 5 affirmative responses) This variable is adopted from the
      Health Canada model of food security status.'
    note: 'This variable is only defined for households with individuals who are either
      aged 15 or less (DHHDVYKD=1), or aged 16 or 17 (DHHDVOKD=1) and who are the
      child, foster child, grandchild, child-in-law, niece or nephew of another household
      member. This variable does not necessarily reflect the experience of all child
      members in the household. When using the person weights (WTS_M), this variable
      reflects the number of people living in households with food insecurity among
      the child members of the household. When using the household weights (WTS_MHH),
      this variable reflects the number of households with food insecurity among the
      child members of the household. In order to determine household food security
      status, responses to each question are first coded as either "affirmative" or
      "negative". Some of this coding is obvious because the only response options
      are "yes" or "no". For questions with less obvious response categories, the
      procedure for coding is as follows: response categories such as "Often true",
      "Sometimes true", "Almost every month", "Some months but not every month" are
      coded as "affirmative" (i.e. coded equal to 1). Response categories such as
      "Never true", "Only 1 or 2 months" are coded as "negative" (i.e. coded equal
      to 0). Internet site: http://www.hc-sc.gc.ca/fn-an/surveill/nutrition/commun/insecurit/status-situation-eng.php'
