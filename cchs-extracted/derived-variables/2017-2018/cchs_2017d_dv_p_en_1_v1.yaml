    based_on:
      - DHH_AGE
      - PAADVOTH
    description: This derived variable determines the average daily number of minutes
      of other physical activities in the last 7 days.
    note: The average is based on the total number of minutes of activity in the week,
      that were at least moderate intensity, divided by seven. Moderate exercise is
      defined in the Canadian Physical Activity Guidelines as a physical activity
      of moderate intensity causing harder breathing and sweating at least a little.
    specifications:
      - value: '9999.6'
        condition: DOPAA = 2
        description: Module not selected
        notes: NA
      - value: '9999.6'
        condition: DHH_AGE < 18
        description: Population exclusions
        notes: NA
      - value: '9999.9'
        condition: PAADVOTH = NS
        description: At least one required question was not answered
        notes: NS
      - value: '0'
        condition: PAADVOTH = 0
        description: No minutes of other physical activities in the last 7
        notes: ''
      - value: PAADVOTH / 7
        condition: PAADVOTH = (1:10080)
        description: Average daily number of minutes of other physical
        notes: Rounded to 1
      - value: activities in the last 7 days
        condition: decimal place
        description: ''
        notes: ''
