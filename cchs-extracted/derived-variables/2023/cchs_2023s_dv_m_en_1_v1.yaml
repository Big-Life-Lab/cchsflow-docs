  INCDVHH:
    name: INCDVHH
    label: ~
    based_on: INC_021
    description: ''
    note: 'Beginning in 2016, household income variables (INC_005A-O, INC_010, INC_015
      and INC_021) are derived from tax records where linkage was possible and agreed
      to by the respondent. See INCFIMPH for details on determining which records
      and variables are taken from tax records. The household income variable (INC_021)
      is imputed using stafisfical techniques when it has missing values (due to non-response
      during collecfion or insuﬃcient tax informafion). The main variable of interest
      is INC_021: ''Total household income - best esfimate'' but all variables that
      are derived based on household income are aﬀected. The imputafion is a two-step
      process. First, observafions that provide the income range have values imputed
      within that range. A nearest neighbour donor approach is used that ﬁnds a respondent
      with similar characterisfics as the non- respondent and ''donates'' the income
      value to the non-respondent. For those that do not provide a range, a similar
      process is used but the donor values are not limited to the range. For more
      informafion on the imputafion process, please refer to the document available
      by request at statcan.hd-ds.statcan@statcan.gc.ca'
    specifications:
      - value: '99'
