    description: ''
    note: According to the Ng-Dasgupta-Johnson algorithm, women who are diagnosed
      only during pregnancy are considered as having gestafional diabetes. The CDC,
      on the other hand, indicates that gestafional diabetes goes away soon after
      their baby is born. If it does not go away, the diabetes is considered as type
      2. More than half of respondents who are coded as having gestafional diabetes
      are respondents who were not pregnant at the fime of the interview. Users can
      choose to interpret these cases as either diabetes that has become type 2, or
      a respondent who has indicated having had gestafional diabetes, but it has gone
      away. Respondents who were diagnosed during pregnancy (CCC_15 = 1) and not diagnosed
      other than during pregnancy (CCC_20 = 2) were not asked the quesfions about
      insulin usage or blood sugar pills. Therefore it is not possible to determine
      if the respondent is currently treafing diabetes.
