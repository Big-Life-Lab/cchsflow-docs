variables:
  ADLF6R:
    name: ADLF6R
    label: ~
    based_on:
      - ADL_01
      - ADL_02
      - ADL_03
      - ADL_04
      - ADL_05
      - ADL_06
    description: This variable classifies respondents according to their need for
      help (because of health reasons) with instrumental activities of daily living
      such as preparing meals, shopping for groceries or other necessities, doing
      everyday housework, doing heavy household chores (washing walls, yard work),
      and personal care (washing, dressing or eating), moving about inside the house
      or paying bills.
    note: Prior to 2009, ADLF6R was called RACF6R and was a part of the Restriction
      of Activities (RAC) module. In 2009, all of the questions associated with the
      derived variable RACF6R were moved into a new module called Activities of Daily
      Living (ADL). RACFUR is modified from RACAF6 (CCHS Cycle 1.1) by adding RAC_6G.
      The series of tasks included was revised based on the Participation and Activity
      Limitation Survey. Hence, this derived variable has been modified to take into
      account the revised set of tasks and thus this DV is not entirely comparable
      to RACAF6. The variable was also modified in 2007 as question RAC_6D was no
      longer asked.
    specifications:
      - value: '6'
        condition: DoADL =2
        description: Module wasn't selected or Population exclusions
        notes: NA
      - value: '1'
        condition: ADL_01 = 1 or
        description: Needs help with at least one task
        notes: ''
      - value: '2'
        condition: ADL_01 = 2 and
        description: Does not need help
        notes: ''
      - value: '9'
        condition: (ADL_01 = DK, R, NS) or
        description: At least one required question was not answered
        notes: NS
      - value: (ADL_02 = DK, R, NS) or
        condition: (don't know, refusal, not stated)
        description: ''
        notes: ''
      - value: June 2014
        condition: '1'
        description: ''
        notes: ''
    end_idx: 354.0
    module: WTM
    module_name: Waiting times
  ALCDTTM:
    name: ALCDTTM
    label: ~
    based_on:
      - ALC_1
      - ALC_2
    description: This variable indicates the type of drinker the respondent is based
      on his/her drinking habits in the past 12 months.
    note: This derived variable was introduced in 2007. Some of the questions contained
      within the Alcohol Use module in previous cycles moved to the Alcohol Use During
      the Past Week (ALW) and Alcohol Use - Former Drinkers (ALN) modules. As the
      new modules are optional content, most of the derived variables that were formerly
      calculated for all respondents in the Alcohol Use (ALC) module are now found
      in ALW and ALN and are only calculated for the health regions that selected
      these modules. ALCDTTM was created to allow the classification of all respondents
      according to their drinking habits in the past 12 months.
    specifications:
      - value: '9'
        condition: (ALC_1 in (7,8,9)) or
        description: At least one required question was not answered
        notes: NS
      - value: (ALC_2 in (97,98,99))
        condition: (don't know, refusal, not stated)
        description: ''
        notes: ''
      - value: '1'
        condition: (2 <= ALC_2 < 96)
        description: Regular drinker
        notes: ''
      - value: '2'
        condition: ALC_2 = 1
        description: Occasional drinker
        notes: ''
      - value: '3'
        condition: ALC_1 = 2
        description: Did not drink in the last 12 months
        notes: ''
      - value: June 2014
        condition: '2'
        description: ''
        notes: ''
    end_idx: 388.0
    module: WTM
    module_name: Waiting times
