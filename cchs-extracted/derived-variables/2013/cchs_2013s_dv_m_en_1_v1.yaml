  GEODDA11:
    name: GEODDA11
    label: ~
    based_on: GEODPC
    description: The dissemination area (DA) is a small, relatively stable geographic
      unit composed of one or more dissemination blocks. It is the smallest standard
      geographic area for which all census data are disseminated. DAs cover all the
      territory of Canada. GEODDA11 is based on the Postal Code Conversion File (PCCF),
      which provides a correspondence between the postal code and Statistics Canada's
      standard geographical areas for which census data and other statistics are produced.
      It is composed of the two digit province/territory code, the two digit census
      division code and the four digit dissemination area code. When the postal code
      corresponds to more than one DA, the case is assigned using the "most probable
      DA approach". GEODDA11 is based on the geography from the 2011 census.
    note: There are two variables on the final file for Dissemination Area - one using
      the geography from the 2011 Census (GEODDA11) and one using the geography from
      the 2006 Census (GEODDA06).
    specifications: []
    end_idx: 1619.0
    module: WTM
    module_name: Waiting times
  GEODPC:
    name: GEODPC
    label: ~
    based_on: Respondent address information
    description: The Canadian postal code offers a unique reference system which provides
      a means of identifying a mail delivery location. It is composed of six alpha-numeric
      characters, in the form of "ANA NAN", where "A" represents a letter of the alphabet
      and "N" a number. The first character of a postal code (allocated in alphabetic
      sequence from east to west across Canada) represents a province or territory
      or a major sector entirely within a province. GEODPC is derived from the respondents
      available address information.
    note: ''
    specifications: []
    end_idx: 1633.0
    module: WTM
    module_name: Waiting times
  GEODHR4:
    name: GEODHR4
    label: ~
    based_on: GEODPC
    description: This variable is a 4-digit number that identifies the health region.
      Health regions refer to health administrative areas defined by the provincial
      ministries of health. For complete Canadian coverage, each of the northern territories
      represents its own health region. This variable is derived using the information
      available on the survey frame at the time of sampling and the geographic information
      provided by the respondent. As of 2013, the health regions are based on geography
      from the 2011 Census.
    note: 'More details on health regions can be found in the "Health regions and
      peer groups" section of the online publication "Health Indicators". Correspondence
      files (linking health regions to latest census geographic codes) and digital
      boundary files are also available in the online publication "Health regions:
      Boundaries and Correspondence with Census Geography", Statistics Canada, catalogue
      number 82-402-XWE.'
    specifications: []
    end_idx: 1656.0
    module: WTM
    module_name: Waiting times
