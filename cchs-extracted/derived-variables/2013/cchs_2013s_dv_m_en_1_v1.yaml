    description: This variable classifies diabetes as Type 1, Type 2, or Gestational,
      using the Ng-Dasgupta-Johnson algorithm (Health Reports, 19(1), March 2008).
    note: This derived variable was introduced in 2009. It has been modified in November
      2013 to correct an issue - because of the order of derivations, several cases
      were coded to Type 2 diabetes or to 'not stated' that should have been considered
      gestational. The new derivations no longer have the overlapping conditions.
      Furthermore, the new rules cover all scenarios without the need for a category
      4, 'Unable to classify'. All files with this DV that were created from reference
      period 2009 to 2012, as well as the FS2 and ACC/WTM rapid responses were affected.
      Patch files have been created for users. See the CCHS 2013 Errata for details.
