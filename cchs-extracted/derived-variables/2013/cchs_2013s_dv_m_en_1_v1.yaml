  PACDEE:
    name: PACDEE
    label: ~
    based_on:
      - PAC_1V
      - PAC_2A
      - PAC_2B
      - PAC_2C
      - PAC_2D
      - PAC_2E
      - PAC_2F
      - PAC_2G
      - PAC_2H
      - PAC_2I
      - PAC_2J
      - PAC_2K
    description: This variable is a measure of the average daily energy expended during
      leisure time activities by the respondent in the past three months.
    note: 'Energy Expenditure (EE) is calculated using the frequency and duration
      per session of the physical activity as well as the MET value of the activity.
      The MET is a value of metabolic energy cost expressed as a multiple of the resting
      metabolic rate. For example, an activity of 4 METS requires four times the amount
      of energy as compared to when the body is at rest. EE (Energy Expenditure for
      each activity) = (N X D X METvalue) / 365 Where: N = the number of times a respondent
      engaged in an activity over a 12 month period D = the average duration in hours
      of the activity MET value = the energy cost of the activity expressed as kilocalories
      expended per kilogram of body weight per hour of activity (kcal/kg per hour)/365
      (to convert yearly data into daily data) MET values tend to be expressed in
      three intensity levels (i.e. low, medium, high). The CCHS questions did not
      ask the respondent to specify the intensity level of their activities. Therefore
      the MET values adopted correspond to the low intensity individuals tend to overestimate
      the intensity, frequency and duration of their activities. Variable Name Activity
      MET Value (kcal/kg/hr) PACDEEA WALKING FOR EXERCISE 3 PACDEEB GARDENING OR YARD
      WORK 3 PACDEEC SWIMMING 3 PACDEED BICYCLING 4 PACDEEE POPULAR OR SOCIAL DANCE
      3 PACDEEF HOME EXERCISES 3 PACDEEG ICE HOCKEY 6 PACDEEH ICE SKATING 4 PACDEEI
      IN-LINE SKATING OR ROLLERBLADING 5 PACDEEJ JOGGING OR RUNNING* 9.5 PACDEEK GOLFING
      4 PACDEEL EXERCISE CLASS OR AEROBICS 4 PACDEEM DOWNHILL SKIING OR SNOWBOARDING
      4 PACDEEN BOWLING 2 PACDEEO BASEBALL OR SOFTBALL 3 PACDEEP TENNIS 4 PACDEEQ
      WEIGHT-TRAINING 3 PACDEER FISHING 3 PACDEES VOLLEYBALL 5 PACDEET BASKETBALL
      6 PACDEEZ SOCCER 5 PACDEEU OTHER (U)* 4 PACDEEW OTHER (W)* 4 PACDEEX OTHER (X)*
      4 * Jogging (MET value 7) and running (MET value 12) fall under one category.
      Therefore, the MET value for the combined activity is the average of their MET
      values (9.5). Since it is difficult to assign a MET value to the category "Other
      Activities", the MET value used is the average of the listed activities except
      for the average value of jogging and running. Here, the average value of jogging
      and running is replaced by the value for jogging only. Some activities have
      MET values lower than the average, however, this approach is consistent with
      other studies, such as the Campbell’s Survey and the Ontario Health Survey (OHS).
      * Times were assigned an average duration value for the calculation, as with
      NPHS: (13 minutes or .2167 hour, 23 minutes or .3833 hour, 45 minutes or .75
      hour, 60 minutes or 1 hour) June 2014 78 Beginning in CCHS cycle 2.1, the list
      of activities (PAC_1n) changed slightly from previous CCHS cycles: The activity
      "Soccer" was asked explicitly in Cycle 2.1. For Cycle 1.1, this activity was
      part of the "Other" activities. Temporary Reformat'
