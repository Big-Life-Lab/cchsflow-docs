  DHHAGLVG:
    name: DHHAGLVG
    module: ~
    based_on: RE_REL of selected respondent only
    description: 'The following variable that describes the family relationships between
      the selected respondent and the rest of the household is collected using a set
      of relationship codes that define a link between each person in a household.
      All relationships with the selected respondent within each sample (relationship
      of selected respondent to each other person within the household) are used in
      the calculation of this variable. Temporary Reformats Reformat Explanation RELATIONSHIP
      CODES: (*as on the relationship file) Relationship Codes used CODES CATEGORY
      A0 Husband/Wife B0 Common Law Partner C0 Same-sex Partner D1 Birth Father/Mother
      D2 Step Father/Mother D3 Adoptive Father/Mother E1 Birth Child E2 Step Child
      E3 Adopted Child F1 Full Sister/Brother F2 Half Sister/Brother F3 Step Sister/Brother
      F4 Adopted Sister/Brother F5 Foster Sister/Brother G0 Foster Parent H0 Foster
      Child I0 Grandparent J0 Grandchild K0 In-Law L0 Other Related Y1 Single Z0 Unrelated
      A1=(Parental) D1, D2, D3 Temporary recodes to collapse relationships B1=(Child)
      E1, E2, E3 C1=(Sibling) F1, F2, F3, F4 K1=(Other relative) I0, J0, K0, L0 L1=(Non-relative)
      F5*, G0*, H0*, Z0 X1=(Spouse/Partner) A0, B0, C0 Z1=(Not stated) NS * All Foster
      relationships (foster sister/brother, parent, or child) have been recoded into
      the Other relationship category. 1 DHHADHSZ = 1 Unattached Individual Living
      Alone Selected respondent lives alone. Household size=1. 2 All RE_REL <> X1
      and A1 Unattached Individual Living With Others The respondent lives with other
      people. S/he cannot have a marital/common-law or parental relationship but other
      relationships such as siblings are allowed. 3 DHHADHSZ = 2, and RE_REL = X1
      Spouse/Partner Living With Selected respondent lives with Spouse/Partner spouse/partner
      only. Household size=2. 4 DHHADHSZ > 2 and Parent Living With Spouse/Partner
      One RE_REL = X1 and all other And Children RE_REL = A1 Selected respondent lives
      with spouse/partner and child(ren). 5 All RE_REL = A1 Single Parent Living With
      Children Selected respondent lives with child(ren). No other relationships are
      permitted. 6 DHHADHSZ = 2 and Child Living With Single Parent with RE_REL =
      B1 or without siblings or DHHADHSZ > 2 and One RE_REL = B1 and all other RE_
      REL = C1 Selected respondent is a child living with a single parent with or
      without siblings 7 DHHADHSZ = 3 and Child Living With Two Parents with All RE_REL
      = B1 or without siblings or DHHADHSZ > 3 and Two RE_REL = B1 and all other RE_REL
      = C1 Selected respondent is a child living with two parents with or without
      siblings. 8 Else Other Selected respondent lives in a household composition
      not classified above. NS Any RE_REL = Z1 Not Stated Education Variables (2 DVs)'
    note: ~
    specifications: []
