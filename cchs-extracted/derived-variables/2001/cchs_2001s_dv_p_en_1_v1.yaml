      - HWTAGWTK
    description: 'The body mass index (BMI) is a quick and accurate method to determine
      health risk as it relates to body weight and height. Calculated for persons
      20 to 64 years old, excluding pregnant women. BMI values have been regrouped
      to a minimum of 14 and a maximum of 58. Technical Specs: BMI = WEIGHT (KG) /
      SQUARED HEIGHT (METRES) HWTAGWTK / (HWTADHTM × (HWTADHTM >= .914 and <= BMI
      calculated from height and HWTADHTM) 2.108) and weight values (Rounded to one
      decimal place) (HWTAGWTK > 0 and <= 260) Minimum: 14; Maximum: 58 NS (HWTADHTM
