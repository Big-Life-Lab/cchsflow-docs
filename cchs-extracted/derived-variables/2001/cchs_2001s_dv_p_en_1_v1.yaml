      everyday for at least two weeks) NS ADMA_PRX = 1 Section not asked by proxy
      NS (DPSA_02 = DK, R or NS) or Respondent did not answer (don’t (DPSA_05 = DK,
      R or NS) or know, refusal, not specified) at (DPSA_06 = DK, R or NS) or least
