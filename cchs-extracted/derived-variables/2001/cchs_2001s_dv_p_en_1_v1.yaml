      (DPSA_21A = 1 or 0) and Respondent lost interest in things (DPSA_23 = 1 or 0)
      and for 2 weeks or more last year. min: 1; Max: 7 (DPSA_24 = 1 or 0) and (DPSA_25
      = 1 or 0) and (DPSA_26 = 1 or 0) 0 DPSA_02 < NA and Respondent did not feel
      depressed DPSA_05 = NA and or lose interest in things for two DPSA_19 = NA weeks
