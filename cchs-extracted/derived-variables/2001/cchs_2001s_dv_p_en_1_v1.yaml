variables:
  GEOADPMF:
    name: GEOADPMF
    module: ~
    based_on: GEOA_HR4
    description: 'This variable is a 5-digit number that identifies the sub-provincial
      health areas. It is based on the 4-digit health regions specified by the Provincial
      Ministries of Health. This reconstruction is as follows: - positions 1-2 (first
      two positions of GEOA_HR4); - position 3 (value of "9"); - positions 4-5 (3rd,
      4th position of GEOA_HR4) In order to ensure regions meet the minimum population
      size of 70,000, the following regions have been collapsed: 10904=1004,1005,1006;
      13904=1304,1305; 13905=1306,1307; 35939=3539,3554; 35947=3547,3563; 46915=4615,4650,4655;
      46920=4620,4625; 46960=4660,4670,4680; 47901=4701,4702,4703; 47905=4705,4708;
      47907=4707,4710; 47909=4709,4711; 48903=4803,4805; 48908=4808,4809; 48914=4814
      to 4817; 59942=5942, 5943; 59951=5951, 5953 60901=6001,6101,6201; Dwelling and
      Household Record Variables (4 DVs)'
    note: ~
    specifications: []
  DHHAGLE5:
    name: DHHAGLE5
    module: ~
    based_on:
      - PERSONID
      - DHHA_AGE
    description: The following variable indicates whether or not there are people
      living within a household whose age is less than 6 years old. 0 DHHAGLE5 = none
      1 DHHAGLE5 = 1 or more NS DHHAGLE5 = NS Respondent didn’t answer (don’t know,
      refusal, not stated)
