  RACADIMP:
    name: RACADIMP
    module: ~
    based_on:
      - RACA_2A
      - RACA_2B
      - RACA_2C
    description: The following variable is a crude measure of the impact of long-term
      physical conditions, mental
    note: This variable should not be used to describe the rate of disability or activity
      limitation in the population. The variable is derived from RACA_2A, RACA_2B
      and RACA_2C. These questions, plus RACA_1, were asked in the 2001 Census of
      Population to identify a sample for the 2001 post-censal Participation and Activity
      Limitation Survey (PALS). Data from PALS will be released in late 2002, at which
      time Statistics Canada will recommend a common approach to measuring disability
      and restriction of activity. Also, because of differences in question wording
      between the CCHS and National Population Health Survey (NPHS questions are 1991
      Census questions), RACADIMP should NOT be compared to the NPHS variables RES_FLG,
      RAC6F1, RAC8F1, or RAC0F1. 1 RACA_2A = 1 or Sometimes RACA_2B = 1 or RACA_2C
      = 1 2 RACA_2A > 1 and RACA_2A = 2 or Often RACA_2B > 1 and RACA_2B = 2 or RACA_2C
      > 1 and RACA_2C = 2 3 RACA_2A = 3 and Never (RACA_2B = 3 or 4) and RACA_2C =
      3 NS (RACA_2A = DK, R or NS) or Respondent did not answer (don’t (RACA_2B =
      DK, R or NS) or know, refusal, not stated) at least (RACA_2C = DK, R or NS)
      one question required for calculation
    specifications: []
