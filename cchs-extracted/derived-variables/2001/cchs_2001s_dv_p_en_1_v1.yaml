      – Optional content not selected'
    note: The Major Depressive Episode questions ask about periods during which the
      respondent felt sad or depressed or lost interest in everyday things within
      the past 12 months. These include normal periods of sadness (for example, after
      the death of a loved one), as well as serious depression. Initially, respondents
      are asked if they experienced a time when they felt sad, blue, or depressed
      for 2 weeks or more in a row. If they respond NO then question DPSA_16 asks
      if they had a two-week period of losing interest in most things, which also
      assesses the respondent’s depressive symptoms.
