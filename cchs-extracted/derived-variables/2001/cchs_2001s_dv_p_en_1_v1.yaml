      initial pool of 50 items was reduced to 19 functional support items, covering
      five dimensions: • Emotional support –the expression of positive affect, empathetic
      understanding, and the encouragement of expressions of feelings. • Informational
      support –the offering of advice, information, guidance or feedback • Tangible
      support –the provision of material aid or behavioural assistance • Positive
      social interaction –the availability of other persons to do fun things with
      you • Affection –involving expressions of love and affection Empirical analyses
