    note: ~
    specifications: []
  EDUADH04:
    name: EDUADH04
    module: ~
    based_on: EDUADR04 for each member of the household
    description: 'The following variable describes the highest level of education
      acquired by any member of the household. Technical Specs: Temporarily creates
      EDUADR04 for each member of the household (all PERSONID within SAMPLEID). Compare
      these values of EDUADR04 within the household and return the highest value.
      If any PERSONID has EDUADR04 of NS (not stated) then return NS. If all of EDUADR04
      are NA (not applicable) then return NA. 1 [(EDUA_1 = 1 or 2) or Less than secondary
      school EDUA_2 = 2] and graduation EDUA_3 = 2 2 EDUA_2 = 1 and Secondary school
      graduation, no EDUA_3 = 2 post-secondary education 3 EDUA_4 = 1 Some post-secondary
      education 4 EDUA_4 >= 2 and <= 6 Post-secondary degree/diploma NS (EDUA_2 =
      DK, R, or NS) or Respondent didn’t answer (don’t (EDUA_3 = DK, R, or NS) or
      know, refusal, not stated) at least (EDUA_4 = DK, R, or NS) one question required
      for calculation General Health (1 DV)'
    note: ~
    specifications: []
