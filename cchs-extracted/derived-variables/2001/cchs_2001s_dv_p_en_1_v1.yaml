  HUIADHSI:
    name: HUIADHSI
    module: ~
    based_on:
      - HUIADVIS
      - HUIADHER
      - HUIADSPE
      - HUIADMOB
      - HUIADDEX
      - HUIADEMO
      - HUIADCOG
      - HUIADPAD
    description: 'The Health Status Index or Health Utility Index (HUI) is a generic
      health status index that is able to synthesize both quantitative and qualitative
      aspects of health. The index, developed at McMaster University’s Centre for
      Health Economics and Policy Analysis, is based on the Comprehensive Health Status
      Measurement System (CHSMS). It provides a description of an individual’s overall
      functional health, based on eight attributes: vision, hearing, speech, mobility
      (ability to get around), dexterity (use of hands and fingers), cognition (memory
      and thinking), emotion (feelings), and pain and discomfort. In addition to describing
      functional health status levels, the CHSMS is the basis for HUI3. The HUI3 is
      a single numerical value for any possible combination of levels of these eight
      self-reported health attributes. The HUI3 maps any one of the vectors of eight
      health attribute levels into a summary health value between –0.360 and 1. For
      instance, an individual who is near-sighted, yet fully healthy on the other
      seven attributes, receives a score of 0.973. On that scale, the most preferred
      health level (perfect health) is rated 1.000 and death is rated 0.000, while
      negative scores reflect health states considered worse than death. The scores
      of the HUI embody the views of society concerning health status. These views
      are termed societal preferences, since preferences about various health states
      are elicited from a representative sample of individuals. The HUI3 (Mark 3)
      was developed by McMaster University’s Centre for Health Economics and Policy
      Analysis, and is derived using societal preferences from a random sample of
      500 people within the boundaries of the City of Hamilton-Wentworth, Ontario,
      Canada. The algorithm mapping the questions to the CHSMS itself is the property
      of Health Utilities Inc. and is protected by copyright. Statistics Canada is
      authorized, when requested, to share this algorithm with users who wish to replicate
      results or analyses conducted by Statistics Canada. The use of the algorithm
      for other purposes, or the sharing of it with others, is prohibited. For a detailed
      explanation of the calculation of the HUI3, refer to: • Furlong WJ, Feeny DH,
      Torrance GW. “Health Utilities Index (HUI): Algorithm for determining HUI Mark
      2 (HUI2)/ Mark 3 (HUI3) health status classification levels, health states,
      health-related quality of life utility scores and single-attribute utility score
      from 40-item interviewer-administered health status questionnaires. Dundas,
      Canada: Health Utilities Inc. February 1999. • Furlong WJ, Feeny DH, Torrance
      GW, et al. “Multiplicative multi-attribute utility function for the Health Utilities
      Index Mark 3 (HUI3) system: a technical report” Hamilton, Canada: McMaster University
      Centre for Health Economics and Policy Analysis Working Paper #98-11, December
      1998. Higher scale indicates better health index Range: -0.360 to 1 in increments
      of 0.001 Source: McMaster University Internet Site: McMaster University: www.fhs.mcmaster.ca/hug/update.htm,
      www.fhs.mcmaster.ca/hug/wp9811.htm, www.healthutilities.com/hui3.htm Work Stress
      (7 DVs) The work stress items are sub-divided into six dimensions. Respondents
      between the age of 15 and 75 who worked at a job or business at anytime in the
      past 12 months were asked to evaluate their main job in the past 12 months.
      The 12-item index, based on a larger pool of items from Karasek, reflects a
      respondent’s perceptions about various dimensions of his/her work including
      job security, social support, monotony, physical effort required, and extent
      of participation in decision-making. Higher scores indicate greater work stress.
      To measure work stress, the survey asks participants to rank responses to the
      following 12 statements using a five-point scale, ranging from “strongly agree”
      (a score of 1) to “strongly disagree” (a score of 5). Temporary Reformats Reformat
      Explanation if WSTA_401 <= 5 then WSTA_401 = (WSTA_401 - 1) Rescale the answers
      for questions WSTA_401 to if WSTA_402 <= 5 then WSTA_402 = (WSTA_402 - 1) WSTA_412
      from 1 - 5 to 0 - 4 for all questions with if WSTA_403 <= 5 then WSTA_403 =
      (WSTA_403 - 1) valid response categories. if WSTA_404 <= 5 then WSTA_404 = (WSTA_404
      - 1) if WSTA_405 <= 5 then WSTA_405 = (WSTA_405 - 1) if WSTA_406 <= 5 then WSTA_406
      = (WSTA_406 - 1) if WSTA_407 <= 5 then WSTA_407 = (WSTA_407 - 1) if WSTA_408
      <= 5 then WSTA_408 = (WSTA_408 - 1) if WSTA_409 <= 5 then WSTA_409 = (WSTA_409
      - 1) if WSTA_410 <= 5 then WSTA_410 = (WSTA_410 - 1) if WSTA_411 <= 5 then WSTA_411
      = (WSTA_411 - 1) if WSTA_412 <= 5 then WSTA_412 = (WSTA_412 - 1) if WSTA_404
      <= 4 then WSTA_404 = (4 - WSTA_404) Invert scale of rescaled questions WSTA_404,
      if WSTA_405 <= 4 then WSTA_405 = (4 - WSTA_405) WSTA_405, WSTA_408, WSTA_410
      where these if WSTA_408 <= 4 then WSTA_408 = (4 - WSTA_408) questions have valid
      response categories (i.e. if WSTA_410 <= 4 then WSTA_410 = (4 - WSTA_410) response
      codes from 0 to 4).'
    note: ~
    specifications: []
  WSTADALL:
    name: WSTADALL
    module: ~
    based_on: WSTA_401 TO WSTA_412
    description: 'The following variable determines the respondent’s perception about
      all dimensions of their work. Technical Specs: The method proposed by Blair
      Wheaton from the University of Toronto with respect to stress variables was
      used in order to allow for a number of missing values. The stress index has
      been calculated using the mean of “true” answers adjusted by the number of questions
      to answer. • DV= Mean * Total number of questions asked • Mean = Sum of “true”
      answers/ (number of “true” + “false” answers to questions asked) This method
      is similar to using the sum of all “True” answers except when there are some
      missing values (“Don’t know”, “Refusal”, or “Not stated”). “Don’t know” answers
      are treated as missing values. It was decided that up to a maximum of 25% of
      “Don’t know”, “Refusals” or “Not stated” answers would be allowed in order to
      compute the index. In other words, up to three “Don’t know”, “Refusals” or “Not
      stated” answers are permitted. (Sum of all valid responses / # of 3 or less
      of: Valid response codes for required valid responses)*12 WSTA_401 through WSTA_412
      questions in the section. = DK, R or NS (round to nearest integer) Rest are
      Valid (>=0 and <=4) (min: 0 ; max: 48) NS ADMA_PRX=1 Section not asked by proxy
      NS 4 or more of: Respondent did not answer (don’t WSTA_401 through WSTA_412
      know, refusal, not stated) at least = DK, R, NS one question required for calculation.
      NA WSTA_401 = NA Population exclusions - Optional content not selected; age
      < 15 or age > 75; GENA_08 <> 1'
