  PACADEE:
    name: PACADEE
    module: ~
    based_on:
      - PACA_1V
      - PACA_2A
      - PACA_2B
      - PACA_2C
      - PACA_2D
      - PACA_2E
      - PACA_2F
      - PACA_2G
      - PACA_2H
    description: 'In order to derive a physical activity index, the energy expenditure
      (EE) of participants in their leisure activities should be estimated. EE is
      calculated using the frequency and time per session of the physical activity
      as well as its MET value. The MET is a value of metabolic energy cost expressed
      as a multiple of the resting metabolic rate. Thus, an activity of 4 METS requires
      four times the amount of energy as compared to when the body is at rest. Technical
      Specs: Energy expenditure for each activity (kcal/kg/day) = (N × D × MET value)/365
      Where: N = the number of times a respondent engaged in an activity over a 12
      month period D = the average duration in hours of the activity MET value = the
      energy cost of the activity expressed as kilocalories expended per kilogram
      of body weight per hour of activity † (kcal/kg per hour)/365 (to convert yearly
      data into daily data) † MET values tend to be expressed in three intensity levels
      (i.e. low, medium, high). CCHS questions did not ask the respondent to specify
      the intensity level of their activities, therefore the MET values adopted correspond
      to the low intensity value of each activity. This approach is adopted from the
      Canadian Fitness and Lifestyle Research Institute because individuals tend to
      overestimate the intensity, frequency and duration of their activities. The
      MET values are: Variable Name Activity MET Value (kcal/kg/hr) PACADEEA WALKING
      FOR EXERCISE 3 PACADEEB GARDENING OR YARD WORK 3 PACADEEC SWIMMING 3 PACADEED
      BICYCLING 4 PACADEEE POPULAR OR SOCIAL DANCE 3 PACADEEF HOME EXERCISES 3 PACADEEG
      ICE HOCKEY 6 PACADEEH ICE SKATING 4 PACADEEI IN-LINE SKATING OR ROLLERBLADING
      5 PACADEEJ JOGGING OR RUNNING 9.5 PACADEEK GOLFING 4 PACADEEL EXERCISE CLASS
      OR AEROBICS 4 PACADEEM DOWNHILL SKIING OR SNOWBOARDING 4 PACADEEN BOWLING 2
      PACADEEO BASEBALL OR SOFTBALL 3 PACADEEP TENNIS 4 PACADEEQ WEIGHT-TRAINING 3
      PACADEER FISHING 3 PACADEES VOLLEYBALL 5 PACADEET BASKETBALL 6 PACADEEU OTHER
      (U) 4 PACADEEW OTHER (W) 4 PACADEEX OTHER (X)'
    note: 'Jogging (MET value 7) and running (MET value 12) fall under one category
      therefore, the MET value for the combined activity is the average of their MET
      values (9.5). Since it is difficult to assign a MET value to the category “Other
      Activities”, the MET value used was the average of the listed activities except
      for the average jogging ONLY in the calculation of the overall average for “Other
      Activities”. Some activities have MET values lower than the average, however,
      this approach is consistent with other studies, such as the Campbell’s Survey
      and the Ontario Health Survey (OHS). Internet Site: Canadian Fitness and Lifestyle
      Research Institute: www.cflri.ca/ WALKING FOR EXERCISE: 0 PACA_3A = NA Respondent
      did not participate in activity 0 PACA_3A = DK, R or NS Respondent did not answer
      question (don’t know, refusal, not specified) (PACA_2A × 4 × .2167 × 3) / 365
      PACA_3A = 1 Calculate EE for < 15 min* (PACA_2A × 4 × .3833 × 3) / 365 PACA_3A
      = 2 Calculate EE for 16 to 30 min* (PACA_2A × 4 × .75 × 3) / 365 PACA_3A = 3
      Calculate EE for 31 to 60 min* (PACA_2A × 4 × 1 × 3) / 365 PACA_3A = 4 Calculate
      EE for > 60 min* GARDENING OR YARD WORK: 0 PACA_3B = NA Respondent did not participate
      in activity 0 PACA_3B = DK, R or NS Respondent did not answer question (don’t
      know, refusal, not specified) (PACA_2B × 4 × .2167 × 3) / 365 PACA_3B = 1 Calculate
      EE for < 15 min* (PACA_2B × 4 × .3833 × 3) / 365 PACA_3B = 2 Calculate EE for
      16 to 30 min* (PACA_2B × 4 × .75 × 3) / 365 PACA_3B = 3 Calculate EE for 31
      to 60 min* (PACA_2B × 4 × 1 × 3) / 365 PACA_3B = 4 Calculate EE for > 60 min*
      SWIMMING: 0 PACA_3C = NA Respondent did not participate in activity 0 PACA_3C
      = DK, R or NS Respondent did not answer question (don’t know, refusal, not specified)
      (PACA_2C × 4 × .2167 × 3) / 365 PACA_3C = 1 Calculate EE for < 15 min* (PACA_2C
      × 4 × .3833 × 3) / 365 PACA_3C = 2 Calculate EE for 16 to 30 min* (PACA_2C ×
      4 × .75 × 3) / 365 PACA_3C = 3 Calculate EE for 31 to 60 min* (PACA_2C × 4 ×
      1 × 3) / 365 PACA_3C = 4 Calculate EE for > 60 min* *Times were rounded to a
      specific value for calculation, as with NPHS (13min/.2167hr, 23min/.3833hr,
      45min/.75hr, 60min/1hr). BICYCLING: 0 PACA_3D = NA Respondent did not participate
      in activity 0 PD_Q3D = DK, R or NS Respondent did not answer question (don’t
      know, refusal, not specified) (PACA_2D × 4 × .2167 × 4) / 365 PD_Q3D = 1 Calculate
      EE for < 15 min* (PACA_2D × 4 × .3833 × 4) / 365 PD_Q3D = 2 Calculate EE for
      16 to 30 min* (PACA_2D × 4 × .75 × 4) / 365 PD_Q3D = 3 Calculate EE for 31 to
      60 min* (PACA_2D × 4 × 1 × 4) / 365 PD_Q3D = 4 Calculate EE for > 60 min* POPULAR
      OR SOCIAL DANCE: 0 PACA_3E = NA Respondent did not participate in activity 0
