      = 1 or 0) and weeks or more last year. min: 1; Max: 8 (DPSA_10 = 1 or 0) and
      (DPSA_11 = 1 or 0) and (DPSA_12 = 1 or 0) and (DPSA_13 = 1 or 0) DPSA_16 + DPSA_19
