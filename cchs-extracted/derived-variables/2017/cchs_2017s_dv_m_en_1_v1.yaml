    name: INCDVHH
    label: ~
    based_on: INC_021
    description: This variable groups the total household income from all sources.
      A range category is previously assigned by the application to respondents who
      provided an exact amount in question INC_021.
    note: 'Beginning in 2016, household income variables (INC_005A-O, INC_010, INC_015
      and INC_021) are taken from tax records, if possible. See INCFIMPH for details
      on determining which records and variables are taken from tax records. The household
      income variable (INC_021) is imputed using statistical techniques when it has
      missing values (due to either respondent refusal, respondent’s lack of knowledge
      of household or insufficient tax information). The main variable of interest
      is INC_021: ''Total household income - best estimate'' but all variables that
      are derived based on household income are affected. The imputation is a two-step
      process. First, observations that provide the income range have values imputed
      within that range. A nearest neighbour donor approach is used that finds a respondent
      with similar characteristics as the non-respondent and ‘donates’ the income
      value to the non-respondent. For those that do not provide a range, a similar
      process is used but the donor values are not limited to the range. For more
      information on the imputation process, please refer to the document ''Income
      Variables and Sources in the'
