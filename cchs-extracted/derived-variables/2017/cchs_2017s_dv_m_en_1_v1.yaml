    description: 'This variable is a four digit number that identifies sub-provincial
      health areas of Ontario. It is equal to 9996 everywhere outside Ontario. Data
      in Ontario are provided for two levels of geography: Public Health Units (PHU)
      and the Local Health Integration Networks (LHIN). As of 2015, the LHIN given
      on the CCHS file is the "statistical" LHIN. Statistical LHINS are formed by
      reclassifying a small percentage of units from one LHIN to another where the
      PHU-LHIN intersections are particularly small. This reclassification facilitates
      estimation at the PHU and LHIN level from one set of weights.'
