  ADLDVIHS:
    name: ADLDVIHS
    label: ~
    based_on:
      - ADL_005
      - ADL_010
      - ADL_015
      - ADL_030
    description: 'This variable uses an index to discern the degree to which an individual
      has difficulty engaging in activities of daily living tied to home support:
      meal preparation, shopping, housekeeping, and bill payments. This index ranges
      from 0 (no difficulty with daily living) to 12 (unable to do any of four daily
      activities). Specifications'
    note: ''
    specifications:
      - value: '96'
        condition: DOADL = 2
        description: Module not selected
        notes: NA
      - value: '99'
        condition: ADLT005 = (DK, RF, NS) or
        description: At least one required question was not answered
        notes: NS
      - value: ADLT010 = (DK, RF, NS) or
        condition: (don’t know, refusal, not stated)
        description: ''
        notes: ''
      - value: ADLT005+
        condition: ADLT005 <= 3 and
        description: Obtained ADLDVIHS Score for daily activities
        notes: '(min: 0; max: 12)'
      - value: ADLT010+
        condition: ADLT010 <= 3 and
        description: related to home support
        notes: ''
      - value: ADLT015+
        condition: ADLT015 <= 3 and
        description: ''
        notes: ''
      - value: ADLT030
