    module_name: Use of protective equipment
  GEODVD16:
    name: GEODVD16
    label: ~
    based_on: GEODVPC
    description: The dissemination area (DA) is a small, relatively stable geographic
      unit composed of one or more dissemination blocks. It is the smallest standard
      geographic area for which all census data are disseminated. DAs cover all the
      territory of Canada. GEODVD16 is based on the Postal Code Conversion File (PCCF),
      which provides a correspondence between the postal code and Statistics Canada's
      standard geographical areas for which census data and other statistics are produced.
      It is composed of the two digit province/territory code, the two digit census
      division code and the four digit dissemination area code. When the postal code
      corresponds to more than one DA, the case is assigned probabilistically, taking
      into account population totals. 3 ) 2011 Census dissemination area (DA)
    note: ''
    specifications: []
    end_idx: 2926.0
    module: UPE
    module_name: Use of protective equipment
  GEODVD11:
