    description: This variable identifies the family relationships within the household.
      Economic family refers to a group of two or more persons who live in the same
      dwelling and are related to each other by blood, marriage, common-law or adoption.
      A couple may be of opposite or same sex. Foster children are included in this
      derived variable (but excluded from the target population) because this variable
      applies to all household members, not just the selected respondent.
    note: The necessary data is collected using a set of relationship codes that define
      a link between the selected respondent and each person in a household. From
      these relationships, the living/family arrangement of the selected respondent
      (DHHDVLVG) was derived in the collection application. If the DHHDVLVG was derived
      as 2 or 10, all remaining relationships between other household members were
      collected. DHHDVECF is derived using a combination of the living/family arrangement
      variable, ages of persons in the household, DHH_SEX of all persons in the household,
      and all of the relationships that the selected respondent indicated having with
      the other household members. In the case when DHHDVLVG=2 or 10, all relationships
      of each person in a household to each other person are also used in creating
