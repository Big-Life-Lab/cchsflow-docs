  GEODVUR:
    name: GEODVUR
    label: ~
    based_on: GEODVPC
    description: 'This variable identifies whether the respondent lives in a population
      centre or a rural area within or outside of a census metropolitan area (CMA)
      or census agglomeration (CA). Population centres are those continuously built-up
      areas having a population concentration of 1,000 or more and a population density
      of 400 or more per square kilometre based on 2016 Census population counts.
      A CMA or CA can have two types of cores: the core and the secondary core. The
      core is the population centre with the highest population, around which a CMA
      or a CA is delineated. The core must have a population (based on the 2016 Census)
      of at least 50,000 persons in the case of a CMA, or at least 10,000 persons
      in the case of a CA. The secondary core is a population centre within a CMA
      that has at least 10,000 persons and was the core of a CA that has been merged
      with an adjacent CMA. The term ''fringe'' includes all population centres within
      a CMA or CA that have less than 10,000 persons and are not contiguous with the
      core or secondary core. 06/2018 46 All territory within a CMA or CA that is
      not classified as a core or fringe is classified as rural area. Specifications'
    note: ''
    specifications:
      - value: '1'
        condition: Core
        description: ''
        notes: ''
      - value: '2'
        condition: Fringe
        description: ''
        notes: ''
      - value: '3'
        condition: Rural area inside of a CMA or CA
        description: ''
        notes: ''
      - value: '4'
        condition: Population centre outside of a CMA and CA
        description: ''
        notes: ''
      - value: '5'
        condition: Rural area outside of a CMA or CA
        description: ''
        notes: ''
      - value: '6'
