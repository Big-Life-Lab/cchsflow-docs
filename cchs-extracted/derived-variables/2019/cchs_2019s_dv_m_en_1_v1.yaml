  GEODVFED:
    name: GEODVFED
    label: ~
    based_on: GEODVD16
    description: 'A federal electoral district refers to any place or territorial
      area entitled to elect a representative member to serve in the House of Commons
      (Source: Canada Elections Act, 1990). There are 338 FEDs in Canada, and the
      FEDs used for the 2016 Census are based on the 2013 Representation Order. The
      first two digits identify the province or territory. 6 ) 2016 Census division
      (CD)'
