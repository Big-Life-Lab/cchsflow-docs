      - CCC_105
      - CCC_110
      - CCC_115
      - CCC_120
      - CCC_125
    description: This variable classifies diabetes as Type 1, Type 2, or Gestational,
      using the Ng-Dasgupta-Johnson algorithm (Health Reports, 19(1), March 2008).
    note: According to the Ng-Dasgupta-Johnson algorithm, women who are diagnosed
      only during pregnancy are considered as having gestational diabetes. The CDC,
      on the other hand, indicates that gestational diabetes goes away soon after
      their baby is born. If it does not go away, the diabetes is considered as type
      2. More than half of respondents who are coded as having gestational diabetes
      are respondents who were not pregnant at the time of the interview. Users can
      choose to interpret these cases as either diabetes that has become type 2, or
      a respondent who has indicated having had gestational diabetes, but it has gone
      away. Respondents who were diagnosed during pregnancy (CCC_105 = 1) and not
      diagnosed other than during pregnancy (CCC_110 = 2) were not asked the questions
      about insulin usage or blood sugar pills. Therefore it is not possible to determine
      if the respondent is currently treating diabetes.
    specifications:
      - value: '6'
        condition: DOCCC = 2
        description: Module not selected
        notes: NA
      - value: '6'
        condition: CCC_095 > 1
        description: Population exclusions
        notes: NA
      - value: '9'
        condition: (CCC_105 = (DK, RF, NS) or
        description: At least one required question was not answered
        notes: NS
