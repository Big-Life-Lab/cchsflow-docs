  GEODVCD:
    name: GEODVCD
    label: ~
    based_on: GEODVD16
    description: The Census Division refers to geographic areas established by provincial
      law, which are intermediate geographic areas between the census subdivision
      and the province (e.g., divisions, counties, regional districts, regional municipalities
      and seven other types of geographic areas made up of groups of census subdivisions).
      In Newfoundland and Labrador, Manitoba, Saskatchewan and Alberta, provincial
      law does not provide for these administrative geographic areas. Therefore, census
      divisions have been created by Statistics Canada in co-operation with these
