  SAMDVSHR:
    name: SAMDVSHR
    label: ~
    based_on:
      - DHH_AGE
      - ADM_035 (Not on file - Share question from the main component)
      - PS_02 (Not on file - Share question from the
    description: This variable indicates whether or not the respondent agreed to share
      the information collected in the survey with the provincial and territorial
      ministries of health, Health Canada, the Public Health Agency of Canada, and
      the "Institut de la Statistique du Québec" for Quebec respondents. The variable
      SAMDVSHR is calculated from the responses to the Share questions in the Administration
      information module (ADM_035), the Person most knowledgeable about the household
      situation module (PMK_005) and the Exit component (PS_02) for partial interviews.
    note: Permission to share data questions were asked according to respondent's
      age and identification of a person most knowledgeable about the household (PMKPROXY)
      for respondents aged less than 18 years old. For 12-13 year olds, permission
      to share was not asked to them directly. If a PMKPROXY was identified or if
      their interview was completed by a proxy respondent, permission to share data
      for the whole survey was asked to the PMKPROXY or PROXY respondent in ADM_035
      or PS_02. If no PMKPROXY was identified or the survey was completed by the 12-13
      year old, no data sharing question was asked and data sharing is not possible.
      For respondents aged 14-17 years old, permission to share the part of the survey
      up to the Person most knowledgeable about the household situation (PMK) module
      was asked to them directly either in the PMK block itself before their participation
      ended, or in the exit share question (PS_02). If a PMKPROXY was identified to
      complete the rest of the survey, the PMKPROXY was asked the permission to share
      question for the remaining household related modules in ADM_035 or in PS_02.
      If permission to share was obtained from both the selected respondent in PMK
      module and the PMKPROXY in ADM_035 or PS_02, then the data for the whole interview
      can be shared. If the PMKPROXY did not agree to share the household related
      questions, then only data from which permission to share was obtained from the
      14-17 year old can be shared (i.e. any data up to the PMK module). In this case,
      SAMDVSHR = 3 (partial share.) If a PROXY respondent completed the survey for
      a 14-17 year old, permission to share was only asked in ADM_035 or PS_02. If
      the PMKPROXY agrees to share responses to household level questions on behalf
      of a respondent aged 14-17 who does not agree to share, then SAMDVSHR = 2 (respondent
      did not agree to share information). For respondents aged 18 and over, the procedure
      around asking the share questions remains the same. Permission to share was
      asked directly to them or their PROXY respondent in either ADM_035 or PS_02.
