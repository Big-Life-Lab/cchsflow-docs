        condition: and CCC_110 are not answered, gestational
        description: ''
        notes: ''
      - value: CCC_095 = (DK, RF, NS) or
        condition: diabetes cannot be derived.
        description: ''
        notes: ''
      - value: '1'
        condition: (DHH_SEX = 1 and
        description: Type 1 diabetes
        notes: ''
      - value: '2'
        condition: CCC_095 = 1 and
        description: Type 2 diabetes
        notes: ''
      - value: '3'
