  HUIDVHSI:
    name: HUIDVHSI
    label: ~
    based_on:
      - HUIDVVIS
      - HUIDVHER
      - HUIDVSPE
      - HUIDVMOB
      - HUIDVDEX
      - HUIDVEMO
      - HUIDVCOG
      - HUIDVPAD
    description: 'This derived variable is a Health Utilities Index which provides
      a description of an individual’s overall functional health, based on eight attributes:
      vision, hearing, speech, mobility (ability to get around), dexterity (use of
      hands and fingers), emotion (feelings), cognition (memory and thinking) and
      pain. The version of the index used in CCHS is adapted from the HUI Mark 3 (HUI3).
      The index is designed to produce both an overall health utility score and eight
      individual attribute scores. Analysts can use either a single-attribute utility
      scale or look at the complete health state (levels on all eight attributes)
      on the overall utility scale to produce a measure of an individual''s perceived
      health related quality of life (HRQL). The index is appropriate for use to describe
      and monitor the health of general populations, and has been extensively validated
      for use in cross-sectional and longitudinal population health studies. The 8
      single-attribute utility scores measure functional capacity within a single
      attribute, and range from 1.000 (normal) to 0.000 (most disabled). In combination,
      these scores are used to produce a multi-attribute utility index producing a
      score ranging from 1.000 (perfect health), through 0.000 (health status equal
      to death) to -0.359 (health status worse than death). Scores between 0.8 and
      1.0 are considered to indicate good to full functional health; scores below
      0.8 are considered to indicate moderate to poor functional health.'
    note: 'HUI3 question content resides in the public domain, and is not subject
      to copyright restrictions. The HUI3 algorithm is the property of Health Utilities
      Inc. and is protected by copyright. Statistics Canada is authorized, when requested,
      to share this algorithm with users who wish to replicate results or analyses
      conducted by Statistics Canada. The use of the algorithm for other purposes,
      or the sharing of it with others, is prohibited. Higher scale indicates better
      health index Range: -0.359 to 1 in increments of 0.001 Reference: For a detailed
      explanation of the calculation of the HUI3 refer to: - Feeny D, Furlong W, Torrance
      GW et al. Multiattribute and single-attribute utility functions for the Health
      Utilities Index Mark 3 system. Med Care 2002; 40: 113-128.'
    specifications: []
    end_idx: 3860.0
    module: TAL
    module_name: Tobacco products alternatives
