  GEODVCSD:
    name: GEODVCSD
    label: ~
    based_on: GEODVD16
    description: The Census Subdivision is the general term applied to municipalities
      (as determined by provincial legislation) or their equivalent, e.g., Indian
      reserves, Indian settlements and unorganized territories. In Newfoundland and
      Labrador, Nova Scotia and British Columbia, the term also describes geographic
      areas that have been created by Statistics Canada in co-operation with the provinces
      as equivalents for municipalities. 5 ) 2016 Census federal electoral district
      (FED)
    note: ''
    specifications: []
