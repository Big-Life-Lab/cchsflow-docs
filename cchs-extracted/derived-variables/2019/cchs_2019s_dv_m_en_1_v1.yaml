      and describes the food security situation of the adult members of the household
      in the previous 12 months. It captures four kinds of situations: 1 - Food secure:
      No indication of difficulty with income-related food access. 2 - Marginally
      food insecure: Exactly one indication of difficulty with income-related food
      access. 3 - Moderately food insecure: Indication of compromise in quality and/or
      quantity of food consumed (2 to 5 affirmative responses). 4 - Severely food
      insecure: Indication of reduced food intake and disrupted eating patterns (>=
      6 affirmative responses) This variable is adopted from the Health Canada model
      of food security status. In 2020, Health Canada updated its recommended derivation
      of food insecurity measures to include the level ''marginal food insecurity''.
      Historically, this category was considered part of the population defined as
      ''food secure''. Users wishing to compare estimates from this table to earlier
      cycles of CCHS that do not include ''marginal food insecurity'' should add the
      totals of the categories ''marginally insecure'' and ''food secure'' from this
      table to compare to the ''food secure'' category of the earlier table. For international
      comparability, food insecurity is typically considered to be the combination
      of ''moderate'' and ''severe'' insecurity.'
    note: 'This variable does not necessarily reflect the experience of all adult
      members in the household. When using the person weights (WTS_M), this variable
      reflects the number of people living in households with food insecurity among
      the adult members of the household. When using the household weights (WTS_MHH),
      this variable reflects the number of households with food insecurity among the
      adult members of the household. In order to determine household food security
      status, responses to each question are first coded as either "affirmative" or
      "negative". Some of this coding is obvious because the only response options
      are "yes" or "no". For questions with less obvious response categories, the
      procedure for coding is as follows: response categories such as "Often true",
      "Sometimes true", "Almost every month", "Some months but not every month" are
      coded as "affirmative" (i.e. coded equal to 1). Response categories such as
      "Never true", "Only 1 or 2 months" are coded as "negative" (i.e. coded equal
      to 0). Internet site: http://www.hc-sc.gc.ca/fn-an/surveill/nutrition/commun/insecurit/status-situation-eng.php'
    specifications:
      - value: '6'
