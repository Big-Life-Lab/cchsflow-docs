      in the same province. The Territories are excluded from this derived variable.
    note: Deciles are generated using weighted data. Adjusted ratios are presented
      in increasing order, from smallest to largest, for each of the 10 provinces
      irrespective of household and community size. Derived variables are calculated
      only for valid responses (not stated, refusal, etc. are excluded). Boundaries
      are determined in order to derive deciles from the total weighted number of
      cases for which derived variables are calculated. The INCDVRPR values are based
      on a distribution of adjusted ratios for the residents of each of the 10 provinces.
      This variable should therefore be used in conjunction with the variable for
      the province of residence (GEO_PRV).
