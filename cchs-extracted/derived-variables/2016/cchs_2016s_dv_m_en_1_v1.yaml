    description: This variable classifies children aged 12 to 17 (except female respondents
      aged 15 to 17 who were pregnant or did not answer the pregnancy question) as
      "obese", "overweight", ''normal" or "thinness" according to the age-and-sex
      specific BMI cut-off points as defined by the World Health Organization. In
      2007, the WHO produced growth references for children aged 5 to 19 years using
      data from NHES II and III and NHANES I. The WHO BMI growth curves for 5- to
      19-year-olds were constructed to ensure a smooth transition from the WHO standard
      for 0- to 5-year-olds. Based on these growth curves, the WHO recommends that
      children whose BMI is more than two standard deviations (SDs) above the mean
      should be considered obese, and those whose BMI is between one and two SDs above
      the mean, overweight. At all ages, the WHO cut-off points yield higher percentages
      of boys and girls classified as overweight/obese than do the IOTF or CDC cut-off
      points.
    note: 'This variable excludes respondents who are greater than 6 feet 11 inches
