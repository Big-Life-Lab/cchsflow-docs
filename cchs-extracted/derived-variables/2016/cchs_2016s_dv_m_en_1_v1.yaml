      (DHHDVLVG) was derived in the collection application. If the DHHDVLVG was derived
      as 2 or 10, all remaining relationships between other household members were
      collected. DHHDVECF is derived using a combination of the living/family arrangement
      variable, ages of persons in the household, DHH_SEX of all persons in the household,
      and all of the relationships that the selected respondent indicated having with
      the other household members. In the case when DHHDVLVG=2 or 10, all relationships
