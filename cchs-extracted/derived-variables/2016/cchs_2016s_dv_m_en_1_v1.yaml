  HWTDVBCC:
    name: HWTDVBCC
    label: ~
    based_on:
      - DHH_AGE
      - ADM_PRX
      - HWTDVCOR
      - MAC_025
    description: 'This variable uses the respondent''s adjusted BMI, calculated in
      HWTDVCOR, to assign adult respondents aged 18 and over (except pregnant women)
      to one of the following categories: underweight; acceptable weight; overweight;
      obese class I; obese class II; and, obese class III. Here, the BMI categories
      are adopted from a body weight classification system recommended by Health Canada
      and the World Health Organization (WHO) which has been widely used internationally.'
    note: 'According to Health Canada, this BMI classification system can be used
      as a screening tool to identify weight-related health risks at the population
      and individual levels. The following health risks are associated with each of
      the BMI categories for adults aged 18 and over: normal weight = least health
      risk; underweight and overweight = increased health risk; obese class I = high
      health risk; obese class II = very high health risk; obese class III = extremely
      high health risk At the population level, the BMI classification system can
      be used to compare body weight patterns and related health risks within and
      between populations and to establish population trends in body weight patterns.
      The classification should be used with caution at the individual level because
      the health risk associated with each BMI category varies considerably between
      individuals. Particular caution should be used when classifying: youth who have
      not attained growth maturity, adults who are naturally very lean, very muscular
      adults, some ethnic and racial groups, and adults over 65 years of age. This
      variable excludes female respondents aged 18 to 55 who were pregnant or did
      not answer the pregnancy question (i.e. MAC_025 = don’t know, refusal, not stated).'
