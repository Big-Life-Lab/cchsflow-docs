  SAMDVSHR:
    name: SAMDVSHR
    label: ~
    based_on:
      - DHH_AGE
      - ADM_035 (Not on file - Share question from the main component)
      - PS_02 (Not on file - Share question from the
    description: This variable indicates whether or not the respondent agreed to share
      the information collected in the survey with the provincial and territorial
      ministries of health, Health Canada, the Public Health Agency of Canada, and
      the "Institut de la Statistique du Québec" for Quebec respondents. The variable
      SAMDVSHR is calculated from the responses to the Share questions in the Administration
      module (ADM_035), the Person most knowledgeable about the household (PMK_005)
      module and the Exit component (PS_02) for partial interviews.
    note: Permission to share data questions were asked according to respondent's
      age and identification of a person most knowledgeable about the household (PMKPROXY)
      for respondents aged less than 18 years old. For 12-13 years olds, permission
      to share was not asked to them directly. If a PMKPROXY was identified or if
      their interview was completed by a proxy respondent, permission to share data
      for the whole survey was asked to the PMKPROXY or PROXY respondent in ADM_035
      or PS_02. If no PMKPROXY was identified or the survey completed by the 12-13
      years old, no data sharing question was asked and data sharing is not possible.
      For respondents aged 14-17 years old, permission to share the part of the survey
      up to the Person most knowledgeable about the household (PMK) module was asked
      to them directly either in the PMK block itself before their participation ended,
      or in the exit share question (PS_02). If a PMKPROXY was identified to complete
      the rest of the survey, the PMKPROXY was asked the permission to share question
      for the remaining household related modules in ADM_035 or in PS_02. If permission
      to share was obtained from both the selected respondent in PMK module and the
      PMKPROXY in ADM_035 or PS_02, then the data for the whole interview can be shared.
      If the PMKPROXY did not agree to share the household related questions, then
      only data from which permission to share was obtained from the 14-17 years old
      can be shared (i.e. any data up to the PMK module). In this case, SAMDVSHR =
      3, i.e. partial share. If a PROXY respondent completed the survey for a 14-17
      years old, permission to share was only asked in ADM_035 or PS_02. For respondents
      aged 18 and over, the procedure around asking the share questions remains the
      same. Permission to share was asked directly to them or their PROXY respondent
      in either ADM_035 or PS_02.
    specifications:
      - value: '1'
        condition: DHH_AGE = (12,13) and proxy respondent
        description: Yes - Respondent agreed to share information
        notes: ''
      - value: '2'
        condition: DHH_AGE = (12,13) and proxy respondent
        description: No - Respondent did not agree to share information
        notes: ''
      - value: '3'
        condition: DHH_AGE = (14,15,16,17) and respondent
        description: Partial - Respondent aged 14 - 17 year olds accepts
        notes: ''
      - value: agreed to share but the PMKPROXY respondent
        condition: to share information but permission to share not
        description: ''
        notes: ''
      - value: did not agree to share
        condition: obtained from PMK.
        description: ''
        notes: ''
