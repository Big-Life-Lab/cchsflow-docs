  FSCDVAFS:
    name: FSCDVAFS
    label: ~
    based_on:
      - FSC_010
      - FSC_015
      - FSC_020
      - FSC_040
      - FSC_045
      - FSC_050
      - FSC_055
      - FSC_060
      - FSC_065
      - FSC_070
      - FSCTASUM
    description: 'This variable is based on a set of 10 adult-referenced questions
      and describes the food security situation of the adult members of the household
      in the previous 12 months. It captures three kinds of situations: 1 - Food secure:
      No, or one, indication of difficulty with income-related food access. 2 - Moderately
      food insecure: indication of compromise in quality and/or quantity of food consumed
      (2 to 5 affirmative responses). 3 - Severely food insecure: indication of reduced
      food intake and disrupted eating patterns (>= 6 affirmative responses) This
      variable is adopted from the Health Canada model of food security status.'
    note: 'This variable does not necessarily reflect the experience of all adult
      members in the household. When using the person weights (WTS_M), this variable
      reflects the number of people living in households with food insecurity among
      the adult members of the household. When using the household weights (WTS_MHH),
      this variable reflects the number of households with food insecurity among the
      adult members of the household. In order to determine household food security
      status, responses to each question are first coded as either "affirmative" or
      "negative". Some of this coding is obvious because the only response options
      are "yes" or "no". For questions with less obvious response categories, the
      procedure for coding is as follows: response categories such as "Often true",
      "Sometimes true", "Almost every month", "Some months but not every month" are
      coded as "affirmative" (i.e. coded equal to 1). Response categories such as
      "Never true", "Only 1 or 2 months" are coded as "negative" (i.e. coded equal
      to 0). This derived variable was introduced in 2010. Internet site: http://www.hc-sc.gc.ca/fn-an/surveill/nutrition/commun/insecurit/status-situation-eng.php'
    specifications:
      - value: '6'
        condition: DOFSC = 2
        description: Module not selected
        notes: NA
      - value: '9'
        condition: FSC_010 = (DK,RF,NS) or
        description: At least one required question was not answered
        notes: NS
      - value: FSC_015 = (DK,RF,NS) or
        condition: (don’t know, refusal, not stated)
        description: ''
        notes: ''
      - value: '0'
        condition: (FSCTASUM >= 0 and FSCTASUM <= 1)
        description: Food secure
        notes: ''
      - value: '1'
        condition: (FSCTASUM >= 2 and FSCTASUM <= 5)
        description: Moderately food insecure
        notes: ''
      - value: '2'
        condition: (FSCTASUM >= 6 and FSCTASUM <= 10)
        description: Severely food insecure
        notes: ''
    end_idx: 2434.0
    module: WTM
    module_name: Waiting times
