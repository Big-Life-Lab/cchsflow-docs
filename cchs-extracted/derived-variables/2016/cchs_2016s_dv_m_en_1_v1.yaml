      Economic family refers to a group of two or more persons who live in the same
      dwelling and are related to each other by blood, marriage, common-law or adoption.
      A couple may be of opposite or same sex. Foster children are included in this
      derived variable (but excluded from the target population) because this variable
      applies to all household members, not just the selected respondent.
    note: The necessary data is collected using a set of relationship codes that define
