      or rural area. Urban areas are those continuously built-up areas having a population
      concentration of 1,000 or more and a population density of 400 or more per square
      kilometre based on current census population counts. In CCHS Cycle 3.1, this
      variable was named GEODUR7 as there were 7 possible and there are no longer
