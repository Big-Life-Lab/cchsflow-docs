  GEODPC:
    name: GEODPC
    label: ~
    based_on: Respondent address information
    description: The Canadian postal code offers a unique reference system which provides
      a means of identifying a mail delivery location. It is composed of six alpha-numeric
      characters, in the form of "ANA NAN", where "A" represents a letter of the alphabet
      and "N" a number. The first character of a postal code (allocated in alphabetic
      sequence from east to west across Canada) represents a province or territory
      or a major sector entirely within a province. GEODPC is derived from the respondents
      available address information.
    note: ''
    specifications: []
    end_idx: 3814.0
    module: SSA
    module_name: Social support - Availability
  GEODHR4:
    name: GEODHR4
    label: ~
    based_on: GEODPC
    description: This variable is a 4-digit number that identifies the health region.
      Health regions refer to health administrative areas defined by the provincial
      ministries of health. For complete Canadian coverage, each of the northern territories
      represents its own health region. This variable is derived using the information
      available on the survey frame at the time of sampling and the geographic information
      provided by the respondent. The health regions are based on the health region
      limits as of December 2010 and their correspondence with 2006 Census geography.
    note: 'In 2010, the values for GEODHR4 (Health Region) for Alberta is changed
      to accommodate requests from the Alberta government. Instead of the 9 Health
      Regions used in previous years, 5 zones (4831-4835) are now employed. The peer
      groups are also updated to reflect the new health region code set used by Alberta.
      More details on health regions can be found in the "Health regions and peer
      groups" section of the online publication "Health Indicators", Statistics Canada,
      catalogue number 82-221-XIE. Correspondence files (linking health regions to
      latest census geographic codes) and digital boundary files are also available
      in the online publication "Health regions: Boundaries and Correspondence with
      Census Geography", Statistics Canada, catalogue number 82-402-XWE.'
    specifications: []
    end_idx: 3838.0
    module: SSA
    module_name: Social support - Availability
