        condition: (don‟t know, refusal, not stated)
        description: ''
        notes: ''
      - value: '1'
        condition: HWTDBMI < 18.50
        description: Underweight
        notes: ''
      - value: '2'
        condition: (18.50 <= HWTDBMI <= 24.99)
        description: Normal weight
        notes: ''
