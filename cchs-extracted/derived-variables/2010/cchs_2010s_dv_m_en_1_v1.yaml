    module_name: Social support - Availability
  GEODDA06:
    name: GEODDA06
    label: ~
    based_on: GEODPC
    description: The dissemination area (DA) is a small, relatively stable geographic
      unit composed of one or more dissemination blocks. It is the smallest standard
      geographic area for which all census data are disseminated. DAs cover all the
      territory of Canada. Using GEODPC, GEODDA06 is derived using the Postal Code
      Conversion File (PCCF), which provides a correspondence between the six character
      postal code and Statistics Canada's standard geographical areas for which census
      data and other statistics are produced. It is composed of the two digit province/territory
      code, the two digit census division code and the four digit dissemination area
      code. When the postal code corresponds to more than one DA, the case is assigned
      using the "most probable DA approach". GEODDA06 is based on the geography from
      the 2006 Census.
    note: There are 2 variables on the final file for Dissemination Area - 1 using
      the geography from the 2006 Census (GEODDA06) and 1 using the geography from
      the 2001 Census (GEODDA01). 10 ) 2006 Census Federal Electoral District (FED)
    specifications: []
    end_idx: 3952.0
    module: SSA
    module_name: Social support - Availability
  GEODFED:
    name: GEODFED
    label: ~
    based_on: GEODDA06
    description: 'A federal electoral district refers to any place or territorial
      area entitled to elect a representative member to serve in the House of Commons
      (Source: Canada Elections Act, 1990). There are 308 FEDs in Canada, and the
      FEDs used for the 2006 Census are based on the 2003 Representation Order. The
      first two digits identify the province or territory. 11 ) 2006 Census Subdivision
      (CSD)'
    note: ''
    specifications: []
    end_idx: 3964.0
    module: SSA
    module_name: Social support - Availability
  GEODCSD:
    name: GEODCSD
    label: ~
    based_on: GEODDA06
    description: The Census Subdivision is the general term applied to municipalities
      (as determined by provincial legislation) or their equivalent, e.g., Indian
      reserves, Indian settlements and unorganized territories. In Newfoundland and
      Labrador, Nova Scotia and British Columbia, the term also describes geographic
      areas that have been created by Statistics Canada in co-operation with the provinces
      as equivalents for municipalities. GEODCSD is derived from GEODDA06 using the
      Postal Code Conversion File (PCCF). 12 ) 2006 Census Division (CD)
    note: ''
    specifications: []
    end_idx: 3981.0
    module: SSA
    module_name: Social support - Availability
  GEODCD:
    name: GEODCD
    label: ~
    based_on: GEODDA06
    description: The Census Division refers to geographic areas established by provincial
      law, which are intermediate geographic areas between the census subdivision
      and the province (e.g., divisions, counties, regional districts, regional municipalities
      and seven other types of geographic areas made up of groups of census subdivisions).
      In Newfoundland and Labrador, Manitoba, Saskatchewan and Alberta, provincial
      law does not provide for these administrative geographic areas. Therefore, census
      divisions have been created by Statistics Canada in co-operation with these
      provinces. GEODCD is derived from GEODDA06 using the Postal Code Conversion
      File (PCCF).
    note: ''
