      - DPS_16
      - DPS_17
      - DPS_18
    description: This variable assesses the depression level of respondents who felt
      depressed or lost interest in things for 2 weeks or more last year. These include
      normal periods of sadness (for example, after the death of a loved one), as
      well as "serious" depression.
    note: 'The items used to measure depression are based on the work of Kessler and
      Mroczek (from University of Michigan). They selected a subset of items from
      the Composite International Diagnostic Interview (CIDI) that measure major depressive
      episodes (MDE). The CIDI is a structure diagnostic instrument that was designed
      to produce diagnoses according to the definitions and the criteria of both DSM-lll-R
      and the Diagnostic Criteria for the Research of the ICD-10. The short-form of
      MDE used in the CCHS was developed to operationalize Criteria A through C of
      the DSM-III-R diagnosis of MDE. The diagnostic hierarchy rules defined in the
      Criterion D (not superimposed on schizophrenia, schizophrenia form disorder,
      delusional disorders, or psychotic disorders NOS) were ignored. Higher scores
      indicate higher level of depression. Internet site: National Comorbidity Survey:
      www.hcp.med.harvard.edu/ncs/ Composite International Diagnostic Interview (CIDI):
      www.who.int/msa/cidi/index.htm'
