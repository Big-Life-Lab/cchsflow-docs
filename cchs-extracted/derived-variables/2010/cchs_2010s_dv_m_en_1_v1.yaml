    description: This variable categorizes injury type by body site.
    note: This variable was derived by creating a matrix between all possible answers
      in question INJ_05 (type of injury) with all possible answers in questions INJ_06
      and INJ_07 (body part injured). Each combination in the matrix was given a unique
      code, except for those combinations that are deemed impossible (e.g. dislocation
      of the eyes). Note that the answer category « hand-wrist » is, since 2003, divided
      in two separate categories (INJ_06=7 and INJ_07=8). These have to be merged
      in order to compare the 2003 results with the preceding reference periods. Respondents
      who did not suffer injuries in the 12 months before the interview have been
      excluded from the population.
