    description: This derived variable is used in the calculation of adjusted household
      income ratios (INCDADR). It identifies whether the respondent lives in an urban
      or rural area and classifies the respondent according to the population size
      of the urban area (or Census Metropolitan Area, CMA). In order to properly classify
      units into rural and urban groups and identify units belonging to CMAs, the
      postal code (GEODPC) is linked to the information on the most recent Postal
      Code Conversion File (PCCF). Population counts for these areas are determined
      by linking to the information available from GEOSUITE. The combined information
      is then used to code GEODPSZ. Specifications
