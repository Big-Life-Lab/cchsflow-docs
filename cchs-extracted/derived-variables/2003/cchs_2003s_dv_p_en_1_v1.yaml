variables:
  DHHCGHSZ:
    name: DHHCGHSZ
    module: ~
    based_on:
      - SAMPLEID
      - PERSONID
    description: This variable indicates the number of people living within a household.
    note: 'This variable is derived by sorting the household roster dataset by SAMPLEID
      and PERSONID and by counting the number of PERSONID’s within each SAMPLEID.
      Total number of PERSONID’s with each SAMPLEID Sort the file (Member file) by
      Number of persons in a (values: 1- 40) SAMPLEID and PERSONID household Five
      or more persons are The variable has been grouped to categories of 1 grouped
      together to 4 person households and to 5 or more person households.'
    specifications: []
  DHHCGL12:
    name: DHHCGL12
    module: ~
    based_on:
      - PERSONID
      - DHHC_AGE
    description: This variable indicates the number of people living within the household
      whose age is less than 12 years old. 0 DHHCDL12 = 0 No persons under 12 in the
      household 1 DHHCDL12 >= 1 One or more persons under 12 in the household
    note: 'The variable DHHCDL12 is derived by sorting the household roster dataset
      by SAMPLEID and PERSONID and by counting the number of PERSONID’s that have
      a DHHC_AGE value less than 12 within each SAMPLEID. The variable is not included
      in the Public Use Microdata File. The value is calculated as: Total number of
      PERSONID’s with DHHC_AGE < 12 Number of persons under 12 in a each SAMPLEID
      household (values: 0-40) (MEMBER file)'
    specifications: []
  DHHCGLE5:
    name: DHHCGLE5
    module: ~
    based_on:
      - PERSONID
      - DHHC_AGE
    description: This variable indicates the number of people living within the household
      whose age is less than 6 years old. 0 DHHCDLE5 = 0 No persons aged 5 and under
      in the household 1 DHHCDLE5 => 1 One or more persons under 5 in the household
    note: 'The variable DHHCDLE5 is derived by sorting the household roster dataset
      by SAMPLEID and PERSONID and by counting the number of PERSONID’s that have
      a DHHC_AGE value of 5 and under within each SAMPLEID The variable is not included
      in the Public Use Microdata File. The value is calculated as: Total number of
      PERSONID’s with DHHC_AGE <= 5 Number of persons under 5 in a each SAMPLEID household
      (values: 0-40) (Member file)'
    specifications: []
  DHHCG611:
    name: DHHCG611
    module: ~
    based_on:
      - PERSONID
      - DHHC_AGE
    description: This variable indicates the number of people living within the household
      who are aged 6 to 11 years old. 0 DHHCD611 = 0 No persons aged 6 to 11 in the
      household 1 DHHCD611 => 1 One or more persons aged 6 to 11 in the household
    note: 'The variable DHHCD611 is derived by sorting the household roster dataset
      by SAMPLEID and PERSONID and by counting the number of PERSONID’s that have
      a DHHC_AGE value from 6 to 11 within each SAMPLEID. The variable is not included
      in the Public Use Microdata File. The value is calculated as: Total number of
      PERSONID’s with (6 <= DHHC_AGE <= 11) Number of persons 6 to 11 in a each SAMPLEID
      household (values: 0-40) (Member file)'
    specifications: []
  DHHCGLVG:
    name: DHHCGLVG
    module: ~
    based_on: RE_REL of selected respondent only
    description: 'This variable describes the family relationships between the selected
      respondent and the rest of the household. It is collected using a set of relationship
      codes that define a link between each person in a household. All relationships
      with the selected respondent within each SAMPLEID (relationship of selected
      respondent to each other person within the household) are used in the calculation
      of this variable. Technical Specs: Some values have been grouped as specified
      below. Temporary Reformats Reformat Explanation RELATIONSHIP CODES: (*as on
      the relationship Relationship Codes used file) CODES CATEGORY A0 Husband/wife
      B0 Common law partner C0 Same-sex partner D0 Parent, unspecified D1 Birth father/mother
      D2 Step father/mother D3 Adoptive father/mother E0 Child, unspecified E1 Birth
      child E2 Step child E3 Adopted child F0 Sister/brother, unspecified F1 Full
      sister/brother F2 Half sister/brother F3 Step sister/brother F4 Adopted sister/brother
      F5 Foster sister/brother G0 Foster parent H0 Foster child I0 Grandparent J0
      Grandchild K0 In-law L0 Other related Y1 Single Z0 Unrelated ZZ, L8, L9 Not
      stated A1=(Parental) D0, D1, D2, D3 B1=(Child) E0, E1, E2, E3 C1=(Sibling) F0,
      F1, F2, F3, F4 K1=(Other relative) I0, J0, K0, L0 Temporary recodes to collapse
      relationships L1= (Non-relative) F5*, G0*, H0*, Z0 X1=(Spouse/Partner) A0, B0,
      C0 Z1=(Not stated) ZZ, L8, L9 * All Foster relationships (foster sister/brother,
      parent, or child) have been recoded into the Non relative relationship category
      due to the temporary nature of the relationships. 1 DHHCDHSZ = 1 Unattached
      individual living alone Selected respondent lives alone. Household size = 1.
      2 DHHCDHSZ > 1 and Unattached individual living with (No DHHC_REL = X1) and
      others (No DHHC_REL = A1) and (No DHHC_REL = B1) (Lives with others. S/he cannot
      have a marital/common-law or parental relationship but other relationships such
      as siblings are allowed) 3 DHHCDHSZ = 2 and Spouse/partner living with RE_REL
      = X1 spouse/partner Selected respondent lives with spouse/partner only. Household
      size = 2. 4 DHHCDHSZ > 2 and Parent living with spouse/partner one RE_REL =
      X1 and and children all other RE_REL = A1 Selected respondent lives with spouse/partner
      and child(ren). 5 DHHCDHSZ > 1 and Single parent living with children All DHHC_REL
      = A1 (Lives with child(ren). No other relationships are permitted) 6 (DHHCDHSZ
      = 2 and Selected respondent is a child living RE_REL = B1) or with a single
      parent with or without (DHHCDHSZ > 2 and siblings One RE_REL = B1 and all other
      RE_ REL = C1) 7 DHHCDHSZ > 2 and Child living with single parent and One DHHC_REL
      = B1 and siblings All other DHHC_REL= C1 (Child living with a single parent
      and siblings) 8 Else Other Selected respondent lives in a household composition
      not classified above. 99 (NS) RE_REL = Z1 Not Stated'
    note: 'The variable DHHCDHSZ is derived by sorting the household roster dataset
      by SAMPLEID and PERSONID and by counting the number of PERSONID’s within each
      SAMPLEID. The variable is not included in the Public Use Microdata File. The
      value is calculated as: Total number of PERSONID’s with Sort the file (Member
      file) by Number of persons in a household each SAMPLEID SAMPLEID and PERSONID
      (values: 1-40) Geographic Variables (2 DV’s)'
    specifications: []
  GEOCDPMF:
    name: GEOCDPMF
    module: ~
    based_on: GEOCDHR4
    description: 'This variable is a 5-digit number that identifies the sub-provincial
      health areas. It is based on the 4-digit health regions specified by the Provincial
      Ministries of Health. This reconstruction is as follows: - positions 1-2 (first
      two positions of GEOCDHR4); - position 3 (value of "9"); - positions 4-5 (3rd,
      4th position of GEOCDHR4) In order to ensure regions meet the minimum population
      size of about 70,000, the following regions have been collapsed: 10904 (GEOCDHR4
      = 1004, 1005, 1006) Group: Health and Community Services Western Region Grenfell
      Regional Health Services Board Health Labrador Corporation 11901 (GEOCDHR4 =
      1101, 1102, 1104) Group: West Prince East Prince Kings 13904 (GEOCDHR4 = 1304,
      1305) Group: Region 4 Region 5 13906 (GEOCDHR4 = 1306, 1307) Group: Region 6
      Region 7 35939 (GEOCDHR4 = 3539, 3554) Group: Huron County Health Unit Perth
      District Health Unit 35947 (GEOCDHR4 = 3547, 3563) Group: North Bay and District
      Health Unit Timiskaming Health Unit 46915 (GEOCDHR4 = 4615, 4645) Group: Brandon
      Regional Health Authority Assiniboine Regional Health Authority 46920 (GEOCDHR4
      = 4620, 4625) Group: North Eastman Regional Health Authority South Eastman Regional
      Health Authority 46960 (GEOCDHR4 = 4660, 4670, 4680) Group: Parkland Regional
      Health Authority Norman Regional Health Authority Burntwood Regional Health
      Authority/Churchill Regional Health Authority 47901 (GEOCDHR4 = 4701, 4702,
      4703) Group: Sun Country Regional Health Authority Five Hills Regional Health
      Authority Cypress Regional Health Authority 47905 (GEOCDHR4 = 4705, 4708) Group:
      Sunrise Regional Health Authority Kelsey trail Regional Health Authority 47907
      (GEOCDHR4 = 4707, 4710) Group: Heartland Regional Health Authority Prairie North
      Regional Health Authority 47909 (GEOCDHR4 = 4709, 4714) Group: Prince Albert
      Parkland Regional Health Authority Mamawetan Churchill River RHA/Keewatin Yatthé
      RHA/Athabasca Health Authority 48927 (GEOCDHR4 = 4827, 4828) Group: Peace Country
      Health Northern Lights Health Region 59951 (GEOCDHR4 = 5951, 5953) Group: Northwest
      Northeast 60901 (GEOCDHR4 = 6001, 6101, 6201) Group: Yukon Northwest Territories
      Nunavut 99996 (NA) Else Not applicable'
    note: The variable GEOCDHR4 is the health region based on GEOCDPC (postal code)
      and is derived using the information available on the survey frame at the time
      of sampling and the geographic information provided by the respondent. GEOCDHR4
      and GEOCDPC are not included in the Public Use Microdata File.
    specifications: []
  GEOCGSHR:
    name: GEOCGSHR
    module: ~
    based_on:
      - GEOCDSHR
      - GEOCDHR4
    description: 'This variable is a two-digit number grouping of the sub-health regions
      in the Québec health regions of Laurentides, Québec and Outaouais. 1 GEOCDHR4
      = 2415 and Group sub-health regions: (GEOCDSHR = 1, 2) Jean-Olivier Chénier
      Thérèse-de-Blainville 2 GEOCDHR4 = 2415 and Group sub-health regions: (GEOCDSHR
      = 3, 5, 6) Hautes-Laurentides Pays-d''en-Haut Trois-Vallées 3 GEOCDHR4 = 2415
      and Group sub-health regions: (GEOCDSHR = 4, 7) Arthur-Buies Argenteuil 4 GEOCDHR4
      = 2407 and Group sub-health regions: (GEOCDSHR = 71, 72, 73) or CLSC Hull [GEOCDSHR
      =76 and CLSC Grande-Rivière (GEOCDCSD = 2481005, 2481010)] CLSC Gatineau CLSC
      Vallée-de-la Lièvre : Buckingham, Masson-Angers 5 GEOCDHR4 = 2407 and Group
      sub-health regions: (GEOCDSHR = 74, 75, 77, 78) or CLSC Pontiac [GEOCDSHR =
      76 and CLSC Domaine des Forestiers (GEOCDCSD = 2480145, 2482005, CLSC Petite-Nation
      2480055, 2480060, 2480065, 2480085, CLSC Les Collines-de-l’Outaouais 2482010,
      2480050, 2480140, 2482015, CLSC Vallée-de-la-Lièvre : Bowman, 2480115)] L’Ange-Gardien,
      Lochaber, Lochaber- Partie-Ouest, Mayo, Mulgrave-et- Derry, Notre-Dame-de-la-Salette,
      Thurso, Val-des-Bois, Val-des-Monts, Boileau 6 (NA) Else Not applicable'
    note: The variable GEOCDSHR identifies the sub-health region within 3 health regions
      (2403, 2407 and 2415) for whom additional sample was added on a cost-recovery
      basis. It is derived using the information available on the survey frame at
      the time of sampling and the geographic information provided by the respondent.
      GEOCDSHR is not included in the Public Use Microdata File. The variable GEOCDCSD
      identifies the Census Subdivision which is the general term applied to municipalities
      (as determined by provincial legislation) or their equivalent, e.g., Indian
      reserves, Indian settlements and unorganized territories. In Newfoundland, Nova
      Scotia and British Columbia, the term also describes geographic areas that have
      been created by Statistics Canada in co-operation with the provinces as equivalents
      for municipalities. GEOCDCSD is derived from the Postal Code Conversion File
      (PCCF). The variable is not included in the Public Use Microdata File. Education
      Variables (2 DVs)
    specifications: []
