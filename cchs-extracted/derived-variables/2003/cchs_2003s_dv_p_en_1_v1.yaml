  HWTCGBMI:
    name: HWTCGBMI
    module: ~
    based_on:
      - HWTCGHT
      - HWTCGWTK
    description: This variable is a measure of the respondent’s weight relative to
      their height. It is calculated by dividing the respondent’s weight in kilograms
      by their height, measured in meters, squared. BMI = WEIGHT (KG) / HEIGHT (METERS)
      SQUARED
    note: The variable HWTCGHT refers to the meter values corresponding to the categories
      of this variable. Also, the calculation is performed prior to the rounding of
      HWTCGWTK.
    specifications: []
  HWTCGISW:
    name: HWTCGISW
    module: ~
    based_on: HWTCGBMI
    description: 'This variable assigns the respondent to one of the following categories,
      according to their Body Mass Index: underweight; acceptable weight; overweight;
      obese. The BMI Category is a method of classifying body weight according to
      health risk. According to World Health Organisation (WHO) and Health Canada
      guidelines, the following health risks are associated with each of BMI categories:
      normal weight = least health risk; underweight and overweight = increased health
      risk; obese= high health risk. This classification can be used to compare and
      track body weight patterns, and associated patterns or morbidity and mortality
      within populations. Caution should be used when making comparisons between populations
      because the prevalence of disease associated with each category can vary depending
      on factors including the ethnic composition of the populations involved. The
      classification should also be used with caution at the individual level because
      the health risk associated with each BMI category varies considerably between
      individuals. Particular caution should be used when classifying: young adults
      who have not reached maturity, adults who are naturally very lean, very muscular
      adults, some ethnic and racial groups, and seniors. For more detailed information
      on the appropriate use of this classification, see: Canadian Guidelines for
      Body Weight Classification in Adults, Health Canada, 2003. http://www.hc-sc.gc.ca/hpfb-dgpsa/onpp-bppn/weight_book_e.pdf
      6 (NA) HWTCGBMI = NA Population exclusion 9 (NS) HWTCGBMI = NS At least one
      required question was not answered (don’t know, refusal, not stated) 1 HWTCGBMI
      < 18.5 Underweight 2 (18.5 <= HWTCGBMI < 25.0) Normal weight 3 (25.0 <= HWTCGBMI
      < 30.0) Overweight 4 (30.0 <= HWTCGBMI < NA) Obese – Class I, II, III Chronic
      Conditions (2 DVs)'
    note: ~
    specifications: []
