  EDUCDH04:
    name: EDUCDH04
    module: ~
    based_on: EDUCDR04 for each member of the household
    description: This variable indicates the highest level of education acquired by
      any member of the household.
    note: This variable is derived by temporarily creating EDUCDR04 for each member
      of the household (all PERSONID within SAMPLEID), then by comparing these values
