  HUICDHSI:
    name: HUICDHSI
    module: ~
    based_on:
      - HUICDVIS
      - HUICDHER
      - HUICDSPE
      - HUICDMOB
      - HUICDDEX
      - HUICDEMO
      - HUINDCOG
      - HUICDPAD
    description: 'The Health Status Index or Health Utility INDEX (HUI) is a generic
      health status index that is able to synthesize both quantitative and qualitative
      aspects of health. The index, developed at McMaster University’s Centre for
      Health Economics and Policy Analysis, is based on the Comprehensive Health Status
      Measurement System (CHSMS). It provides a description of an individual’s overall
      functional health, based on eight attributes: vision, hearing, speech, mobility
      (ability to get around), dexterity (use of hands and fingers), cognition (memory
      and thinking), emotion (feelings), and pain and discomfort. In addition to describing
      functional health status levels, the CHSMS is the basis for HUI3. The HUI3 is
      a single numerical value for any possible combination of levels of these eight
      self-reported health attributes. The HUI3 maps any one of the vectors of eight
      health attribute levels into a summary health value between –0.360 and 1. For
      instance, an individual who is near-sighted, yet fully healthy on the other
      seven attributes, receives a score of 0.973. On that scale, the most preferred
      health level (perfect health) is rated 1.000 and death is rated 0.000, while
      negative scores reflect health states considered worse than death. The scores
      of the HUI embody the views of society concerning health status. These views
      are termed societal preferences, since preferences about various health states
      are elicited from a representative sample of individuals. The HUI3 (Mark 3)
      was developed by McMaster University’s Centre for Health Economics and Policy
      Analysis, and is derived using societal preferences from a random sample of
      500 people within the boundaries of the City of Hamilton-Wentworth, Ontario,
      Canada. The algorithm mapping the questions to the CHSMS itself is the property
      of Health Utilities Inc. and is protected by copyright. Statistics Canada is
      authorized, when requested, to share this algorithm with users who wish to replicate
      results or analyses conducted by Statistics Canada. The use of the algorithm
      for other purposes, or the sharing of it with others, is prohibited. For a detailed
      explanation of the calculation of the HUI3, refer to: Furlong WJ, Feeny DH,
      Torrance GW. “Health Utilities Index (HUI): Algorithm for determining HUI Mark
      2 (HUI2)/ Mark 3 (HUI3) health status classification levels, health states,
      health-related quality of life utility scores and single-attribute utility score
      from 40-item interviewer-administered health status questionnaires. Dundas,
      Canada: Health Utilities Inc. February 1999. Furlong WJ, Feeny DH, Torrance
      GW, et al. “Multiplicative multi-attribute utility function for the Health Utilities
      Index Mark 3 (HUI3) system: a technical report” Hamilton, Canada: McMaster University
      Centre for Health Economics and Policy Analysis Working Paper #98-11, December
      1998. Higher scale indicates better health index Range: -0.360 to 1 in increments
      of 0.001 Work Stress (7 DVs) The work stress items are sub-divided into six
      dimensions. As is the case for the overall index, answers to the items indicate
      the respondent’s perceptions about various dimensions of his/her work. The name
      of each subscale reflects the dimension which is measured. Respondents between
      the age of 15 and 75 who worked at a job or business at anytime in the past
      12 months were asked to evaluate their main job in the past 12 months. The 12-
      item index, based on a larger pool of items from Karasek and Theorell (1990),
      reflects a respondent’s perceptions of various dimensions of his/her work including
      job security, social support, monotony, physical effort required, and extent
      of participation in decision-making. Higher scores indicate greater work stress.
      References: For more information, please see:'
    note: ~
    specifications: []
