      for an individual who is 5’8”: LOWER LIMIT: Take the exact value in metres for
      a person who is 5’7” and average it with the value for 5’8”. UPPER LIMIT: Take
      the exact value in metres for a person who is 5’9” and average it with the value
      for 5’8” then subtract 0.001 from it. Technical Specs: In order to ensure certain
