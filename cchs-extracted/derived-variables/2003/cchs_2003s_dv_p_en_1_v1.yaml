  PACCDEE:
    name: PACCDEE
    module: ~
    based_on:
      - PACC_1V
      - PACC_2A
      - PACC_2B
      - PACC_2C
      - PACC_2D
      - PACC_2E
      - PACC_2F
      - PACC_2G
      - PACC_2H
    description: This variable is a measure of the average daily energy expended during
      leisure time activities by the respondent in the past three months.
    note: 'Energy Expenditure is calculated using the frequency and duration per session
      of the physical activity as well as the MET value of the activity. The MET is
      a value of metabolic energy cost expressed as a multiple of the resting metabolic
      rate. For example, an activity of 4 METS requires four times the amount of energy
      as compared to when the body is at rest. EE (Energy Expenditure for each activity)
      = (N X D X METvalue) / 365 Where: N = the number of times a respondent engaged
      in an activity over a 12 month period D = the average duration in hours of the
      activity MET value = the energy cost of the activity expressed as kilocalories
      expended per kilogram of body weight per hour of activity (kcal/kg per hour)/365
      (to convert yearly data into daily data) MET values tend to be expressed in
      three intensity levels (i.e. low, medium, high). The CCHS questions did not
      ask the respondent to specify the intensity level of their activities, therefore
      the MET values adopted correspond to the low intensity value of each activity.
      This approach is adopted from the Canadian Fitness and Lifestyle Research Institute
      because individuals tend to overestimate the intensity, frequency and duration
      of their activities. Internet site: Canadian Fitness and Lifestyle Research
      Institute: www.cflri.ca The MET values for the CCHS questions are: Variable
      Name Activity MET Value (kcal/kg/hr) PACCDEEA WALKING FOR EXERCISE 3 PACCDEEB
      GARDENING or YARD WORK 3 PACCDEEC SWIMMING 3 PACCDEED BICYCLING 4 PACCDEEE POPULAR
      or SOCIAL DANCE 3 PACCDEEF HOME EXERCISES 3 PACCDEEG ICE HOCKEY 6 PACCDEEH ICE
      SKATING 4 PACCDEEI IN-LINE SKATING or 5 ROLLERBLADING PACCDEEJ JOGGING or RUNNING*
      9.5 PACCDEEK GOLFING 4 PACCDEEL EXERCISE CLASS or AEROBICS 4 PACCDEEM DOWNHILL
      SKIING or 4 SNOWBOARDING PACCDEEN BOWLING 2 PACCDEEO BASEBALL or SOFTBALL 3
      PACCDEEP TENNIS 4 PACCDEEQ WEIGHT-TRAINING 3 PACCDEER FISHING 3 PACCDEES VOLLEYBALL
      5 PACCDEET BASKETBALL 6 PACCDEEZ SOCCER 5 PACCDEEU OTHER (U)* 4 PACCDEEW OTHER
      (W)* 4 PACCDEEX OTHER (X)* 4 * Jogging (MET value 7) and running (MET value
      12) fall under one category. Therefore, the MET value for the combined activity
      is the average of their MET values (9.5). Since it is difficult to assign a
      MET value to the category “Other Activities”, the MET value used is the average
      of the listed activities except for the average value of jogging and running.
      Here, the average value of jogging and running is replaced by the value for
      jogging only. Some activities have MET values lower than the average, however,
      this approach is consistent with other studies, such as the Campbell’s Survey
      and the Ontario Health Survey (OHS). Calculate EE Values for Each Activity WALKING
      FOR EXERCISE: 0 PACC_3A = NA Did not participate in activity 0 (PACC_3A = DK,
