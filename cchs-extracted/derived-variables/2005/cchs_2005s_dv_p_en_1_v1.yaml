  GEOnDFED:
    name: GEOnDFED
    module: ~
    based_on: GEOnDDA
    description: 'A federal electoral district refers to any place or territorial
      area entitled to elect a representative member to serve in the House of Commons
      (Source: Canada Elections Act, 1990). There are 301 FEDs in Canada, and the
      FEDs used for the 2001 Census are based on the 1996 Representation Order. The
      first two digits identify the province or territory (PR). 10) 2001 Census Division
      (CD)'
    note: ~
    specifications: []
  GEOnDCD:
    name: GEOnDCD
    module: ~
    based_on: GEOnDDA
    description: The Census Division refers to geographic areas established by provincial
      law, which are intermediate geographic areas between the census subdivision
      and the province (e.g., divisions, counties, regional districts, regional municipalities
      and seven other types of geographic areas made up of groups of census subdivisions).
      In Newfoundland and Labrador, Manitoba, Saskatchewan and Alberta, provincial
      law does not provide for these administrative geographic areas. Therefore, census
      divisions have been created by Statistics Canada in co-operation with these
      provinces. GEOnDCD is derived from GEOnDDA using the Postal Code Conversion
      File (PCCF). 11) 2001 Census Subdivision (CSD)
    note: ~
    specifications: []
  GEOnDCSD:
    name: GEOnDCSD
    module: ~
    based_on: GEOnDDA
    description: The Census Subdivision is the general term applied to municipalities
      (as determined by provincial legislation) or their equivalent, e.g., Indian
      reserves, Indian settlements and unorganized territories. In Newfoundland and
      Labrador, Nova Scotia and British Columbia, the term also describes geographic
      areas that have been created by Statistics Canada in co-operation with the provinces
      as equivalents for municipalities. GEOnDCSD is derived from GEOnDDA using the
      Postal Code Conversion File (PCCF). 12) 2001 Census Metropolitan Area (CMA)
    note: ~
    specifications: []
  GEOnDCMA:
    name: GEOnDCMA
    module: ~
    based_on: GEOn_PC
    description: The general concept of a census metropolitan area (CMA) is one of
      a very large urban area, together with adjacent urban and rural areas which
      have a high degree of economic and social integration with that urban area.
      A CMA is delineated around an urban area (called the urbanized core and having
      a population of at least 100,000, based on the previous census). There are 27
      CMAs according to the 2001 Census definition. When a postal code is not in a
      CMA, this variable is equal to 000. GEOnDCMA 000 No CMA assigned 001 St. John’s
      205 Halifax 310 Saint John 408 Saguenay 421 Québec 433 Sherbrooke 442 Trois-Rivières
      462 Montréal 505 Ottawa-Gatineau 521 Kingston 532 Oshawa 535 Toronto 537 Hamilton
      539 St. Catherines - Niagara 541 Kitchener 555 London 559 Windsor 580 Greater
      Sudbury 595 Thunder Bay 602 Winnipeg 705 Regina 725 Saskatoon 825 Calgary 835
      Edmonton 932 Abbotsford 933 Vancouver 935 Victoria
    note: ~
    specifications: []
  GEOnDSAT:
    name: GEOnDSAT
    module: ~
    based_on: GEOnDCSD
    description: The Statistical Area Classification Type (SAT) identifies the type
      of statistical area classification in which the census subdivision is located,
      according to whether the CSD is a component of a census metropolitan area (CMA),
      a census agglomeration (CA), a census metropolitan area and census agglomeration
      influenced zone (strong MIZ, moderate MIZ, weak MIZ or no MIZ), or the territories
      (Yukon Territory, Northwest Territories and Nunavut).
    note: ~
    specifications: []
  GEOnDUR7:
    name: GEOnDUR7
    module: ~
    based_on: GEOnDPC
    description: This variable identifies whether the respondent lives in an urban
      or rural area. Urban areas are those continuously built-up areas having a population
      concentration of 1,000 or more and a population density of 400 or more per square
      kilometre based on current census population counts. The value of this variable
      is missing for about 1% of the postal codes in Canada. 0 Missing 1 Urban core
      2 Urban fringe 3 Rural fringe inside CMAs and CAs 4 Urban area outside CMAs
      and CAs 5 Rural fringe outside CMAs and CAs 6 Secondary urban core
    note: ~
    specifications: []
