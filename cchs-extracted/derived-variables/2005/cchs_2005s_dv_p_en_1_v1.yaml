  SDCEGCGT:
    name: SDCEGCGT
    module: ~
    based_on:
      - SDCE_7A
      - SDCE_7B
      - SDCE7C
      - SDCE_7D
      - SDCE_7E
      - SDCE_7F
      - SDCE_7G
      - SDCE_7H
      - SDCE_7I
    description: This variable indicates the cultural or racial origin of the respondent.
      It excludes all respondents who identify as aboriginal. (The exclusion of aboriginals
      from this variable is new to cycle 3.1). This is a new variable and should be
      used with prudence when comparing to previous cycles of CCHS (SDCnRAC in CCHS
      2.1, CCHS 1.2, CCHS 1.1) and NPHS (SDC0DRAC, SDC8DRAC, SDC6DRAC, NSDC4DRAC (formerly
      DVRACE94)).
    note: From January to May 2005, information needed to derive this variable was
      collected using SDCn_7A to SDCn_7M. Beginning in June 2005, these questions
      were replaced by SDCn_43A to SDCn_43M as a result of changes to make CCHS more
      comparable to the Census of Population and with the Labour Force Survey (LFS).
      In previous cycles, the derived variable included the categories “multiple cultural
      or racial origins” and “aboriginal only”. Respondents who reported Aboriginal
      origin in combination with any other origin were classified as “multiple cultural
      or racial origins” and respondents who reported Aboriginal origin but no other
      origin were classified as “Aboriginal only” for the derived variable. Beginning
      in June 2005, respondents who identified themselves as aboriginal (SDCn_41=1)
      were not asked about their cultural or racial background. (SDCE_41 = DK, R,
      NS) or Required question was not answered NS (9) (SDCE_43A = DK, R, NS) or (don’t
