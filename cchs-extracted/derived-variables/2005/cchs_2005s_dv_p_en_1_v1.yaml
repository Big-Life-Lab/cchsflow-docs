  DHHnDDWE:
    name: DHHnDDWE
    module: ~
    based_on:
      - DHHn_DW1
      - DHHn_DW2 (not on the file)
    description: This variable indicates the type of dwelling the respondent lives
      in, according to the answer given either on the phone (DHHn_DW1 for an Area
      Frame case, or DHHn_DWT for a Telephone Frame case) or face- to-face (DHHn_DW2).
      99 (NS) (DHHn_DW1 = DK, R, NS) or At least one required question was (DHHn_DW2
      = DK, R, NS) or not answered (don’t know, refusal, (DHHn_DWT = DK, R, NS) not
      stated) 1 (DHHn_DW1 = 1) or Single detached (DHHn_DW2 = 1) or (DHHn_DWT = 1)
      2 (DHHn_DW1 = 2) or Double (DHHn_DW2 = 2) or (DHHn_DWT = 2) 3 (DHHn_DW1 = 3)
      or Row or terrace (DHHn_DW2 = 3) or (DHHn_DWT = 3) 4 (DHHn_DW1 = 4) or Duplex
      (DHHn_DW2 = 4) or (DHHn_DWT = 4) 5 (DHHn_DW1 = 5) or Low-rise apartment (< 5
      stories) or (DHHn_DW2 = 5) or flat (DHHn_DWT = 5) 6 (DHHn_DW1 = 6) or High-rise
      apartment (5 stories or (DHHn_DW2 = 6) or more) (DHHn_DWT = 6) 8 (DHHn_DW1 =
      8) or Hotel/rooming house/camp (DHHn_DW2 = 8) or (DHHn_DWT = 8) 9 (DHHn_DW1
      = 9) or Mobile home (DHHn_DW2 = 9) or (DHHn_DWT = 9) 10 (DHHn_DW1 = 10) or Other
      (DHHn_DW2 = 10) or (DHHn_DWT = 10)
