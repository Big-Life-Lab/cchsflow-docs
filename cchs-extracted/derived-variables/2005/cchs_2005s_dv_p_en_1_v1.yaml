      (4 DVs) The Medical Outcomes Study (MOS) Social Support Survey provides indicators
      of four categories of Social Support. An initial pool of 50 items was reduced
      to 19 functional support items that were hypothesized to cover five dimensions:
      • Emotional support –the expression of positive affect, empathetic understanding,
      and the encouragement of expressions of feelings. • Informational support –the
      offering of advice, information, guidance or feedback. • Tangible support –the
      provision of material aid or behavioural assistance. • Positive social interaction
      –the availability of other persons to do fun things with you. • Affection –involving
      expressions of love and affection. Empirical analyses indicated that emotional
      and informational support items should be scored together, so 4 subscales are
      derived: • Tangible social support (questions 2, 5, 12, 15) • Affection (questions
      6, 10, 20) • Positive social interaction (questions 7, 11, 14, 18) • Emotional
      or informational support (question 3, 4, 8, 9, 13, 16, 17, 19) Source: Sherbourne,
