  GEOnDPC:
    name: GEOnDPC
    module: ~
    based_on: Respondent address information
    description: The Canadian postal code offers a unique reference system which provides
      a means of identifying a mail delivery location. It is composed of six alpha-numeric
      characters, in the form of “ANA NAN”, where “A” represents a letter of the alphabet
      and “N” a number. The first character of a postal code (allocated in alphabetic
      sequence from east to west across Canada) represents a province or territory,
      or a major sector entirely within a province. GEOnDPC is derived from the respondents
      available address information 2) 2001 Dissemination Area (DA)
    note: ~
    specifications: []
  GEOnDDA:
    name: GEOnDDA
    module: ~
    based_on: GEOnDPC
    description: The dissemination area (DA) is a small, relatively stable geographic
      unit composed of one or more blocks. Dissemination areas cover all of the territory
      of Canada and replace the enumeration area (that is still used for census collection
      only) as the smallest standard census geographic area for which census profile
      data are disseminated. Using GEOnDPC, GEOnDDA is derived using the Postal Code
      Conversion File (PCCF), which provides a correspondence between the six character
      postal code and Statistics Canada's standard geographical areas for which census
      data and other statistics are produced. It is composed of the two digit province/territory
      code, the two digit census division code and the four digit dissemination area
      code. When the postal code corresponds to more than one DA, the case is assigned
      using the “most probable DA approach”.
    note: ~
    specifications: []
  GEOnDHR4:
    name: GEOnDHR4
    module: ~
    based_on: GEOnDPC
    description: This variable is a 4 digit number that identifies the health region.
      It is derived using the information available on the survey frame at the time
      of sampling and the geographic information provided by the respondent.
    note: ~
    specifications: []
  GEOEDPMF:
    name: GEOEDPMF
    module: ~
    based_on: GEOEDHR4
    description: 'This variable is a 5-digit number that identifies the sub-provincial
      health areas. It is based on the 4-digit health regions specified by the Provincial
