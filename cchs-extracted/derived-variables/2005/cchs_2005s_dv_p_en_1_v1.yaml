    description: 'This variable classifies children aged 12 to 17 as “obese” or “overweight”
      according to the age-and- sex-specific BMI cut-off points as defined by Cole
      et al. The Cole cut-off points are based on pooled international data (Brazil,
      Great Britain, Hong Kong, Netherlands, Singapore, and United States) for BMI
      and linked to the internationally accepted adult BMI cut-off points of 25 (overweight)
      and 30 kg/m2 (obese). For more information about the Cole BMI classification
      system, see Establishing a Standard Definition for Child Overweight and Obesity
      Worldwide - International survey, by Tim J. Cole, Mary C. Bellizzi, Katherine
      M. Flegal, William H. Dietz, published in British Medical Journal, Volume: 320,
      May 2000. al.) have been classified by CCHS as “neither obese nor overweight”.
      pregnancy question (i.e. MAME_037 = don’t know, refusal, not stated). Temporary
      variable 9999 (NS) If (DHHE_DOB = DK, R or NS) or A valid day of birth or month
      of (DHHE_MOB = DK, R or NS) or birth or year of birth is not (DHHE_YOB = DK,
      R or NS) available for the respondent. Interview date converted in months Age
      in months (ADME_YOI, ADME_MOI and Create respondent’s age in ADME_DOI) – Date
