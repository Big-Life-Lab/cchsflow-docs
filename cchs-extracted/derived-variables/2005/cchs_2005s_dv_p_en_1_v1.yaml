      row Health Status SF-36 (10 DVs) The 36-item short form (SF-36) of the Medical
      Outcomes Study questionnaire was designed as a generic indicator of health status
      for use in population surveys and evaluative studies of health policy. The SF-36
      was developed by John E. Ware Jr., Institute for the Improvement of Medical
      Care and Health, New England Medical Center Hospitals. The items in the SF-36
      were drawn from the original 245-item Medical Outcomes Study (MOS). The SF-36
      includes multi-item scales to measure the following three major health attributes
      and eight health concepts: • Functional Status - Physical Functioning - Social
      Functioning - Role Limitations attributed to Physical Problems - Role Limitations
      attributed to Emotional Problems • Well-Being - Mental Health - Energy (vitality)
      - Bodily Pain • Overall Evaluation of Health. - General Health Perception A
      scale is calculated for each of the eight health concepts. All scales are scored
      so that a high score is consistent with a positive health status. For example,
      a “functioning” scale is scored so that a higher score reflects increased function.
      In order to facilitate comparisons across the SF-36 scales, the raw scores for
      each scale are linearly transformed to a 0-to-100 scale using the formula: Transformed
      scale = [(Actual score – Lowest possible score) / Possible score range] X 100
      The transformed score reflects a relative position of the respondent on a continuum
      of lowest to highest possible scale scores. Two summary measures of physical
      and mental health are also constructed from the eight scales. Temporary Reformats:
