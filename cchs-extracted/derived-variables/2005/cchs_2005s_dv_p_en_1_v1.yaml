  GEOnDLHN:
    name: GEOnDLHN
    module: ~
    based_on:
      - GEOnPRV
      - GEOnDPC
    description: 'This variable is a 4 digit number that identifies the sub-provincial
      health areas of Ontario. It is equal to 9996 everywhere outside Ontario. Data
      in Ontario are provided for two levels of geography: Public Health Units (PHU)
      and the Local Health Integration Networks (LHIN). Because health units were
      the principal areas of interest at the time the Cycle 3.1 sample was designed,
      data are weighted to match PHU population totals rather than LHIN totals. As
      a result, analysis involving calculation of totals by LHIN may be misleading.
      For Cycle 3.1, Statistics Canada recommends that analysis of data by LIHN be
      restricted to the calculation of ratios.'
    note: ~
    specifications: []
