  TEMP_RATIO:
    name: TEMP_RATIO
    module: ~
    based_on:
      - INCn_3
      - INCnDHH
      - GEOn_PRV
      - DHHnDHSZ
      - GEOnDPSZ
    description: 'This derived variable is not disseminated in the microdata files.
      It is used in the creation of adjusted ratios that are disseminated in the master
      and share files. This derived variable is a ratio between the total income of
      the respondent’s household and the low income cut- off corresponding to the
      number of persons in the household and the size of the community. The low income
      cut- off is the threshold at which a family would typically spend a larger portion
      of its income than the average family on the necessities of food, shelter and
      clothing. This derived variable is used in the calculation of adjusted ratios
      (INCnDADR). It is produced in three separate steps. A summary of those steps
      is provided below. Step 1: Low income cut-offs for each family and community
      size were obtained for the 2004 reference year from the Survey of Labour and
      Income Dynamics (SLID). In the case of the CCHS Cycle 3.1, the income questions
      refer to the past 12 months. Given that most of the collection took place between
      January 2005 and December 2005, the reference period for the income module includes
      the years 2004 and 2005. Since data on 2005 income will not be available on
      time for the dissemination of the CCHS data, and the impact of using either
      years on the final derived variables was determined to be minimal, it was decided
      to use the low income cut-offs for 2004. A low income cut-off was linked to
      all respondents (TEMP_LICO). This cut-off corresponded to the size of the respondent’s
      household (DHCnDHSZ) and the size of the community in which the respondent lives
      (GEOnDPSZ). Therefore, respondents were assigned one of the 35 possible combinations
      that exist (7 household size groups time 5 community size groups). For instance,
      the TEMP_LICO variable of a respondent living in a household size of 3 people
      and in an urban community with a population of 47,000 people would be 26,639.
      Low income cut-offs for 2004 Number of persons in community (GEOnDPSZ) Number
      of Urban area persons in household Rural Fewer 30 000 100 000 500 000 (DHHnDHSZ)
      area than to to or 30 000 99 999 499 999 more 1 14 000 15 928 17 407 17 515
      20 337 2 17 429 19 828 21 669 21 804 25 319 3 21 426 24 375 26 639 26 805 31
      126 4 26 015 29 596 32 345 32 546 37 791 5 29 505 33 567 36 685 36 912 42 862
      6 33 278 37 858 41 375 41 631 48 341 7 or more 37 050 42 150 46 065 46 350 53
      821 Source: Adapted from Low income cut-offs for 2004 and low income measures
      for 2002, published in 2005 by the Income Statistics Division, Statistics Canada.
      Step 2a: Household income is obtained using INCn_3 questions for a specific
      amount and INCnDHH (INCn_3A to INCn_3G) for an amount in an interval. If a specific
      amount is obtained at question INCn_3, that amount is used as household income.
      If only one interval is reported for INCn_3A to INCn_3G, a random value within
      each interval is derived from INCnDHH for household income for all intervals
      but the highest one (see next step). Step 2b: For the highest household income
      interval ($100 000 or more), for each province, the median value from the Survey
      of Labour and Income Dynamics (SLID) for the same interval will be used as the
      household income. However, because the SLID findings for the 2004 reference
      year were not available on time for the dissemination of the CCHS - Cycle 3.1,
      the data must be projected to estimate the “$100 000 or more” interval for the
      2004 reference year. To that end, the growth in total provincial personal income
      between 2002 and 2004 was used. Total provincial personal income (in millions
      of dollars) and % change 1 2002 2004 % Newfoundland and 8.0 11,895 12,851 Labrador
      Prince Edward Island 3,255 3,465 6.5 Nova Scotia 23,766 25,237 6.2 New Brunswick
      18,259 19,354 6.0 Quebec 199,402 215,424 8.0 Ontario 370,599 396,757 7.1 Manitoba
      29,940 31,995 6.9 Saskatchewan 24,101 26,875 11.5 Alberta 100,748 112,190 11.4
      British Columbia 113,350 121,747 7.4 Source: Data obtained from the Income and
      Expenditure Accounts Division On the basis of the projection of median provincial
      household income in 2002 from the SLID for the “100 000 $ or more” category,
      the estimation for 2004 to be used for Cycle 3.1 is indicated in the table below.
      Median household income in 2002 from the SLID and projected for 2004, by province
      or territory 2002 2004p Newfoundland and Labrador 120 215 129 877 Prince Edward
      Island 120 254 128 012 Nova Scotia 126 278 134 094 New Brunswick 118 909 126
      040 Estimations of provincial personal income are never final and definitive
      because once produced they are revised over the following three years. When
      household income is projected, the level of provincial personal income and the
      fact that its estimations are revised are of little consequence; it is the rate
      of growth between the two desired years that is essential. Quebec 119 864 129
      495 Ontario 129 513 138 654 Manitoba 120 897 129 195 Saskatchewan 120 946 134
      867 Alberta 130 196 144 982 British Columbia 127 072 136 436 Thus, the temporary
      variable for household income (TEMP_INC) is obtained according to the following
      specifications: TEMP_INC 999999 INCnDHH = 99 None of the income questions was
      stated 999996 GEOn_PRV = 60, 61, 62 Residents of Territories excluded 0 If INCnDHH
      = 1 No income INCn_3 0 < INCn_3 < 999996 Specific and positive household income
      RANDOM Random variable for a stated income in an (MIN=1, INCnDHH = 2 interval
      of $1 to $4,999 MAX=4999) RANDOM Random variable for a stated income in an (MIN=5000,
      INCnDHH = 3 interval of $5,000 to $9,999 MAX=9999) RANDOM Random variable for
      a stated income in an (MIN=10000, INCnDHH = 4 interval of $10,000 to $14,999
      MAX=14999) RANDOM Random variable for a stated income in an (MIN=15000, INCnDHH
      = 5 interval of $15,000 to $19,999 MAX=19999) RANDOM Random variable for a stated
      income in an (MIN=20000, INCnDHH = 6 interval of $20,000 to $29,999 MAX=29999)
      RANDOM Random variable for a stated income in an (MIN=30000, INCnDHH = 7 interval
      of $30,000 to $39,999 MAX=39999) RANDOM Random variable for a stated income
      in an (MIN=40000, INCnDHH = 8 interval of $40,000 to $49,999 MAX=49999) RANDOM
      Random variable for a stated income in an INCnDHH = 9 (MIN=50000, interval of
      $50,000 to $59,999 TEMP_INC MAX=59999) RANDOM Random variable for a stated income
      in an (MIN=60000, INCnDHH = 10 interval of $60,000 to $79,999 MAX=79999) RANDOM
      Random variable for a stated income in an (MIN=80000, INCnDHH = 11 interval
      of $80,000 to $99,999 MAX=99999) Imputed value from SLID if the province of
      INCnDHH = 12 and GEOn_PRV = 10 residence is Newfoundland and Labrador 129,877
      Imputed value from SLID if the province of INCnDHH = 12 and GEOn_PRV = 11 residence
      is Prince Edward Island 128,012 Imputed value from SLID if the province of INCnDHH
      = 12 and GEOn_PRV = 12 residence is Nova Scotia 134,094 Imputed value from SLID
      if the province of INCnDHH = 12 and GEOn_PRV = 13 residence is New Brunswick
      126,040 Imputed value from SLID if the province of INCnDHH = 12 and GEOn_PRV
      = 24 residence is Quebec 129,495 Imputed value from SLID if the province of
      INCnDHH = 12 and GEOn_PRV = 35 residence is Ontario 138,654 Imputed value from
      SLID if the province of INCnDHH = 12 and GEOn_PRV = 46 residence is Manitoba
      129,195 Imputed value from SLID if the province of INCnDHH = 12 and GEOn_PRV
      = 47 residence is Saskatchewan 134,867 Imputed value from SLID if the province
      of INCnDHH = 12 and GEOn_PRV = 48 residence is Alberta 144,982 Imputed value
      from SLID if the province of INCnDHH = 12 and GEOn_PRV = 59 residence is British
      Columbia 136,436 Step 3: Individual ratios of household income to the low income
      cut-off are calculated for each household within each household and community
      size using the DHCnDHSZ household size variable and the GEOnDPSZ community size
      variable. Ratios are calculated by dividing household income (TEMP_INC) by the
      corresponding low income cut-off (TEMP_LICO). TEMP_RATIO Condition(s) Description
      (9 decimals) The ratio cannot be calculated because the 99.999999999 TEMP_INC
      = 999999 household income was not stated. 99.999999996 TEMP_INC = 999996 Residents
      of Territories excluded Individual ratio of household income to the low income
      cut-off corresponding to the size of the household and the size of the 0 – 40
      TEMP_INC / TEMP_LICO community. The maximum ratio is based on the maximum household
      income accepted, which is $500,000.'
    note: ~
    specifications: []
  INCnDADR:
    name: INCnDADR
    module: ~
    based_on: TEMP_RATIO
    description: Adjusted ratios of household income to the low income cut-off are
      obtained by dividing the original ratios by a factor used to convert them into
      ratios lower than or equal to 1. The factor used corresponds to the highest
      ratio for all survey respondents, with the exception of those residing in the
      Territories who are excluded from the calculation of this variable. INCnDADR
      Condition(s) Description (9 decimals) The ratio cannot be calculated because
      the 9.999999999 TEMP_RATIO = 99,999999999 household income was not stated. 9.999999996
      TEMP_RATIO = 99,999999996 Residents of Territories excluded Ratio between 0
      and 1 corresponding to the (TEMP_RATIO / Max for all household income and the
      corresponding low 0–1 respondents) income cut-off divided by the highest ratio
      for all respondents.
    note: ~
    specifications: []
  INCEDRCA:
    name: INCEDRCA
    module: ~
    based_on: INCEDADR
    description: This derived variable is a distribution of Canadians in deciles (ten
      categories including approximately the same percentage of residents for each
      province) based on their value for INCEDADR, ie. the adjusted ratio of their
      total household income to the low income cut-off corresponding to their household
      and community size. It provides, for each respondent, a relative measure of
      their household income to the household incomes of all other respondents. Deciles
      are generated using weighted data. Adjusted ratios are presented in increasing
      order, from smallest to largest, for all 10 provinces irrespective of household
      and community size. Derived variables are calculated only for valid responses
      (not stated, refused, etc. are excluded). Boundaries are determined in order
      to derive deciles from the total weighted number of cases for which derived
      variables are calculated. INCEDRCA 96 Residents of Territories excluded N/A
      99 INCEDADR = 9.999999999 Not stated First 10% of respondents from the ascending
      list of adjusted 1 Decile 1 ratios (INCEDADR) Second 10% of respondents from
      the ascending list of 2 Decile 2 adjusted ratios (INCEDADR) Third 10% of respondents
      from the ascending list of adjusted 3 Decile 3 ratios (INCEDADR) Fourth 10%
      of respondents from the ascending list of 4 Decile 4 adjusted ratios (INCEDADR)
      Fifth 10% of respondents from the ascending list of adjusted 5 Decile 5 ratios
      (INCEDADR) Sixth 10% of respondents from the ascending list of adjusted 6 Decile
