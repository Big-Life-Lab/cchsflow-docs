  HWTnDISW:
    name: HWTnDISW
    module: ~
    based_on:
      - HWTnDBMI
      - DDHn_AGE
    description: 'This variable assigns adult respondents aged 18 and over (except
      pregnant women) to one of the following categories, according to their Body
      Mass Index (BMI): underweight; acceptable weight; overweight; obese class I;
      obese class II; and, obese class III. Here, the BMI categories are adopted from
      a body weight classification system recommended by Health Canada and the World
      Health Organization (WHO) which has been widely used internationally. According
      to Health Canada, this BMI classification system can be used as a screening
      tool to identify weight- related health risks at the population and individual
      levels. The following health risks are associated with each of the BMI categories
      for adults aged 18 and over: • normal weight = least health risk; • underweight
      and overweight = increased health risk; • obese class I = high health risk;
      • obese class II = very high health risk; • obese class III = extremely high
      health risk At the population level, the BMI classification system can be used
      to compare body weight patterns and related health risks within and between
      populations and to establish population trends in body weight patterns. The
      classification should be used with caution at the individual level because the
      health risk associated with each BMI category varies considerably between individuals.
      Particular caution should be used when classifying: adults who are naturally
      very lean, very muscular adults, some ethnic and racial groups, and seniors.
      For more detailed information see Canadian Guidelines for Body Weight Classification
      in Adults, Health Canada, 2003 (available online at: http://www.hc-sc.gc.ca/hpfb-dgpsa/onpp-bppn/weight_book_e.pdf).'
    note: This variable excludes female respondents aged 18 to 49 who were pregnant
      or did not answer the pregnancy question (i.e. MAMn_037 = don’t know, refusal,
      not stated). 96 (NA) DDHn_AGE < 18 or Population exclusions MAMn_037 = 1 99
      (NS) HWTnDBMI = NS or At least one required question MAMn_037 = DK, R, NS was
      not answered (don’t know, refusal, not stated) 1 HWTnDBMI < 18.50 Underweight
      2 (18.50 <= HWTnDBMI <= 24.99) Normal weight 3 (25.00 <= HWTnDBMI <= 29.99)
      Overweight 4 (30.00 <= HWTnDBMI <= 34.99) Obese – Class I 5 (35.00 <= HWTnDBMI
      <= 39.99) Obese – Class II 6 HWTnDBMI >= 40.00 Obese – Class III
    specifications: []
