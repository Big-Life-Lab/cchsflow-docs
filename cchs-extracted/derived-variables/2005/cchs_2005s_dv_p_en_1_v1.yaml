    module: ~
    based_on:
      - SDCn_41
      - SDCn_7L
    description: This is a new derived variable which indicates whether the respondent
      reported being an aboriginal person or having aboriginal origins.
    note: From January to May 2005, information needed to derive this variable was
      collected using SDCn_7L. Respondents were asked to report their cultural or
      racial background and “Aboriginal (North American Indian, Métis, Inuit)” was
      one of a list of mark-all answer categories provided. Beginning in June 2005,
      the approach used to collect this information was changed to make CCHS more
      consistent with the Census of Population and with the Labour Force Survey (LFS).
      SDCn_7L was replaced by SDCn_41 and respondents were asked directly “Are you
      an Aboriginal person, that is, North American Indian, Métis or Inuit?” Prior
      to June 2005, respondents were able to report aboriginal background in combination
      with other cultural or racial backgrounds. All aboriginal respondents are assigned
      a value of 1 for this variable regardless of whether they reported aboriginal
      background singly or in combination with non-aboriginal background. Beginning
      in June 2005, respondents identifying themselves as Aboriginal were not asked
      SDCn_43A to SDCn_43M, which collect information on other backgrounds. SDCn_41
      = DK, R, NS and SDCn_7L = Required question was not answered NS (9) DK, R, NS
      (don’t know, refusal, not stated) Aboriginal (North American Indian, 1 SDCn_41
      = 1 or SDCn_7L = 1 Métis, Inuit) 2 SDCn_41 =2 or SDCn_7L = 2 Not Aboriginal
    specifications: []
