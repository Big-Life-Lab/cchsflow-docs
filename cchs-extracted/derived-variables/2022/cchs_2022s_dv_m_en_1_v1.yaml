  SMKDVSTY:
    name: SMKDVSTY
    label: ~
    based_on:
      - CSS_05
      - CSS_15
      - CSS_20
      - SPU_05
    description: This variable indicates the type of smoker the respondent is, based
      on his/her smoking habits.
    note: This variable includes lifetime cigarette consumption. Due to a change in
      the content and flows in 2022, the current smoking status cannot be identified
      for respondents who reported having smoked at least one whole cigarette (CSS_05
      = 1) but less than 100 cigarettes in their lifetime (CSS_15 = 2). For the purpose
      of this DV, these respondents are categorized as ‘Experimental smokers’. This
      may result in an undercounting for the other categories. In 2023, respondents
      who reported to have not smoked more than 100 cigarettes (CSS_15 = 2) are asked
      about their status for smoking in the past 30 days and may indicate daily smoking
      (CSS_20 = 1) or occasional smoking (CSS_20 = (2 or 3)) and will be categorized
      as either daily or occasional smokers in this variable. In 2022, respondents
      who have not smoked more than 100 cigarettes (CSS_15 = 2) skipped the question
      about past 30-day smoking habits (CSS_20) and instead, would go to the end of
      the CSS module and were coded as experimental smokers.
    specifications:
      - value: '6'
        condition: DOCSS = 0 or DOSPU = 0
        description: Modules were not selected
        notes: ''
      - value: '9'
        condition: CSS_05 = NS or
        description: At least one required question was not answered
        notes: NS
      - value: CSS_15 = NS or
        condition: (not stated)
        description: ''
        notes: ''
      - value: '1'
        condition: CSS_20 = 1
        description: Current daily smoker
        notes: ''
      - value: '2'
        condition: CSS_20 = (2 or 3)
        description: Current occasional smoker
        notes: ''
      - value: '3'
        condition: CSS_15 = 1 and
        description: Former daily smoker (non-smoker now)
        notes: ''
      - value: '4'
        condition: CSS_15 = 1 and
        description: Former occasional smoker (non-smoker now)
        notes: ''
      - value: '5'
        condition: CSS_05 = 1 and
        description: Experimental smoker (at least 1 whole cigarette,
        notes: ''
      - value: CSS_15 = 2
        condition: less than 100 cigarettes)
        description: ''
        notes: ''
      - value: '6'
        condition: CSS_05 = 2
        description: Lifetime abstainer (never smoked a whole cigarette)
        notes: ''
    end_idx: 5616.0
    module: SMK
    module_name: Smoking
