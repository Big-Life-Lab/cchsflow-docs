  GEODVHCS:
    name: GEODVHCS
    label: ~
    based_on:
      - GEO_PRV
      - GEODVPC
    description: 'This variable is a four digit number that identifies sub-provincial
      health areas of Ontario. It is equal to 9996 everywhere outside Ontario. Data
      in Ontario are provided for two levels of geography: Public Health Units (PHU)
      and the Home and Community Care Support Services regions (HCCSS; formerly known
      as Local health integration Network or LHIN). As of 2015, the HCCS given on
      the CCHS file is the "statistical" HCCS. Statistical HCCS are formed by reclassifying
      a small percentage of units from one HCCS to another where the PHU-HCCS intersections
      are particularly small. This reclassification facilitates estimation at the
      PHU and HCCS level from one set of weights.'
    note: ''
    specifications: []
    end_idx: 2557.0
    module: SMK
    module_name: Smoking
