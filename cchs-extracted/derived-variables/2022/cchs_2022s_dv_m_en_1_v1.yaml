    module: SMK
    module_name: Smoking
  HMCDVHLP:
    name: HMCDVHLP
    label: ~
    based_on:
      - DHH_AGE
      - HMC_005G
      - HMC_037
    description: This variable indicates whether a household member who received some
      form of home care service in the past 12 months perceived that the services
      helped them stay at home. By "stay at home" we mean that it enabled the recipient
      to stay out of a hospital, nursing home, hospice, or assisted living facility.
    note: When household weights are used, this variable can be used to represent
      the number of households where home care services were received, and where these
      services helped the household members who received the care to stay home. The
      person-level weight may only be used in cases where the respondents themselves
      received home care services, as verified in the responses to HMC_Q010. Other
      household members may also have received home care services. Estimates produced
      using the person-level weight represent the number of people aged 18 and older
      who were able to stay home because of the home care services they received.
      2023
    specifications:
      - value: '6'
        condition: DOHMC = 0
