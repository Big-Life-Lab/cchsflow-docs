  HMCDVVRH:
    name: HMCDVVRH
    label: ~
    based_on:
      - AWCAGE
      - HMC_005A
      - HMC_005B
      - HMC_005C
      - HMC_005D
      - HMC_005E
      - HMC_005F
      - HMC_005G
    description: This variable indicates whether a household member received some
      form of home care service (whether the cost of the service was covered or not
      by government) in the past 12 months. Starting 2015, this variable represent
      households where at least one member received home care services, rather than
      the respondent.
    note: Respondents less than 18 years old were excluded from the population. When
      using the person weight (WTS_M), this variable reflects the number of people
      living in households who received some form of home care service. When using
      the household weights (WTS_MHH), this variable reflects the number of households
      where at least one member received some form of home care service.
    specifications:
      - value: '6'
        condition: DOHMC = 0
        description: Module not selected
        notes: NA
      - value: '6'
        condition: AWCAGE < 18
        description: Population exclusions
        notes: NA
      - value: '1'
        condition: HMC_005A = 1 or
        description: Received some home care services in past 12
        notes: ''
      - value: HMC_005B = 1 or
        condition: months
        description: ''
        notes: ''
      - value: '2'
        condition: HMC_005G = 1
        description: No one in the household received any home care
        notes: ''
      - value: '9'
        condition: HMC_005A = NS or
        description: At least one required question was not answered
        notes: NS
      - value: HMC_005B = NS or
        condition: (not stated)
        description: ''
        notes: ''
