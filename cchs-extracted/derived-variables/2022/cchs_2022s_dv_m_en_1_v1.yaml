  SAMDVSHR:
    name: SAMDVSHR
    label: ~
    based_on:
      - AWCAGE
      - ADMC_35 (Not on file)
      - ADMC_35Y (Not on file)
    description: This variable indicates whether or not the respondent agreed to share
      the information collected in the survey with the provincial and territorial
      ministries of health, Health Canada, the Public Health Agency of Canada, and
      the "Institut de la Statistique du Québec" for Quebec respondents. The variable
      SAMDVSHR is calculated from the responses to the Share questions in the Administration
      information module (ADMC_35) by the respondent and/or the Person most knowledgeable
      about the household situation (PMK).
    note: Permission to share data questions were asked according to respondent's
      age and identification of a person most knowledgeable about the household (PMK)
      for respondents aged less than 18 years old. Both the PMK and youth are asked
      for permission to share in ADMC_35. A new variable (ADMC_35Y) has been created
      to differentiate the PMK answer (ADMC_35) to the Youth answer (ADMC_35Y). For
      12-14 year-olds, permission to share was not asked to them directly. If a PMK
      was identified or if their interview was completed by a proxy respondent, permission
      to share data for the whole survey was asked to the PMK or PROXY respondent
      in ADMC_35. If no PMK was identified or the survey was completed by the 12-14
      year old, no data sharing question was asked and data sharing is not possible.
      For respondents aged 15-17 years old, permission to share their part of the
      survey was asked to them directly. If a PMK was identified to complete their
      part of the survey, the PMK was asked the permission to share question for the
      remaining household related modules. If permission to share was obtained from
      both the selected respondent and the PMK in ADMC_35, then the data for the whole
      interview can be shared. If the PMK did not agree to share the household related
      questions, then only data from which permission to share was obtained from the
      15-17 year old can be shared (i.e. any data up to the PMK module). In this case,
      SAMDVSHR = 3 (partial share.) If a PROXY respondent completed the survey for
      a 15- 17 year old, permission to share was asked in ADMC_35. If the PMK agrees
      to share responses to household level questions on behalf of a respondent aged
      15-17 who does not agree to share, then SAMDVSHR = 2 (respondent did not agree
      to share information). For respondents aged 18 and over, the procedure around
      asking the share questions remains the same. Permission to share was asked directly
      to them or their PROXY respondent in ADMC_35.
    specifications:
      - value: '1'
        condition: (AWCAGE = (12,13,14) and
        description: Yes - Respondent agreed to share information
        notes: ''
      - value: '2023'
        condition: '77'
        description: ''
        notes: ''
      - value: '2'
        condition: (AWCAGE = (12,13,14) and
        description: No - Respondent did not agree to share information
        notes: ''
      - value: '3'
        condition: AWCAGE = (15,16,17) and
        description: Partial - Respondent aged 15-17 year olds accepts
        notes: ''
      - value: ADMC_35 = (2, NS) and
        condition: to share information but permission to share not
        description: ''
        notes: ''
      - value: ADMC_35Y = 1
        condition: obtained from PMK.
        description: ''
