  SDCDVFLS:
    name: SDCDVFLS
    module: WTM
    based_on:
      - PMK_PROXY
      - ADM_PRX
      - ADM_055
      - SDCDVFL1
      - SDCDVLHM
      - SDCDVLNG
      - SDC_025
      - SDCTLNG
    description: 'For the censuses, this variable was derived within the framework
      of the application of the Official Languages Act. The same method for deriving
      the variable was applied here. This derivation method is described in the regulations
      concerning the use of official languages for the provision of public services.
      It takes into account first the knowledge of the two official languages, second
      the mother tongue, and third the home language. People who can conduct a conversation
      in French only are assigned French as their first official language spoken.
      People who can carry on a conversation in English only are assigned English
      as their first official language spoken. The responses to questions on mother
      tongue and home language are subsequently used to establish the first official
      language spoken by people who speak both English and French, or who cannot speak
      either of the two official languages. The French category includes people who
      have French only or French and at least one non-official language as their mother
      tongue. People who have English only or English and at least one non-official
      language as their mother tongue are included in the English category. For cases
      that have not yet been classified, people are assigned to the French category
      when they speak French only or French and at least one non-official language
      as their home language. The procedure is the same for English. Thus, the population
      is classified into two principal categories: English or French. It is necessary
      to add two residual categories for people who cannot be classified in accordance
      with the information available: English and French and neither English nor French.
      Please consult the following documents for more information: Regulations respecting
      communications with and services to the public in either official language,
      registered on December 16, 1991, in accordance with section 85 of the Official
      Languages Act, R.S.C., c. 32 (4th suppl.) and Population Estimates by First
      Official Language Spoken, 1991, Catalogue no. 94-320, Demography Division, Statistics
      Canada. Internet site: http://www12.statcan.gc.ca/census-recensement/2011/ref/dict/pop095-eng.cfm
      Temporary Reformat'
