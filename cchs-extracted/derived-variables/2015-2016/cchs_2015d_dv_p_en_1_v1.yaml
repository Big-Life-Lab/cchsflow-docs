  PAADVAC2:
    name: PAADVAC2
    module: WTM
    based_on:
      - DHH_AGE
      - PAADVMVA
    description: This derived variable represents an alternate classification of physical
      activity for adults, based on the number of minutes of moderate to vigorous
      activity done in a week. This variable is similar to PAADVACV, but it breaks
      down those who were not above the threshold of 150 minutes per week into subcategories
      of their activity level.
    note: These levels of physical activity tend to be used more often internationally,
      so this DV may be favored over PAADVACV for international comparisons.
    specifications:
      - value: '6'
        condition: DOPAA = 2
        description: Module not selected
        notes: NA
      - value: '6'
        condition: DHH_AGE < 18
        description: Population exclusions
        notes: NA
      - value: '9'
        condition: PAADVMVA = (DK, RF, NS)
        description: At least one required question was not answered
        notes: NS
      - value: '1'
        condition: PAADVMVA => 150
        description: Active
        notes: ''
      - value: '2'
        condition: 75 <= PAADVMVA < 150
        description: Moderately active
        notes: ''
      - value: '3'
        condition: 0 < PAADVMVA < 75
        description: Somewhat active
        notes: ''
      - value: '4'
        condition: PAADVMVA = 0
        description: Sedentary
        notes: ''
      - value: January 2019
        condition: '111'
        description: ''
        notes: ''
