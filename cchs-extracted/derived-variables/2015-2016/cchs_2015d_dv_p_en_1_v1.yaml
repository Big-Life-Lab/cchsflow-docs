  ALCDVTTM:
    name: ALCDVTTM
    module: WTM
    based_on:
      - ALC_005
      - ALC_010
      - ALC_015
    description: This variable indicates the type of drinker the respondent is based
      on his/her drinking habits in the past 12 months.
    note: ALCDVTTM was created to allow the classification of all respondents according
      to their drinking habits in the past 12 months.
    specifications:
      - value: '6'
        condition: DOALC = 2
        description: Module not selected
        notes: NA
      - value: '9'
        condition: ALC_005 = (DK,RF,NS) or
        description: At least one required question was not answered
        notes: NS
      - value: ALC_010 = (DK,RF,NS) or
        condition: (don’t know, refusal, not stated)
        description: ''
        notes: ''
      - value: '1'
        condition: 2 <= ALC_015 <= 7
        description: Regular drinker
        notes: ''
      - value: '2'
        condition: ALC_015 = 1
        description: Occasional drinker
        notes: ''
      - value: '3'
        condition: ALC_005 = 2 or ALC_010 = 2
        description: Did not drink in the last 12 months
