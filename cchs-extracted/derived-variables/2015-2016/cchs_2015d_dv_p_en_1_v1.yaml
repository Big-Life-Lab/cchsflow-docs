  MEXDVBM6:
    name: MEXDVBM6
    module: WTM
    based_on:
      - ADM_PRX
      - DHH_SEX
      - DHH_AGE
      - SXB_005
      - MEX_010
      - MEX_100
      - MEX_110
      - MEX_115
      - MEX_115A
      - MEX_155
      - MEX_160
    description: This variable indicates whether the respondent exclusively breastfed
      or gave breast milk to her last baby for at least 6 months.
    note: 'Health Canada recommends exclusive breastfeeding for a period of up to
      6 months. This variable indicates the number of mothers who followed this recommendation.
      Respondents who had not given birth in the past 5 years or who were less than
      15 years old or more than 55 years old were excluded from the population. Since
      the variable is used to measure only the final duration of exclusive breastfeeding,
      mothers who still breastfed and who had not yet added any other liquid or solid
      foods to the baby’s feeds are also excluded. Analysts can choose to collapse
      categories 2 and 3 to obtain all mothers who did not exclusively breastfeed
      or give breast milk for at least 6 months. Category 1 indicates that the mother
      breastfed or gave breast milk to her last baby for at least 6 months and that
      liquids and solids were not introduced to the baby’s feeds until after this
      point. Mothers may have continued breastfeeding non- exclusively after this
      point and would still fall under this category. There are two ways to meet this
      criteria: 1. Breastfeeding or feeding breast milk has ceased after 6 months
      and liquids were introduced only after 6 months or not at all and solids were
      introduced only after 6 months or not at all 2.The baby is 6 months old or more
      and breastfeeding or being fed breast milk is still occurring and liquids have
      been introduced only after 6 months or not at all and solids have been introduced
      only after 6 months or not at all. Category 2 indicates that the mother did
      not breastfeed, or give breast milk to, her last baby exclusively for at least
      6 months. This could be that breastfeeding or giving breast milk ended before
      6 months, or that liquids or solids were introduced prior to January 2019 99
      6 months (making that period non-exclusive). Category 3 indicates that the mother
      did not breastfeed her last baby at all.'
    specifications:
      - value: '6'
        condition: DOMEX = 2 or
        description: Population exclusions
        notes: NA
      - value: '9'
        condition: ADM_PRX = 1
        description: Module not asked - proxy interview
        notes: NS
      - value: '9'
        condition: (MEX_010 = NS or
        description: At least one required question was not answered
        notes: NS
      - value: MEXT115A = NS or
        condition: (don’t know, refusal, not stated)
        description: ''
        notes: ''
      - value: '1'
        condition: (((MEXT155A = 8 and MEXT175A = (8, NA)) or
        description: Had exclusively breastfed her last baby for at least 6
        notes: ''
      - value: (MEXT155A = (8, NA) and MEXT175A = 8) or
        condition: months
        description: ''
        notes: ''
      - value: '2'
        condition: MEXT115A < 8 or
        description: Had not exclusively breastfed her last baby for at
        notes: ''
      - value: MEXT155A < 8 or
        condition: least 6 months
        description: ''
        notes: ''
      - value: '3'
        condition: MEX_100 = 2
        description: Has not breastfed her last baby at all
        notes: ''
