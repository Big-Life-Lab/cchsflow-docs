  INCDVRCA:
    name: INCDVRCA
    module: WTM
    based_on:
      - GEO_PRV
      - INCDVADR
    description: This derived variable is a distribution of respondents in deciles
      (ten categories including approximately the same percentage of residents for
      each province) based on their value for INCDVADR, ie. the adjusted ratio of
      their total household income to the low income cut-off corresponding to their
      household and community size. It provides, for each respondent, a relative measure
      of their household income to the household incomes of all other respondents.
    note: Deciles are generated using weighted data. Adjusted ratios are presented
      in increasing order, from smallest to largest, for all 10 provinces irrespective
      of household and community size. Derived variables are calculated only for valid
      responses (not stated, refusal and don't know are excluded). Boundaries are
      determined in order to derive deciles from the total weighted number of cases
      for which derived variables are calculated. The Territories are excluded from
      this derived variable.
