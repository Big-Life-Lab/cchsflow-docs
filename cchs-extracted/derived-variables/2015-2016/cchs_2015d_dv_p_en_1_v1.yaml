      - WSTT005
      - WSTT010
      - WSTT015
    description: This variable indicates whether the respondent experienced job strain
      at their main work in the past 12 months. Job strain is measured as a ratio
      of psychological demands and decision latitude which includes skill discretion
      and decision authority.
    note: Respondents less than 15 years old or more than 75 years old and respondents
      who have not worked at a job or business at any time in the past 12 months were
      excluded from the population. 1. Higher values indicate greater job strain.
      2. Higher scores indicate greater work stress. As psychological demands increase
      or decision latitude decreases (less decision authority and less skill discretion),
      job strain increases. 3. Scores were inverted here for questions WST_Q005, WST_Q010,
      WST_Q015, WST_Q045 (decision latitude questions) for use in the denominator.
      Since WST_Q020 has been inverted for the calculation of WSTDVSKI, it is inverted
      again here before calculating WSTDVJST. 4. At the beginning of this section,
      scores were inverted in the temporary reformat for question WST_Q025. The inverted
      WST_Q025 is used here (as in WSTDVPSY). Temporary Reformat
