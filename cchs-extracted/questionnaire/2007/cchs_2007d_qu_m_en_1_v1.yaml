    variable_name: .na
    question_text: The Health Utility Index (HUI) is formed of 8 attributes. In CCHS,
      these attributes are found in two different modules. The module Pain and discomfort
      (HUP) is comprised of 3 questions related to the pain and discomfort attribute
      and is part of the core content which is asked to all survey respondents. The
      7 other attributes are found in the module Health Utility Index (HUI) which
      is offered as optional content to health regions. HUI_C1          If (do HUI
      block =2), go to HUI_END. HUI_R1          The next set of questions asks about
      [your/FNAME FNAME’s] day-to-day health. The questions are not about illnesses
      like colds that affect people for short periods of time. They are concerned
      with a person’s usual abilities. You may feel that some of these questions do
      not apply to [you/FNAME], but it is important that we ask the same questions
      of everyone. Vision
