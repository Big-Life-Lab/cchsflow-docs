  HMC_R09:
    code: HMC_R09
    variable_name: .na
    question_text: 'Maintenant, quelques questions sur les services à domicile. Par
      services à domicile, on entend des soins de santé, des services d’entretien
      ménager ou d’autres services de soutien reçus à domicile. Les gens pourraient
      recevoir ces services en raison d’un problème de santé ou d’un état de santé
      influant sur leurs activités quotidiennes. En voici des exemples : soins infirmiers,
      aide pour prendre un bain, aide pour l’entretien ménager, services de relève,
      préparation des repas, repas livrés à domicile. INTERVIEWEUR : Appuyez sur <Enter>
      pour continuer.'
